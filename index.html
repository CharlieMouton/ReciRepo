const disp  = (sz, w = 800) => `${w} ${sz}px/0.95 'Bricolage Grotesque', sans-serif`;

  { id: 'eggs',   title: 'Chili crisp eggs over rice',  author: 'daniel', time: '12 min', tags: ['breakfast','spicy'],    color: '#C2562E', accent: '#FCEDE2', cooks: 31, photo: true  },
  { id: 'short',  title: 'Burnt honey shortbread',      author: 'priya',  time: '45 min', tags: ['dessert','bake'],       color: '#8E4A1E', accent: '#FCEDE2', cooks:  7, photo: false },
  { id: 'cuke',   title: 'Smashed cucumber salad',      author: 'jordan', time: '10 min', tags: ['side','vegan'],         color: '#6B7A3E', accent: '#FCEDE2', cooks: 22, photo: true  },
  { id: 'tahdig', title: 'Saffron tahdig',              author: 'layla',  time: '1 h 15', tags: ['rice','persian'],       color: '#D94F4F', accent: '#FCEDE2', cooks:  9, photo: false },
  { id: 'ramen',  title: 'Miso brown-butter ramen',     author: 'theo',   time: '25 min', tags: ['soup','cozy'],          color: '#3B3A2E', accent: '#F6C26B', cooks: 18, photo: true  },
  { id: 'lassi',  title: 'Strawberry lassi',            author: 'riya',   time: '5 min',  tags: ['drink'],                color: '#F2A2A2', accent: '#2F2A2A', cooks: 12, photo: false },
  { id: 'dump',   title: 'Crispy rice-paper dumplings', author: 'wen',    time: '35 min', tags: ['snack','crunchy'],      color: '#E89B5A', accent: '#2B2A26', cooks: 27, photo: true  },

const DETAIL = {

  time: '20 min',

  cooks: 14,

// ── Icons ──────────────────────────────────────────────────────────────────
function Icon({ name, size = 20, stroke = 'currentColor', width = 2, style }) {
  const p = { width: size, height: size, viewBox: '0 0 24 24', fill: 'none',
              stroke, strokeWidth: width, strokeLinecap: 'round', strokeLinejoin: 'round', style };
  switch (name) {
    case 'search':   return <svg {...p}><circle cx="11" cy="11" r="6"/><path d="M16 16l4 4"/></svg>;
    case 'plus':     return <svg {...p}><path d="M12 5v14M5 12h14"/></svg>;
    case 'close':    return <svg {...p}><path d="M6 6l12 12M18 6l-12 12"/></svg>;
    case 'arrow':    return <svg {...p}><path d="M5 12h14M13 5l7 7-7 7"/></svg>;
    case 'back':     return <svg {...p}><path d="M19 12H5M11 5l-7 7 7 7"/></svg>;
    case 'user':     return <svg {...p}><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg>;
    case 'camera':   return <svg {...p}><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7l2-3h4l2 3"/><circle cx="12" cy="13" r="3.5"/></svg>;
    case 'link':     return <svg {...p}><path d="M10 14a4 4 0 005.7 0l3-3a4 4 0 10-5.7-5.7L11 7"/><path d="M14 10a4 4 0 00-5.7 0l-3 3a4 4 0 105.7 5.7L13 17"/></svg>;
    case 'pen':      return <svg {...p}><path d="M4 20l4-1 12-12-3-3L5 16l-1 4z"/></svg>;
    case 'check':    return <svg {...p}><path d="M5 13l4 4L19 7"/></svg>;
    case 'minus':    return <svg {...p}><path d="M5 12h14"/></svg>;
    case 'play':     return <svg {...p}><path d="M7 4l13 8-13 8V4z" fill="currentColor"/></svg>;
    case 'sparkle':  return <svg {...p}><path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3z"/></svg>;
    case 'home':     return <svg {...p}><path d="M4 10l8-6 8 6v10H4V10z"/><path d="M9 20v-6h6v6"/></svg>;
    case 'bookmark': return <svg {...p}><path d="M6 4h12v17l-6-4-6 4V4z"/></svg>;
    case 'flash':    return <svg {...p}><path d="M13 3L4 14h7l-1 7 9-11h-7l1-7z"/></svg>;
    case 'gallery':  return <svg {...p}><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="10" r="1.5"/><path d="M21 17l-5-6-5 5-3-3-5 5"/></svg>;
    case 'flip':     return <svg {...p}><path d="M21 4v6h-6"/><path d="M3 20v-6h6"/><path d="M21 10A9 9 0 005 7M3 14a9 9 0 0016 3"/></svg>;
    default:         return null;
  }
}

// ── Avatar ─────────────────────────────────────────────────────────────────
function Avatar({ name = '?', size = 32, style }) {
  let h = 2166136261;
  for (let i = 0; i < name.length; i++) { h ^= name.charCodeAt(i); h = (h * 16777619) >>> 0; }
  const palettes = [
    ['#D94F4F','#FCEDE2'],['#F6C26B','#2F2A2A'],['#A8431A','#F0E3CC'],['#C68A3E','#2F2A2A'],
    ['#6B7A3E','#F6C26B'],['#2F2A2A','#F6C26B'],['#8E3A52','#FCEDE2'],['#E89B5A','#2F2A2A'],
  ];
  const [bg, fg] = palettes[h % palettes.length];
  const shapes = ['circle','square','diamond','bar','half','donut'];
  const shape = shapes[(h >> 4) % shapes.length];
  const rot = ((h >> 8) % 8) * 15;
  const off = ((h >> 12) % 5) - 2;
  const C = 32, cx = 16 + off, cy = 16 + off;
  let mark;
  switch (shape) {
    case 'circle':  mark = <circle cx={cx} cy={cy} r={9} fill={fg} />; break;
    case 'square':  mark = <rect x={cx-9} y={cy-9} width={18} height={18} fill={fg} />; break;
    case 'diamond': mark = <rect x={cx-8} y={cy-8} width={16} height={16} fill={fg} transform={`rotate(45 ${cx} ${cy})`} />; break;
    case 'bar':     mark = <rect x={0} y={cy-5} width={C} height={10} fill={fg} />; break;
    case 'half':    mark = <><circle cx={cx} cy={cy} r={10} fill={fg}/><rect x={cx-11} y={cy-11} width={22} height={11} fill={bg}/></>; break;
    default:        mark = <><circle cx={cx} cy={cy} r={10} fill={fg}/><circle cx={cx} cy={cy} r={4} fill={bg}/></>; break;
  }
  return (
    <div aria-label={`avatar for ${name}`} style={{
      width: size, height: size, borderRadius: '50%', background: bg, overflow: 'hidden',
      display: 'inline-block', flexShrink: 0, border: `1.8px solid ${P.ink}`, ...style,
    }}>
      <svg viewBox={`0 0 ${C} ${C}`} width="100%" height="100%"
           style={{ display: 'block', transform: `rotate(${rot}deg)` }}>{mark}</svg>
    </div>
  );
}

// ── FoodPlaceholder ────────────────────────────────────────────────────────
function FoodPlaceholder({ color = '#C2562E', accent = '#FCEDE2', label, stripes = true, children }) {
  return (
    <div style={{
      position: 'relative', width: '100%', height: '100%', background: color, color: accent,
      backgroundImage: stripes ? 'repeating-linear-gradient(135deg,transparent 0 18px,rgba(0,0,0,0.045) 18px 19px)' : 'none',
      display: 'flex', alignItems: 'flex-end', overflow: 'hidden',
    }}>
      {label && (
        <div style={{ font: mono(9), letterSpacing: 0.4, textTransform: 'uppercase', padding: '6px 7px',
          margin: 8, borderRadius: 3, background: 'rgba(0,0,0,0.18)', backdropFilter: 'blur(4px)',
          color: accent, opacity: 0.85 }}>{label}
        </div>
      )}
      {children}
    </div>
  );
}

// ── Sticker ────────────────────────────────────────────────────────────────
function Sticker({ children, bg = P.red, color = P.bg, rotate = -2, size = 10, style }) {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      padding: '6px 10px 4px', background: bg, color,
      font: disp(size, 700), letterSpacing: 0.2, textTransform: 'lowercase',
      borderRadius: 999, transform: `rotate(${rotate * 0.4}deg)`, whiteSpace: 'nowrap', ...style,
    }}>{children}</span>
  );
}

// ── Eyebrow ────────────────────────────────────────────────────────────────
function Eyebrow({ children, style }) {
  return <div style={{ font: mono(10, 600), letterSpacing: 2, textTransform: 'uppercase', color: P.ink, opacity: 0.7, ...style }}>{children}</div>;
}

// ── Wordmark ───────────────────────────────────────────────────────────────
function Wordmark({ size = 22 }) {
  return (
    <div style={{ font: disp(size), letterSpacing: -1, color: P.ink, display: 'flex', alignItems: 'center', gap: 2, fontStretch: '75%' }}>
      <span>reci</span>
      <span style={{ background: P.red, color: P.bg, padding: '2px 7px 3px', borderRadius: 5, transform: 'rotate(-1.5deg)', display: 'inline-block' }}>repo</span>
    </div>
  );
}

// ── Tab bar ────────────────────────────────────────────────────────────────
function TabBar({ active, onNavigate }) {
  const items = [
    { key: 'home',    icon: 'home',     label: 'feed' },
    { key: 'saved',   icon: 'bookmark', label: 'saved' },
    { key: 'sheet',   icon: 'plus',     label: 'add',  fab: true },
    { key: 'search',  icon: 'search',   label: 'search' },
    { key: 'profile', icon: 'user',     label: 'you' },
  ];
  return (
    <div style={{
      position: 'absolute', left: 0, right: 0, bottom: 0, padding: '10px 18px 28px',
      background: P.bg, borderTop: `2px solid ${P.ink}`,
      display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end',
    }}>
      {items.map(it => it.fab ? (
        <div key="fab" onClick={() => onNavigate('sheet')} style={{
          width: 68, height: 68, borderRadius: '50%', background: P.red, color: P.bg,
          display: 'grid', placeItems: 'center', marginTop: -42,
          boxShadow: `4px 4px 0 ${P.ink}`, border: `2.5px solid ${P.ink}`, cursor: 'pointer',
        }}>
          <Icon name="plus" size={30} width={3} />
        </div>
      ) : (
        <div key={it.key} onClick={() => onNavigate(it.key)} style={{
          display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
          color: P.ink, opacity: active === it.key ? 1 : 0.65, cursor: 'pointer', userSelect: 'none',
        }}>
          <Icon name={it.icon} size={22} width={active === it.key ? 2.4 : 2} />
          <span style={{ font: mono(9, active === it.key ? 700 : 500), letterSpacing: 1.2, textTransform: 'uppercase' }}>{it.label}</span>
          {active === it.key && <span style={{ width: 34, height: 5, background: P.red, borderRadius: 2, marginTop: 2 }} />}
        </div>
      ))}
    </div>
  );
}

// ── Recipe card ────────────────────────────────────────────────────────────
function RecipeCard({ r, onClick }) {
  return (
    <div onClick={onClick} style={{
      display: 'grid', gridTemplateColumns: '1fr 92px', gap: 12, padding: 10,
      background: P.bg, border: `2px solid ${P.ink}`, borderRadius: 12,
      boxShadow: `3px 3px 0 ${P.ink}`, alignItems: 'stretch', cursor: 'pointer',
      WebkitTapHighlightColor: 'transparent',
    }}>
      <div style={{ display: 'flex', flexDirection: 'column', justifyContent: 'space-between', minWidth: 0 }}>
        <div>
          <div style={{ font: disp(18), letterSpacing: -0.5, color: P.ink, marginBottom: 4 }}>{r.title}</div>
          <div style={{ font: mono(10), color: P.ink, opacity: 0.6, letterSpacing: 0.6 }}>by {r.author} · {r.time}</div>
        </div>
        <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap', marginTop: 6 }}>
          {r.tags.map((t, i) => <Sticker key={t} bg={i % 2 ? P.yellow : P.red} color={P.ink} rotate={i % 2 ? 2 : -3} size={9}>{t}</Sticker>)}
          <Sticker bg={P.ink} color={P.bg} rotate={0} size={9}>×{r.cooks} cooks</Sticker>
        </div>
      </div>
      <div style={{ borderRadius: 8, overflow: 'hidden', border: `1.5px solid ${P.ink}` }}>
        {r.photo === false ? (
          <div style={{
            width: '100%', height: '100%', background: r.color, color: r.accent,
            display: 'grid', placeItems: 'center', font: disp(32), letterSpacing: -1.5, textTransform: 'lowercase',
            backgroundImage: 'repeating-linear-gradient(135deg,transparent 0 18px,rgba(0,0,0,0.06) 18px 19px)',
          }}>
            {r.title.replace(/[^a-zA-Z]/g, '').slice(0, 2).toLowerCase()}
          </div>
        ) : (
          <FoodPlaceholder color={r.color} accent={r.accent} label={r.id} />
        )}
      </div>
    </div>
  );
}

// ── Phone shell ────────────────────────────────────────────────────────────
function Phone({ children }) {

  return (
    <div style={{

      backgroundImage: grain,
      backgroundSize: '120px 120px,90px 90px,140px 140px,70px 70px',

      flexShrink: 0,
    }}>

      <div style={{
        height: 44, padding: '0 24px', display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        font: body(14, 600), pointerEvents: 'none',

              transform: `rotate(${o.rot * 0.3}deg)`, cursor: 'pointer', userSelect: 'none',
            }}>
              <div style={{ width: 46, height: 46, borderRadius: 10, background: P.ink, color: P.bg, display: 'grid', placeItems: 'center', transform: `rotate(${-o.rot}deg)` }}>
                <Icon name={o.icon} size={22} width={2.2} />
              </div>
              <div>
                <div style={{ font: disp(19), letterSpacing: -0.4 }}>{o.title}</div>
                <div style={{ font: mono(10), opacity: 0.7, marginTop: 3, letterSpacing: 0.4 }}>{o.sub}</div>
              </div>
              <Icon name="arrow" size={20} />
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

// ╭─────────────────────────────────────────────────────────────────────────╮
// │  Screen: Cooking (step-by-step)                                         │
// ╰─────────────────────────────────────────────────────────────────────────╯
function CookingScreen({ onNavigate }) {
  const [stepIdx, setStepIdx] = useState(0);
  const [serves, setServes] = useState(DETAIL.servings);
  const total = DETAIL.steps.length;
  const step = DETAIL.steps[stepIdx];
  const stepLabel = stepIdx + 1 === total ? 'last one!' : stepIdx < Math.floor(total / 2) ? 'getting started' : 'halfway there';

  return (
    <>
      {/* Header */}
      <div style={{ padding: '4px 18px 0', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div onClick={() => onNavigate('home')} style={{ width: 32, height: 32, borderRadius: '50%', border: `1.8px solid ${P.ink}`, display: 'grid', placeItems: 'center', cursor: 'pointer' }}>
          <Icon name="back" size={16} />
        </div>
        <Eyebrow>screen-awake · on</Eyebrow>
        <div style={{ width: 32, height: 32, borderRadius: '50%', background: P.yellow, border: `1.8px solid ${P.ink}`, display: 'grid', placeItems: 'center' }}>
          <Icon name="bookmark" size={15} />
        </div>
      </div>

      {/* Hero */}
      <div style={{ margin: '10px 18px 0', height: 110, borderRadius: 14, overflow: 'hidden', border: `2px solid ${P.ink}`, position: 'relative' }}>
        <FoodPlaceholder color="#E8C36E" accent={P.ink} label="cacio_e_pepe.jpg" />
        <div style={{ position: 'absolute', top: 8, left: 10, display: 'flex', alignItems: 'center', gap: 6 }}>
          <Avatar name="maya" size={26} />
          <Sticker bg={P.red} color={P.bg} rotate={-3}>by maya</Sticker>
        </div>
        <div style={{ position: 'absolute', bottom: 8, right: 10, display: 'flex', gap: 5 }}>
          <Sticker bg={P.ink} color={P.bg} rotate={2} size={9}>{DETAIL.time}</Sticker>
          <Sticker bg={P.yellow} color={P.ink} rotate={-1} size={9}>{DETAIL.cooks} cooks</Sticker>
        </div>
      </div>

      {/* Title */}
      <div style={{ padding: '10px 18px 0' }}>
        <div style={{ font: `800 30px/0.9 'Bricolage Grotesque', sans-serif`, letterSpacing: -1, color: P.ink }}>
          {DETAIL.title.toLowerCase()}
        </div>
      </div>

      {/* Servings scaler */}
      <div style={{ padding: '12px 18px 0', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, border: `1.8px solid ${P.ink}`, borderRadius: 999, padding: '4px 4px 4px 12px' }}>
          <Eyebrow style={{ opacity: 0.9 }}>serves</Eyebrow>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <div onClick={() => setServes(s => Math.max(1, s - 1))} style={{ width: 26, height: 26, borderRadius: '50%', border: `1.5px solid ${P.ink}`, display: 'grid', placeItems: 'center', cursor: 'pointer' }}>
              <Icon name="minus" size={12} width={2.5} />
            </div>
            <span style={{ font: disp(16), minWidth: 14, textAlign: 'center' }}>{serves}</span>
            <div onClick={() => setServes(s => s + 1)} style={{ width: 26, height: 26, borderRadius: '50%', background: P.red, color: P.bg, display: 'grid', placeItems: 'center', cursor: 'pointer' }}>
              <Icon name="plus" size={12} width={2.5} />
            </div>
          </div>
        </div>
        <div style={{ font: mono(10), opacity: 0.6 }}>
          {serves === DETAIL.servings ? 'as written' : `×${(serves / DETAIL.servings).toFixed(1)} from original`}
        </div>
      </div>

      {/* Tabs */}
      <div style={{ padding: '14px 18px 0', display: 'flex', gap: 18, borderBottom: `1.5px solid ${P.ink}22` }}>
        <div style={{ paddingBottom: 8, font: body(14, 700), opacity: 0.5, cursor: 'pointer' }}>ingredients</div>
        <div style={{ paddingBottom: 8, font: body(14, 800), color: P.ink, borderBottom: `3px solid ${P.red}`, marginBottom: -1.5 }}>steps</div>
        <div style={{ marginLeft: 'auto', font: mono(10), opacity: 0.6, alignSelf: 'center' }}>step-by-step · on</div>
      </div>

      {/* Step card */}
      <div style={{ padding: '14px 18px 0' }}>
        <div style={{ background: P.paper, border: `2px solid ${P.ink}`, borderRadius: 16, padding: '16px 16px 18px', boxShadow: `4px 4px 0 ${P.ink}` }}>
          <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between' }}>
            <div style={{ font: disp(14), color: P.red, letterSpacing: 0.4, textTransform: 'uppercase' }}>
              step {String(stepIdx + 1).padStart(2, '0')} / {String(total).padStart(2, '0')}
            </div>
            <div style={{ font: mono(10), opacity: 0.6 }}>{stepLabel}</div>
          </div>
          <div style={{ font: body(20, 700), lineHeight: 1.2, marginTop: 8, color: P.ink }}>{step.text}</div>
          {step.timer > 0 && (
            <div style={{ marginTop: 14, display: 'inline-flex', alignItems: 'center', gap: 8, padding: '7px 12px', background: P.ink, color: P.bg, borderRadius: 999, cursor: 'pointer' }}>
              <Icon name="play" size={11} />
              <span style={{ font: disp(14), fontVariantNumeric: 'tabular-nums' }}>
                {String(Math.floor(step.timer / 60)).padStart(2, '0')}:{String(step.timer % 60).padStart(2, '0')}
              </span>
              <span style={{ font: mono(9), opacity: 0.7, letterSpacing: 0.5, textTransform: 'uppercase' }}>tap to start</span>
            </div>
          )}
        </div>
      </div>

      {/* Step nav */}
      <div style={{
        position: 'absolute', left: 0, right: 0, bottom: 0, padding: '14px 18px 28px',
        background: P.bg, borderTop: `2px solid ${P.ink}`,
        display: 'grid', gridTemplateColumns: '52px 1fr 52px', gap: 10, alignItems: 'center',
      }}>
        <div onClick={() => setStepIdx(i => Math.max(0, i - 1))} style={{ height: 52, borderRadius: 14, border: `2px solid ${P.ink}`, display: 'grid', placeItems: 'center', cursor: 'pointer', opacity: stepIdx === 0 ? 0.3 : 1 }}>
          <Icon name="back" size={20} />
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
          <div style={{ display: 'flex', gap: 5 }}>
            {DETAIL.steps.map((_, i) => (
              <span key={i} onClick={() => setStepIdx(i)} style={{
                width: i === stepIdx ? 22 : 8, height: 8, borderRadius: 4, cursor: 'pointer',
                background: i <= stepIdx ? P.red : `${P.ink}33`,
                transition: 'width 0.2s ease',
              }} />
            ))}
          </div>
          <div style={{ font: mono(9), opacity: 0.6, letterSpacing: 0.8 }}>{stepIdx + 1} of {total}</div>
        </div>
        <div onClick={() => stepIdx < total - 1 ? setStepIdx(i => i + 1) : onNavigate('home')} style={{ height: 52, borderRadius: 14, background: P.ink, color: P.bg, display: 'grid', placeItems: 'center', cursor: 'pointer' }}>
          {stepIdx < total - 1 ? <Icon name="arrow" size={20} stroke={P.bg} /> : <Icon name="check" size={20} stroke={P.bg} />}
        </div>
      </div>
    </>
  );
}

function App() {
  const [screen, setScreen] = useState('home');

  return (
    <div style={{
      width: '100vw', height: '100vh', background: '#1a1815',

      <Phone>
        {(screen === 'home' || screen === 'sheet') && <HomeScreen onNavigate={setScreen} />}
        {screen === 'sheet'   && <SheetOverlay  onNavigate={setScreen} />}

        {screen === 'scan'    && <ScanScreen    onNavigate={setScreen} />}
        {screen === 'cooking' && <CookingScreen onNavigate={setScreen} />}
      </Phone>

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
