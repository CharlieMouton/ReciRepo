// ── Hooks ──────────────────────────────────────────────────────────────────
function useAuth() {
  const [user, setUser] = useState(undefined); // undefined = still loading

  useEffect(() => {
    if (!CONFIGURED) { setUser(null); return; }
    sb.auth.getSession().then(({ data: { session } }) => setUser(session?.user ?? null));
    const { data: { subscription } } = sb.auth.onAuthStateChange((_, session) => setUser(session?.user ?? null));
    return () => subscription.unsubscribe();
  }, []);

  return user;
}

function useRecipes() {
  const [recipes, setRecipes] = useState(CONFIGURED ? [] : SAMPLE_RECIPES);
  const [loading, setLoading] = useState(CONFIGURED);

  async function load() {
    if (!CONFIGURED) return;
    setLoading(true);
    try {
      const { data } = await sb.from('recipes_with_meta').select('*').order('created_at', { ascending: false });
      setRecipes(
        data && data.length
          ? data.map(r => ({ id: r.id, title: r.title, author: r.author_username, author_id: r.author_id, time: r.time_text || '?', servings: r.servings || 2, tags: r.tags || [], color: r.color, accent: r.accent, cooks: Number(r.cook_count) || 0 }))
          : SAMPLE_RECIPES
      );
    } catch { setRecipes(SAMPLE_RECIPES); }
    finally { setLoading(false); }
  }

  useEffect(() => { load(); }, []);
  return { recipes, loading, reload: load };
}

function useSaves(user) {
  const [saved, setSaved] = useState(new Set());
  useEffect(() => {
    if (!CONFIGURED || !user) return;
    sb.from('saves').select('recipe_id').eq('user_id', user.id)
      .then(({ data }) => setSaved(new Set((data || []).map(s => s.recipe_id))));
  }, [user?.id]);
  async function toggleSave(recipeId) {
    if (!recipeId) return;
    if (!CONFIGURED || !user) return;
    const isSaved = saved.has(recipeId);
    setSaved(prev => { const n = new Set(prev); isSaved ? n.delete(recipeId) : n.add(recipeId); return n; });
    if (isSaved) {
      await sb.from('saves').delete().eq('user_id', user.id).eq('recipe_id', recipeId);
    } else {
      await sb.from('saves').insert({ user_id: user.id, recipe_id: recipeId });
    }
  }
  return { saved, toggleSave };
}

// ── Primitive components ───────────────────────────────────────────────────
function Icon({ name, size = 20, stroke = 'currentColor', width = 2, style }) {
  const p = { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke, strokeWidth: width, strokeLinecap: 'round', strokeLinejoin: 'round', style };
  switch (name) {
    case 'search':   return <svg {...p}><circle cx="11" cy="11" r="6"/><path d="M16 16l4 4"/></svg>;
    case 'plus':     return <svg {...p}><path d="M12 5v14M5 12h14"/></svg>;
    case 'close':    return <svg {...p}><path d="M6 6l12 12M18 6l-12 12"/></svg>;
    case 'arrow':    return <svg {...p}><path d="M5 12h14M13 5l7 7-7 7"/></svg>;
    case 'back':     return <svg {...p}><path d="M19 12H5M11 5l-7 7 7 7"/></svg>;
    case 'user':     return <svg {...p}><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg>;
    case 'camera':   return <svg {...p}><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7l2-3h4l2 3"/><circle cx="12" cy="13" r="3.5"/></svg>;
    case 'link':     return <svg {...p}><path d="M10 14a4 4 0 005.7 0l3-3a4 4 0 10-5.7-5.7L11 7"/><path d="M14 10a4 4 0 00-5.7 0l-3 3a4 4 0 105.7 5.7L13 17"/></svg>;
    case 'pen':      return <svg {...p}><path d="M4 20l4-1 12-12-3-3L5 16l-1 4z"/></svg>;
    case 'check':    return <svg {...p}><path d="M5 13l4 4L19 7"/></svg>;
    case 'minus':    return <svg {...p}><path d="M5 12h14"/></svg>;
    case 'play':     return <svg {...p}><path d="M7 4l13 8-13 8V4z" fill="currentColor"/></svg>;
    case 'pause':    return <svg {...p}><rect x="6" y="5" width="4" height="14" fill="currentColor" stroke="none"/><rect x="14" y="5" width="4" height="14" fill="currentColor" stroke="none"/></svg>;
    case 'sparkle':  return <svg {...p}><path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3z"/></svg>;
    case 'home':     return <svg {...p}><path d="M4 10l8-6 8 6v10H4V10z"/><path d="M9 20v-6h6v6"/></svg>;
    case 'bookmark': return <svg {...p}><path d="M6 4h12v17l-6-4-6 4V4z"/></svg>;
    case 'flash':    return <svg {...p}><path d="M13 3L4 14h7l-1 7 9-11h-7l1-7z"/></svg>;
    case 'gallery':  return <svg {...p}><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="10" r="1.5"/><path d="M21 17l-5-6-5 5-3-3-5 5"/></svg>;
    case 'flip':     return <svg {...p}><path d="M21 4v6h-6"/><path d="M3 20v-6h6"/><path d="M21 10A9 9 0 005 7M3 14a9 9 0 0016 3"/></svg>;
    default: return null;
  }
}

function Avatar({ name = '?', size = 32, style }) {
  let h = 2166136261;
  for (let i = 0; i < name.length; i++) { h ^= name.charCodeAt(i); h = (h * 16777619) >>> 0; }
  const palettes = [['#D94F4F','#FCEDE2'],['#F6C26B','#2F2A2A'],['#A8431A','#F0E3CC'],['#C68A3E','#2F2A2A'],['#6B7A3E','#F6C26B'],['#2F2A2A','#F6C26B'],['#8E3A52','#FCEDE2'],['#E89B5A','#2F2A2A']];
  const [bg, fg] = palettes[h % palettes.length];
  const shapes = ['circle','square','diamond','bar','half','donut'];
  const shape = shapes[(h >> 4) % shapes.length];
  const rot = ((h >> 8) % 8) * 15, off = ((h >> 12) % 5) - 2;
  const C = 32, cx = 16 + off, cy = 16 + off;
  let mark;
  switch (shape) {
    case 'circle':  mark = <circle cx={cx} cy={cy} r={9} fill={fg} />; break;
    case 'square':  mark = <rect x={cx-9} y={cy-9} width={18} height={18} fill={fg} />; break;
    case 'diamond': mark = <rect x={cx-8} y={cy-8} width={16} height={16} fill={fg} transform={`rotate(45 ${cx} ${cy})`} />; break;
    case 'bar':     mark = <rect x={0} y={cy-5} width={C} height={10} fill={fg} />; break;
    case 'half':    mark = <><circle cx={cx} cy={cy} r={10} fill={fg}/><rect x={cx-11} y={cy-11} width={22} height={11} fill={bg}/></>; break;
    default:        mark = <><circle cx={cx} cy={cy} r={10} fill={fg}/><circle cx={cx} cy={cy} r={4} fill={bg}/></>; break;
  }
  return (
    <div style={{ width: size, height: size, borderRadius: '50%', background: bg, overflow: 'hidden', display: 'inline-block', flexShrink: 0, border: `1.8px solid ${P.ink}`, ...style }}>
      <svg viewBox={`0 0 ${C} ${C}`} width="100%" height="100%" style={{ display: 'block', transform: `rotate(${rot}deg)` }}>{mark}</svg>
    </div>
  );
}

function FoodPlaceholder({ color = '#C2562E', accent = '#FCEDE2', label, stripes = true, children }) {
  return (
    <div style={{ position: 'relative', width: '100%', height: '100%', background: color, color: accent, backgroundImage: stripes ? 'repeating-linear-gradient(135deg,transparent 0 18px,rgba(0,0,0,0.045) 18px 19px)' : 'none', display: 'flex', alignItems: 'flex-end', overflow: 'hidden' }}>
      {label && <div style={{ font: mono(9), letterSpacing: 0.4, textTransform: 'uppercase', padding: '6px 7px', margin: 8, borderRadius: 3, background: 'rgba(0,0,0,0.18)', backdropFilter: 'blur(4px)', color: accent, opacity: 0.85 }}>{label}</div>}
      {children}
    </div>
  );
}

function Sticker({ children, bg = P.red, color = P.bg, rotate = -2, size = 10, style }) {
  return <span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', padding: '6px 10px 4px', background: bg, color, font: disp(size, 700), letterSpacing: 0.2, textTransform: 'lowercase', borderRadius: 999, transform: `rotate(${rotate * 0.4}deg)`, whiteSpace: 'nowrap', ...style }}>{children}</span>;
}

function Eyebrow({ children, style }) {
  return <div style={{ font: mono(10, 600), letterSpacing: 2, textTransform: 'uppercase', color: P.ink, opacity: 0.7, ...style }}>{children}</div>;
}

function Wordmark({ size = 22 }) {

}

    { key: 'sheet',   icon: 'plus',     label: 'add', fab: true },
    { key: 'search',  icon: 'search',   label: 'search' },
    { key: 'profile', icon: 'user',     label: 'you'    },
  ];
  return (
    <div style={{ position: 'absolute', left: 0, right: 0, bottom: 0, padding: '10px 18px 28px', background: P.bg, borderTop: `2px solid ${P.ink}`, display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
      {items.map(it => it.fab ? (
        <div key="fab" onClick={() => onNavigate('sheet')} style={{ width: 68, height: 68, borderRadius: '50%', background: P.red, color: P.bg, display: 'grid', placeItems: 'center', marginTop: -42, boxShadow: `4px 4px 0 ${P.ink}`, border: `2.5px solid ${P.ink}`, cursor: 'pointer' }}>
          <Icon name="plus" size={30} width={3} />
        </div>
      ) : (
        <div key={it.key} onClick={() => onNavigate(it.key)} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, color: P.ink, opacity: active === it.key ? 1 : 0.65, cursor: 'pointer', userSelect: 'none' }}>
          <Icon name={it.icon} size={22} width={active === it.key ? 2.4 : 2} />
          <span style={{ font: mono(9, active === it.key ? 700 : 500), letterSpacing: 1.2, textTransform: 'uppercase' }}>{it.label}</span>
          {active === it.key && <span style={{ width: 34, height: 5, background: P.red, borderRadius: 2, marginTop: 2 }} />}
        </div>

}

// ── Recipe card ────────────────────────────────────────────────────────────
function RecipeCard({ r, onClick }) {
  return (
    <div onClick={onClick} style={{ display: 'grid', gridTemplateColumns: '1fr 92px', gap: 12, padding: 10, background: P.bg, border: `2px solid ${P.ink}`, borderRadius: 12, boxShadow: `3px 3px 0 ${P.ink}`, alignItems: 'stretch', cursor: 'pointer', WebkitTapHighlightColor: 'transparent' }}>
      <div style={{ display: 'flex', flexDirection: 'column', justifyContent: 'space-between', minWidth: 0 }}>
        <div>

          <div style={{ font: mono(10), color: P.ink, opacity: 0.6, letterSpacing: 0.6 }}>by {r.author} · {r.time}</div>
        </div>
        <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap', marginTop: 6 }}>
          {(r.tags || []).map((t, i) => <Sticker key={t} bg={i % 2 ? P.yellow : P.red} color={P.ink} rotate={i % 2 ? 2 : -3} size={9}>{t}</Sticker>)}

        </div>
      </div>
      <div style={{ borderRadius: 8, overflow: 'hidden', border: `1.5px solid ${P.ink}` }}>
        <FoodPlaceholder color={r.color} accent={r.accent} label={typeof r.id === 'string' && r.id.length < 20 ? r.id : null} />
      </div>
    </div>
  );
}

// ╭─────────────────────────────────────────────────────────────────────────╮
// │  Auth screen                                                            │
// ╰─────────────────────────────────────────────────────────────────────────╯
function AuthScreen() {
  const [tab, setTab]         = useState('signin');
  const [email, setEmail]     = useState('');
  const [password, setPass]   = useState('');
  const [username, setUname]  = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState('');

  async function submit() {
    if (!email || !password) { setError('email and password required'); return; }
    setLoading(true); setError('');
    try {
      if (tab === 'signin') {
        const { error: e } = await sb.auth.signInWithPassword({ email, password });
        if (e) throw e;
      } else {
        const { error: e } = await sb.auth.signUp({ email, password, options: { data: { username: username || email.split('@')[0] } } });
        if (e) throw e;
      }
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  }

  return (
    <div style={{ padding: '0 26px', height: '100%', display: 'flex', flexDirection: 'column', justifyContent: 'center', gap: 0 }}>
      <Wordmark size={28} />

      <div style={{ marginTop: 28, font: `800 34px/0.9 'Bricolage Grotesque', sans-serif`, letterSpacing: -1.2, color: P.ink }}>
        {tab === 'signin' ? <>welcome<br/>back.</> : <>join the<br/>table.</>}
      </div>

      {/* Tabs */}
      <div style={{ marginTop: 26, display: 'flex', border: `2px solid ${P.ink}`, borderRadius: 12, overflow: 'hidden' }}>
        {[['signin','sign in'],['signup','sign up']].map(([t, label]) => (
          <div key={t} onClick={() => { setTab(t); setError(''); }} style={{ flex: 1, padding: '10px 0', textAlign: 'center', font: body(13, tab === t ? 800 : 600), background: tab === t ? P.ink : 'transparent', color: tab === t ? P.bg : P.ink, cursor: 'pointer', userSelect: 'none' }}>{label}</div>
        ))}
      </div>

      {/* Fields */}
      <div style={{ marginTop: 18, display: 'flex', flexDirection: 'column', gap: 14 }}>
        {tab === 'signup' && (
          <div>
            <Eyebrow>username</Eyebrow>
            <input value={username} onChange={e => setUname(e.target.value)} placeholder="your_name" style={inputStyle()} />
          </div>
        )}
        <div>
          <Eyebrow>email</Eyebrow>
          <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@example.com" style={inputStyle()} />
        </div>
        <div>
          <Eyebrow>password</Eyebrow>
          <input type="password" value={password} onChange={e => setPass(e.target.value)} placeholder="••••••••" onKeyDown={e => e.key === 'Enter' && submit()} style={inputStyle()} />
        </div>
      </div>

      {error && <div style={{ marginTop: 10, font: mono(11), color: P.red, letterSpacing: 0.2 }}>{error}</div>}

      <div onClick={!loading ? submit : undefined} style={{ marginTop: 20, padding: '16px', background: loading ? `${P.ink}88` : P.ink, color: P.bg, borderRadius: 14, font: disp(18), letterSpacing: -0.3, textAlign: 'center', cursor: loading ? 'not-allowed' : 'pointer', boxShadow: loading ? 'none' : `4px 4px 0 ${P.red}`, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10 }}>

    </div>
  );
}

// ╭─────────────────────────────────────────────────────────────────────────╮
// │  Add via link                                                           │
// ╰─────────────────────────────────────────────────────────────────────────╯
function LinkScreen({ onNavigate, user, onSaved }) {
  const [url, setUrl]         = useState('');
  const [loading, setLoading] = useState(false);
  const [done, setDone]       = useState(false);
  const [error, setError]     = useState('');
  const inputRef = useRef(null);

  useEffect(() => { setTimeout(() => inputRef.current?.focus(), 120); }, []);

  async function handleFetch() {
    if (!url.trim()) return;
    let parsed;
    try { parsed = new URL(url.trim()); } catch { setError("that doesn't look like a valid URL"); return; }
    setLoading(true); setError('');
    try {
      if (CONFIGURED && user) {
        const hostname = parsed.hostname.replace(/^www\./, '');
        const { error: e } = await sb.from('recipes').insert({
          title: hostname, author_id: user.id, source_url: url.trim(), color: '#C2562E', accent: '#FCEDE2',
        });
        if (e) throw e;
        onSaved?.();
      }
      setDone(true);
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  }

  return (
    <>
      <div style={{ padding: '4px 18px 0', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div onClick={() => onNavigate('sheet')} style={{ width: 32, height: 32, borderRadius: '50%', border: `1.8px solid ${P.ink}`, display: 'grid', placeItems: 'center', cursor: 'pointer' }}>
          <Icon name="back" size={16} />
        </div>
        <Eyebrow>add · from a link</Eyebrow>
        <div style={{ width: 32 }} />
      </div>

      <div style={{ padding: '24px 20px 0', display: 'flex', flexDirection: 'column', gap: 0 }}>
        <div style={{ font: `800 32px/0.9 'Bricolage Grotesque', sans-serif`, letterSpacing: -1.2, color: P.ink }}>
          paste a{' '}
          <span style={{ position: 'relative', display: 'inline-block' }}>
            link
            <span style={{ position: 'absolute', left: -2, right: -2, bottom: -3, height: 7, background: P.yellow, zIndex: -1, transform: 'rotate(-1deg)' }} />
          </span>.
        </div>
        <div style={{ marginTop: 8, font: mono(11), opacity: 0.55, letterSpacing: 0.3 }}>
          NYT Cooking, Smitten Kitchen, AllRecipes — we'll grab it.
        </div>

        {/* URL input */}
        <div style={{ marginTop: 24 }}>
          <Eyebrow>recipe URL</Eyebrow>
          <div style={{ marginTop: 8, display: 'flex', gap: 8, alignItems: 'stretch' }}>
            <input
              ref={inputRef}
              value={url}
              onChange={e => { setUrl(e.target.value); setError(''); setDone(false); }}
              onKeyDown={e => e.key === 'Enter' && handleFetch()}
              placeholder="https://…"
              style={{ flex: 1, padding: '13px 14px', font: mono(13), color: P.ink, background: P.bg, border: `2px solid ${P.ink}`, borderRadius: 12, outline: 'none', boxShadow: `2px 2px 0 ${P.ink}` }}
            />
          </div>
        </div>

        {error && <div style={{ marginTop: 10, font: mono(11), color: P.red, letterSpacing: 0.2 }}>{error}</div>}

        {done ? (
          <div style={{ marginTop: 20, padding: '18px', background: P.paper, border: `2px solid ${P.ink}`, borderRadius: 14, boxShadow: `4px 4px 0 ${P.ink}` }}>
            <div style={{ font: disp(18), letterSpacing: -0.3 }}>
              <span style={{ color: P.red }}>✓</span> recipe saved
            </div>
            <div style={{ font: mono(11), opacity: 0.6, marginTop: 6, letterSpacing: 0.3 }}>
              {CONFIGURED ? 'added to your feed — full import coming soon.' : 'link captured · connect Supabase to persist it.'}
            </div>
            <div onClick={() => onNavigate('home')} style={{ marginTop: 14, display: 'inline-flex', alignItems: 'center', gap: 8, padding: '9px 14px', background: P.ink, color: P.bg, borderRadius: 999, cursor: 'pointer', font: body(13, 700) }}>
              back to feed <Icon name="arrow" size={16} stroke={P.bg} />
            </div>
          </div>
        ) : (
          <div onClick={!loading ? handleFetch : undefined} style={{ marginTop: 20, padding: '16px', background: !url.trim() || loading ? `${P.ink}55` : P.ink, color: P.bg, borderRadius: 14, font: disp(18), letterSpacing: -0.3, textAlign: 'center', cursor: !url.trim() || loading ? 'not-allowed' : 'pointer', boxShadow: !url.trim() || loading ? 'none' : `4px 4px 0 ${P.red}`, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10 }}>
            {loading ? 'pulling recipe…' : 'fetch recipe'}
            {!loading && <Icon name="arrow" size={18} stroke={P.bg} />}
          </div>
        )}

        {/* Recent URLs placeholder */}
        {!done && (
          <div style={{ marginTop: 28 }}>
            <Eyebrow>example sources</Eyebrow>
            <div style={{ marginTop: 10, display: 'flex', flexDirection: 'column', gap: 6 }}>
              {['cooking.nytimes.com','smittenkitchen.com','bonappetit.com'].map(host => (
                <div key={host} onClick={() => setUrl(`https://${host}/`)} style={{ padding: '10px 14px', border: `1.5px solid ${P.ink}33`, borderRadius: 10, font: mono(11), color: P.ink, opacity: 0.6, cursor: 'pointer', letterSpacing: 0.3 }}>{host}</div>
              ))}
            </div>
          </div>
        )}
      </div>
    </>
  );
}

// ╭─────────────────────────────────────────────────────────────────────────╮
// │  Add manual                                                             │
// ╰─────────────────────────────────────────────────────────────────────────╯
function ManualScreen({ onNavigate, user, onSaved, editRecipe }) {
  const isEdit = !!editRecipe;
  const [title, setTitle]           = useState('');
  const [timeText, setTimeText]     = useState('');
  const [servings, setServings]     = useState('2');
  const [tags, setTags]             = useState([]);
  const [tagDraft, setTagDraft]     = useState('');
  const [ingredients, setIngred]    = useState([{ qty: '', item: '' }]);
  const [steps, setSteps]           = useState(['']);
  const [saving, setSaving]         = useState(false);
  const [error, setError]           = useState('');

  useEffect(() => {
    if (!isEdit || !CONFIGURED) return;
    (async () => {
      const [{ data: ings }, { data: stps }] = await Promise.all([
        sb.from('ingredients').select('*').eq('recipe_id', editRecipe.id).order('sort_order'),
        sb.from('steps').select('*').eq('recipe_id', editRecipe.id).order('sort_order'),
      ]);
      setTitle(editRecipe.title || '');
      setTimeText(editRecipe.time || '');
      setServings(String(editRecipe.servings || 2));
      setTags(editRecipe.tags || []);
      setIngred(ings?.length ? ings.map(i => ({ qty: i.qty || '', item: i.item || '' })) : [{ qty: '', item: '' }]);
      setSteps(stps?.length ? stps.map(s => s.text) : ['']);
    })();
  }, [editRecipe?.id]);

  function addTag(raw) {
    const t = raw.trim().toLowerCase().replace(/[^a-z0-9-]/g, '');
    if (t && !tags.includes(t)) setTags(prev => [...prev, t]);
    setTagDraft('');
  }

  function updateIngred(i, key, val) { setIngred(prev => prev.map((r, idx) => idx === i ? { ...r, [key]: val } : r)); }
  function removeIngred(i) { setIngred(prev => prev.filter((_, idx) => idx !== i)); }
  function updateStep(i, val) { setSteps(prev => prev.map((s, idx) => idx === i ? val : s)); }
  function removeStep(i) { setSteps(prev => prev.filter((_, idx) => idx !== i)); }

  async function handleSave() {
    if (!title.trim()) { setError('add a title first'); return; }
    setSaving(true); setError('');
    try {
      if (CONFIGURED && user) {
        let recipeId;
        if (isEdit) {
          const { error: e1 } = await sb.from('recipes').update({ title: title.trim(), time_text: timeText, servings: parseInt(servings) || 2 }).eq('id', editRecipe.id);
          if (e1) throw e1;
          recipeId = editRecipe.id;
          await Promise.all([
            sb.from('recipe_tags').delete().eq('recipe_id', recipeId),
            sb.from('ingredients').delete().eq('recipe_id', recipeId),
            sb.from('steps').delete().eq('recipe_id', recipeId),
          ]);
        } else {
          const { data: recipe, error: e1 } = await sb.from('recipes').insert({ title: title.trim(), author_id: user.id, time_text: timeText, servings: parseInt(servings) || 2, color: '#E8C36E', accent: '#2F2A2A' }).select().single();
          if (e1) throw e1;
          recipeId = recipe.id;
        }
        if (tags.length)
          await sb.from('recipe_tags').insert(tags.map(t => ({ recipe_id: recipeId, tag: t })));
        const validI = ingredients.filter(r => r.item.trim());
        if (validI.length)
          await sb.from('ingredients').insert(validI.map((r, idx) => ({ recipe_id: recipeId, qty: r.qty, item: r.item, sort_order: idx })));
        const validS = steps.filter(s => s.trim());
        if (validS.length)
          await sb.from('steps').insert(validS.map((s, idx) => ({ recipe_id: recipeId, text: s, sort_order: idx })));
        onSaved?.();
      }
      onNavigate('home');
    } catch (e) { setError(e.message); }
    finally { setSaving(false); }
  }

  const fieldBase = { width: '100%', background: 'transparent', border: 'none', outline: 'none', color: P.ink, fontFamily: "'Hanken Grotesk', sans-serif" };

  return (
    <>
      <div style={{ padding: '4px 18px 0', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div onClick={() => onNavigate('home')} style={{ width: 32, height: 32, borderRadius: '50%', border: `1.8px solid ${P.ink}`, display: 'grid', placeItems: 'center', cursor: 'pointer' }}>
          <Icon name="close" size={16} />
        </div>
        <Eyebrow>{isEdit ? 'edit · recipe' : 'new · manual'}</Eyebrow>
        <div onClick={!saving ? handleSave : undefined} style={{ padding: '6px 14px', background: saving ? `${P.ink}66` : P.ink, color: P.bg, borderRadius: 999, font: body(12, 700), cursor: saving ? 'not-allowed' : 'pointer' }}>
          {saving ? '…' : 'save'}
        </div>
      </div>

      {error && <div style={{ margin: '6px 18px 0', font: mono(11), color: P.red }}>{error}</div>}

      <div style={{ padding: '12px 18px 24px', overflowY: 'auto', height: 'calc(100% - 56px)' }}>
        {/* Cover slot */}
        <div style={{ height: 120, borderRadius: 14, border: `2px dashed ${P.ink}`, background: P.paper, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 6 }}>
          <div style={{ width: 40, height: 40, background: P.yellow, borderRadius: '50%', border: `1.8px solid ${P.ink}`, display: 'grid', placeItems: 'center', transform: 'rotate(-2deg)' }}>
            <Icon name="camera" size={20} />
          </div>
          <div style={{ font: mono(10), letterSpacing: 0.8, textTransform: 'uppercase', opacity: 0.6 }}>tap for cover photo</div>
        </div>

        {/* Title */}
        <div style={{ marginTop: 16, borderBottom: `2.5px solid ${P.ink}`, paddingBottom: 6 }}>
          <Eyebrow>title</Eyebrow>
          <input value={title} onChange={e => setTitle(e.target.value)} placeholder="name your recipe…" style={{ ...fieldBase, font: `800 26px/0.95 'Bricolage Grotesque', sans-serif`, letterSpacing: -0.8, marginTop: 6, display: 'block' }} />
        </div>

        {/* Meta */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8, marginTop: 14 }}>
          {[['time','e.g. 20 min', timeText, setTimeText],['serves','2', servings, setServings]].flatMap(([k, ph, val, set], i) => (
            <div key={k} style={{ border: `1.8px solid ${P.ink}`, borderRadius: 10, padding: '6px 10px', background: P.bg }}>
              <div style={{ font: mono(9), opacity: 0.6, textTransform: 'uppercase', letterSpacing: 1 }}>{k}</div>
              <input value={val} onChange={e => set(e.target.value)} placeholder={ph} style={{ ...fieldBase, font: `800 18px/1 'Bricolage Grotesque', sans-serif`, marginTop: 2, display: 'block', width: '100%' }} />
            </div>
          ))}
          <div style={{ border: `1.8px solid ${P.ink}`, borderRadius: 10, padding: '6px 10px', background: P.paper, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <div style={{ font: mono(9), opacity: 0.5, textTransform: 'uppercase', letterSpacing: 1, textAlign: 'center', lineHeight: 1.4 }}>photo<br/>soon</div>
          </div>
        </div>

        {/* Tags */}
        <div style={{ marginTop: 16 }}>
          <Eyebrow>tags</Eyebrow>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 8, alignItems: 'center' }}>
            {tags.map((t, i) => (
              <span key={t} onClick={() => setTags(prev => prev.filter(x => x !== t))} style={{ display: 'inline-flex', alignItems: 'center', gap: 4, padding: '5px 9px 4px', background: i % 2 ? P.yellow : P.red, color: P.ink, font: `700 9px/1 'Bricolage Grotesque', sans-serif`, borderRadius: 999, cursor: 'pointer', transform: `rotate(${(i % 2 ? 2 : -3) * 0.4}deg)` }}>
                {t} ×
              </span>
            ))}
            <input value={tagDraft} onChange={e => setTagDraft(e.target.value)} onKeyDown={e => { if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); addTag(tagDraft); } }} onBlur={() => tagDraft && addTag(tagDraft)} placeholder="add tag…" style={{ border: 'none', outline: 'none', background: 'transparent', font: body(12, 600), color: P.ink, borderBottom: `1.5px solid ${P.ink}44`, paddingBottom: 2, width: 72 }} />
          </div>
        </div>

        {/* Ingredients */}
        <div style={{ marginTop: 18 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
            <div style={{ font: disp(17), letterSpacing: -0.3 }}>ingredients</div>
            <Eyebrow>{ingredients.filter(r => r.item).length || 0} items</Eyebrow>
          </div>
          <div style={{ marginTop: 8, display: 'flex', flexDirection: 'column' }}>
            {ingredients.map((ing, idx) => (
              <div key={idx} style={{ display: 'grid', gridTemplateColumns: '80px 1fr 22px', gap: 8, padding: '7px 0', borderBottom: `1px solid ${P.ink}22`, alignItems: 'center' }}>
                <input value={ing.qty} onChange={e => updateIngred(idx, 'qty', e.target.value)} placeholder="1 cup" style={{ ...fieldBase, font: `700 15px/1 'Bricolage Grotesque', sans-serif`, color: P.red, letterSpacing: -0.3 }} />
                <input value={ing.item} onChange={e => updateIngred(idx, 'item', e.target.value)} placeholder="ingredient" style={{ ...fieldBase, font: body(14), lineHeight: 1 }} />
                <div onClick={() => removeIngred(idx)} style={{ cursor: 'pointer', opacity: 0.35, display: 'grid', placeItems: 'center' }}><Icon name="close" size={13} /></div>
              </div>
            ))}
            <div onClick={() => setIngred(prev => [...prev, { qty: '', item: '' }])} style={{ marginTop: 7, font: mono(10), color: P.ink, opacity: 0.55, cursor: 'pointer' }}>+ add ingredient</div>
          </div>
        </div>

        {/* Steps */}
        <div style={{ marginTop: 20 }}>
          <div style={{ font: disp(17), letterSpacing: -0.3 }}>steps</div>
          <div style={{ marginTop: 8, display: 'flex', flexDirection: 'column' }}>
            {steps.map((step, idx) => (
              <div key={idx} style={{ display: 'grid', gridTemplateColumns: '20px 1fr 22px', gap: 8, padding: '7px 0', borderBottom: `1px solid ${P.ink}22`, alignItems: 'start' }}>
                <span style={{ font: `800 12px/2 'Bricolage Grotesque', sans-serif`, color: P.red }}>{idx + 1}.</span>
                <textarea value={step} onChange={e => updateStep(idx, e.target.value)} placeholder="describe this step…" rows={2} style={{ ...fieldBase, font: body(14), resize: 'none', lineHeight: 1.4 }} />
                <div onClick={() => removeStep(idx)} style={{ cursor: 'pointer', opacity: 0.35, display: 'grid', placeItems: 'center', paddingTop: 4 }}><Icon name="close" size={13} /></div>
              </div>
            ))}
            <div onClick={() => setSteps(prev => [...prev, ''])} style={{ marginTop: 7, font: mono(10), color: P.ink, opacity: 0.55, cursor: 'pointer' }}>+ add step</div>
          </div>
        </div>
      </div>
    </>
  );
}

// ╭─────────────────────────────────────────────────────────────────────────╮
// │  Cooking screen                                                         │
// ╰─────────────────────────────────────────────────────────────────────────╯
function CookingScreen({ recipe, user, onNavigate, onDeleted, onEdit, saved, toggleSave }) {
  const [detail, setDetail]               = useState(null);
  const [stepIdx, setStepIdx]             = useState(0);
  const [serves, setServes]               = useState(2);
  const [confirmDel, setConfirmDel]       = useState(false);
  const [deleting, setDeleting]           = useState(false);
  const [activeTab, setActiveTab]         = useState('steps');
  const [timerRunning, setTimerRunning]   = useState(false);
  const [timerLeft, setTimerLeft]         = useState(0);

  const r = recipe || {};
  const isOwner = CONFIGURED && user?.id && r.author_id && user.id === r.author_id;
  const isSaved = saved?.has(r.id);

  // Load recipe detail
  useEffect(() => {
    setStepIdx(0); setActiveTab('steps'); setConfirmDel(false);
    if (!CONFIGURED || !recipe) {
      setDetail({ ...SAMPLE_DETAIL, title: r.title || SAMPLE_DETAIL.title, author: r.author || SAMPLE_DETAIL.author, time: r.time || SAMPLE_DETAIL.time, cooks: r.cooks ?? SAMPLE_DETAIL.cooks });
      setServes(r.servings || SAMPLE_DETAIL.servings);
      return;
    }
    setDetail(null);
    (async () => {
      const [{ data: ings }, { data: stps }] = await Promise.all([
        sb.from('ingredients').select('*').eq('recipe_id', recipe.id).order('sort_order'),
        sb.from('steps').select('*').eq('recipe_id', recipe.id).order('sort_order'),
      ]);
      setDetail({
        title: recipe.title, author: recipe.author, time: recipe.time, cooks: recipe.cooks,
        servings: recipe.servings || 2,
        ingredients: ings || [],
        steps: (stps || []).map(s => ({ text: s.text, timer: s.timer_seconds || 0 })),
      });
      setServes(recipe.servings || 2);
    })();
  }, [recipe?.id]);

  const steps       = detail?.steps || [];
  const total       = steps.length || 1;
  const step        = steps[stepIdx] || { text: '', timer: 0 };
  const origServings = detail?.servings || 2;
  const ingredients = detail?.ingredients || [];
  const stepLabel   = stepIdx + 1 === total ? 'last one!' : stepIdx < Math.floor(total / 2) ? 'getting started' : 'halfway there';

  // Reset timer when step changes
  useEffect(() => {
    setTimerRunning(false);
    setTimerLeft(step.timer);
  }, [stepIdx, step.timer]);

  // Countdown tick
  useEffect(() => {
    if (!timerRunning) return;
    const id = setInterval(() => {
      setTimerLeft(t => {
        if (t <= 1) { clearInterval(id); setTimerRunning(false); return 0; }
        return t - 1;
      });
    }, 1000);
    return () => clearInterval(id);
  }, [timerRunning]);

  async function handleDelete() {
    if (!confirmDel) { setConfirmDel(true); return; }
    setDeleting(true);
    try { await sb.from('recipes').delete().eq('id', recipe.id); onDeleted?.(); }
    catch { setDeleting(false); setConfirmDel(false); }
  }

  async function handleComplete() {
    if (CONFIGURED && user && recipe) {
      try { await sb.from('cook_logs').insert({ recipe_id: recipe.id, user_id: user.id }); } catch {}
    }
    onNavigate('home');
  }

  function handleTimer() {
    if (timerRunning) {
      setTimerRunning(false);
    } else {
      if (timerLeft <= 0) setTimerLeft(step.timer);
      setTimerRunning(true);
    }
  }

  const displayTime = timerLeft > 0 ? timerLeft : step.timer;

  return (
    <>
      <div style={{ padding: '4px 18px 0', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div onClick={() => onNavigate('home')} style={{ width: 32, height: 32, borderRadius: '50%', border: `1.8px solid ${P.ink}`, display: 'grid', placeItems: 'center', cursor: 'pointer' }}>
          <Icon name="back" size={16} />
        </div>
        <Eyebrow>screen-awake · on</Eyebrow>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          {isOwner && (
            <div onClick={() => onEdit(recipe)} style={{ width: 32, height: 32, borderRadius: '50%', background: P.yellow, border: `1.8px solid ${P.ink}`, display: 'grid', placeItems: 'center', cursor: 'pointer' }}>
              <Icon name="pen" size={14} />
            </div>
          )}
          <div onClick={() => toggleSave?.(r.id)} style={{ width: 32, height: 32, borderRadius: '50%', background: isSaved ? P.yellow : 'transparent', border: `1.8px solid ${P.ink}`, display: 'grid', placeItems: 'center', cursor: 'pointer', transition: 'background 0.15s' }}>
            <Icon name="bookmark" size={15} />
          </div>
        </div>
      </div>

      <div style={{ margin: '10px 18px 0', height: 110, borderRadius: 14, overflow: 'hidden', border: `2px solid ${P.ink}`, position: 'relative' }}>
        <FoodPlaceholder color={r.color || '#E8C36E'} accent={r.accent || P.ink} label={typeof r.id === 'string' && r.id.length < 20 ? r.id : null} />
        <div style={{ position: 'absolute', top: 8, left: 10, display: 'flex', alignItems: 'center', gap: 6 }}>
          <Avatar name={r.author || 'maya'} size={26} />
          <Sticker bg={P.red} color={P.bg} rotate={-3}>by {r.author || 'maya'}</Sticker>
        </div>
        <div style={{ position: 'absolute', bottom: 8, right: 10, display: 'flex', gap: 5 }}>
          <Sticker bg={P.ink} color={P.bg} rotate={2} size={9}>{r.time || '?'}</Sticker>
          <Sticker bg={P.yellow} color={P.ink} rotate={-1} size={9}>{r.cooks || 0} cooks</Sticker>
        </div>
      </div>

      <div style={{ padding: '10px 18px 0' }}>
        <div style={{ font: `800 30px/0.9 'Bricolage Grotesque', sans-serif`, letterSpacing: -1, color: P.ink }}>{(r.title || '').toLowerCase()}</div>
      </div>

      <div style={{ padding: '12px 18px 0', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, border: `1.8px solid ${P.ink}`, borderRadius: 999, padding: '4px 4px 4px 12px' }}>
          <Eyebrow style={{ opacity: 0.9 }}>serves</Eyebrow>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <div onClick={() => setServes(s => Math.max(1, s - 1))} style={{ width: 26, height: 26, borderRadius: '50%', border: `1.5px solid ${P.ink}`, display: 'grid', placeItems: 'center', cursor: 'pointer' }}><Icon name="minus" size={12} width={2.5} /></div>
            <span style={{ font: disp(16), minWidth: 14, textAlign: 'center' }}>{serves}</span>
            <div onClick={() => setServes(s => s + 1)} style={{ width: 26, height: 26, borderRadius: '50%', background: P.red, color: P.bg, display: 'grid', placeItems: 'center', cursor: 'pointer' }}><Icon name="plus" size={12} width={2.5} /></div>
          </div>
        </div>
        <div style={{ font: mono(10), opacity: 0.6 }}>{serves === origServings ? 'as written' : `×${(serves / origServings).toFixed(1)} from original`}</div>
      </div>

      {/* Tab row */}
      <div style={{ padding: '14px 18px 0', display: 'flex', gap: 18, borderBottom: `1.5px solid ${P.ink}22` }}>
        {['ingredients','steps'].map(tab => (
          <div key={tab} onClick={() => setActiveTab(tab)} style={{ paddingBottom: 8, font: body(14, activeTab === tab ? 800 : 700), color: P.ink, opacity: activeTab === tab ? 1 : 0.45, borderBottom: activeTab === tab ? `3px solid ${P.red}` : '3px solid transparent', marginBottom: -1.5, cursor: 'pointer' }}>{tab}</div>
        ))}
        <div style={{ marginLeft: 'auto', font: mono(10), opacity: 0.6, alignSelf: 'center' }}>step-by-step · on</div>
      </div>

      {/* Content */}
      {!detail ? (
        <div style={{ padding: '24px 18px', textAlign: 'center', font: mono(11), opacity: 0.45, letterSpacing: 1.5, textTransform: 'uppercase' }}>loading…</div>
      ) : activeTab === 'ingredients' ? (
        <div style={{ padding: '14px 18px 20px', overflowY: 'auto', height: 'calc(100% - 360px)' }}>
          {ingredients.length === 0
            ? <div style={{ font: body(14), opacity: 0.4 }}>no ingredients listed</div>
            : ingredients.map((ing, i) => (
              <div key={i} style={{ display: 'grid', gridTemplateColumns: '80px 1fr', gap: 8, padding: '8px 0', borderBottom: `1px solid ${P.ink}22` }}>
                <span style={{ font: `700 15px/1.2 'Bricolage Grotesque', sans-serif`, color: P.red }}>{ing.qty}</span>
                <span style={{ font: body(14) }}>{ing.item}</span>
              </div>
            ))
          }
        </div>
      ) : (
        <div style={{ padding: '14px 18px 0' }}>
          <div style={{ background: P.paper, border: `2px solid ${P.ink}`, borderRadius: 16, padding: '16px 16px 18px', boxShadow: `4px 4px 0 ${P.ink}` }}>
            <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between' }}>
              <div style={{ font: disp(14), color: P.red, letterSpacing: 0.4, textTransform: 'uppercase' }}>step {String(stepIdx + 1).padStart(2, '0')} / {String(total).padStart(2, '0')}</div>
              <div style={{ font: mono(10), opacity: 0.6 }}>{stepLabel}</div>
            </div>
            {step.text
              ? <div style={{ font: body(20, 700), lineHeight: 1.2, marginTop: 8, color: P.ink }}>{step.text}</div>
              : <div style={{ font: body(15, 500), lineHeight: 1.4, marginTop: 8, color: P.ink, opacity: 0.5 }}>no steps added yet</div>
            }
            {step.timer > 0 && (
              <div onClick={handleTimer} style={{ marginTop: 14, display: 'inline-flex', alignItems: 'center', gap: 8, padding: '7px 12px', background: timerRunning ? P.red : P.ink, color: P.bg, borderRadius: 999, cursor: 'pointer', transition: 'background 0.15s' }}>
                <Icon name={timerRunning ? 'pause' : 'play'} size={11} />
                <span style={{ font: disp(14), fontVariantNumeric: 'tabular-nums' }}>
                  {String(Math.floor(displayTime / 60)).padStart(2, '0')}:{String(displayTime % 60).padStart(2, '0')}
                </span>
                <span style={{ font: mono(9), opacity: 0.7, letterSpacing: 0.5, textTransform: 'uppercase' }}>
                  {timerRunning ? 'tap to pause' : timerLeft > 0 && timerLeft < step.timer ? 'tap to resume' : 'tap to start'}
                </span>
              </div>
            )}
          </div>
          {isOwner && (
            <div style={{ marginTop: 12, display: 'flex', justifyContent: 'flex-end' }}>
              <div onClick={!deleting ? handleDelete : undefined} style={{ font: mono(10), color: confirmDel ? P.bg : P.ink, opacity: confirmDel ? 1 : 0.4, cursor: deleting ? 'not-allowed' : 'pointer', letterSpacing: 0.5, padding: '6px 12px', borderRadius: 999, background: confirmDel ? P.red : 'transparent', border: `1.5px solid ${confirmDel ? P.red : 'transparent'}`, transition: 'all 0.15s' }}>
                {deleting ? 'deleting…' : confirmDel ? 'tap again to confirm' : 'delete recipe'}
              </div>
            </div>
          )}
        </div>
      )}

      {/* Step navigation (only in steps tab) */}
      {activeTab === 'steps' && (
        <div style={{ position: 'absolute', left: 0, right: 0, bottom: 0, padding: '14px 18px 28px', background: P.bg, borderTop: `2px solid ${P.ink}`, display: 'grid', gridTemplateColumns: '52px 1fr 52px', gap: 10, alignItems: 'center' }}>
          <div onClick={() => setStepIdx(i => Math.max(0, i - 1))} style={{ height: 52, borderRadius: 14, border: `2px solid ${P.ink}`, display: 'grid', placeItems: 'center', cursor: 'pointer', opacity: stepIdx === 0 ? 0.3 : 1 }}>
            <Icon name="back" size={20} />
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
            <div style={{ display: 'flex', gap: 5 }}>
              {steps.map((_, i) => <span key={i} onClick={() => setStepIdx(i)} style={{ width: i === stepIdx ? 22 : 8, height: 8, borderRadius: 4, cursor: 'pointer', background: i <= stepIdx ? P.red : `${P.ink}33`, transition: 'width 0.2s ease' }} />)}
            </div>
            <div style={{ font: mono(9), opacity: 0.6, letterSpacing: 0.8 }}>{stepIdx + 1} of {total}</div>
          </div>
          <div onClick={() => stepIdx < total - 1 ? setStepIdx(i => i + 1) : handleComplete()} style={{ height: 52, borderRadius: 14, background: P.ink, color: P.bg, display: 'grid', placeItems: 'center', cursor: 'pointer' }}>
            {stepIdx < total - 1 ? <Icon name="arrow" size={20} stroke={P.bg} /> : <Icon name="check" size={20} stroke={P.bg} />}
          </div>
        </div>
      )}
    </>
  );
}

// ── Window width ───────────────────────────────────────────────────────────
function useWindowWidth() {
  const [w, setW] = useState(window.innerWidth);
  useEffect(() => {
    const h = () => setW(window.innerWidth);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return w;
}

        sb.from('steps').select('*').eq('recipe_id', recipe.id).order('sort_order'),
      ]);
      setDetail({ title: recipe.title, author: recipe.author, time: recipe.time, cooks: recipe.cooks, servings: recipe.servings || 2, ingredients: ings || [], steps: (stps || []).map(s => ({ text: s.text, timer: s.timer_seconds || 0 })) });
      setServes(recipe.servings || 2);
    })();
  }, [recipe?.id]);

  async function handleDelete() {
    if (!confirmDel) { setConfirmDel(true); return; }
    setDeleting(true);
    try { await sb.from('recipes').delete().eq('id', recipe.id); onDeleted?.(); }
    catch { setDeleting(false); setConfirmDel(false); }
  }

  const origServings = detail?.servings || 2;
  const steps        = detail?.steps || [];
  const ingredients  = detail?.ingredients || [];

  return (
    <>
      <div style={{ padding: '16px 18px', borderBottom: `2px solid ${P.ink}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
        <div style={{ display: 'flex', gap: 8 }}>
          {isOwner && (
            <div onClick={() => onEdit(recipe)} style={{ width: 32, height: 32, borderRadius: '50%', background: P.yellow, border: `1.8px solid ${P.ink}`, display: 'grid', placeItems: 'center', cursor: 'pointer' }}>
              <Icon name="pen" size={14} />
            </div>
          )}
          <div onClick={() => toggleSave?.(recipe?.id)} style={{ width: 32, height: 32, borderRadius: '50%', background: isSaved ? P.yellow : 'transparent', border: `1.8px solid ${P.ink}`, display: 'grid', placeItems: 'center', cursor: 'pointer', transition: 'background 0.15s' }}>
            <Icon name="bookmark" size={15} />
          </div>
        </div>
        <div onClick={onClose} style={{ width: 32, height: 32, borderRadius: '50%', border: `1.8px solid ${P.ink}`, display: 'grid', placeItems: 'center', cursor: 'pointer' }}>
          <Icon name="close" size={16} />
        </div>
      </div>

      <div style={{ flex: 1, overflowY: 'auto' }}>
        <div style={{ height: 160, position: 'relative' }}>
          <FoodPlaceholder color={recipe.color || '#E8C36E'} accent={recipe.accent || P.ink} label={typeof recipe.id === 'string' && recipe.id.length < 20 ? recipe.id : null} />
          <div style={{ position: 'absolute', top: 10, left: 14, display: 'flex', alignItems: 'center', gap: 6 }}>
            <Avatar name={recipe.author || 'chef'} size={26} />
            <Sticker bg={P.red} color={P.bg} rotate={-2} size={10}>by {recipe.author}</Sticker>
          </div>
          <div style={{ position: 'absolute', bottom: 10, right: 12, display: 'flex', gap: 5 }}>
            <Sticker bg={P.ink} color={P.bg} rotate={1} size={9}>{recipe.time}</Sticker>
            <Sticker bg={P.yellow} color={P.ink} rotate={-2} size={9}>{recipe.cooks} cooks</Sticker>
          </div>
        </div>

        <div style={{ padding: '14px 18px 24px' }}>
          <div style={{ font: `800 26px/0.92 'Bricolage Grotesque', sans-serif`, letterSpacing: -0.8, color: P.ink }}>{recipe.title?.toLowerCase()}</div>

          {recipe.tags?.length > 0 && (
            <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap', marginTop: 10 }}>
              {recipe.tags.map((t, i) => <Sticker key={t} bg={i % 2 ? P.yellow : P.red} color={P.ink} rotate={i % 2 ? 2 : -3} size={9}>{t}</Sticker>)}
            </div>
          )}

          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: 14 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, border: `1.8px solid ${P.ink}`, borderRadius: 999, padding: '4px 4px 4px 12px' }}>
              <Eyebrow style={{ opacity: 0.9 }}>serves</Eyebrow>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <div onClick={() => setServes(s => Math.max(1, s - 1))} style={{ width: 26, height: 26, borderRadius: '50%', border: `1.5px solid ${P.ink}`, display: 'grid', placeItems: 'center', cursor: 'pointer' }}><Icon name="minus" size={12} width={2.5} /></div>
                <span style={{ font: disp(16), minWidth: 14, textAlign: 'center' }}>{serves}</span>
                <div onClick={() => setServes(s => s + 1)} style={{ width: 26, height: 26, borderRadius: '50%', background: P.red, color: P.bg, display: 'grid', placeItems: 'center', cursor: 'pointer' }}><Icon name="plus" size={12} width={2.5} /></div>
              </div>
            </div>
            <div style={{ font: mono(10), opacity: 0.6 }}>{serves === origServings ? 'as written' : `×${(serves / origServings).toFixed(1)}`}</div>
          </div>

          <div style={{ display: 'flex', gap: 18, marginTop: 16, borderBottom: `1.5px solid ${P.ink}22` }}>
            {['ingredients','steps'].map(tab => (
              <div key={tab} onClick={() => setActiveTab(tab)} style={{ paddingBottom: 8, font: body(14, activeTab === tab ? 800 : 600), color: P.ink, opacity: activeTab === tab ? 1 : 0.45, borderBottom: activeTab === tab ? `3px solid ${P.red}` : '3px solid transparent', marginBottom: -1.5, cursor: 'pointer' }}>{tab}</div>
            ))}
          </div>

          {!detail ? (
            <div style={{ paddingTop: 20, textAlign: 'center', font: mono(11), opacity: 0.45, letterSpacing: 1.5, textTransform: 'uppercase' }}>loading…</div>
          ) : activeTab === 'ingredients' ? (
            <div style={{ marginTop: 14, display: 'flex', flexDirection: 'column' }}>
              {ingredients.length === 0
                ? <div style={{ font: body(14), opacity: 0.4, marginTop: 8 }}>no ingredients listed</div>
                : ingredients.map((ing, i) => (
                  <div key={i} style={{ display: 'grid', gridTemplateColumns: '80px 1fr', gap: 8, padding: '8px 0', borderBottom: `1px solid ${P.ink}22` }}>
                    <span style={{ font: `700 15px/1.2 'Bricolage Grotesque', sans-serif`, color: P.red }}>{ing.qty}</span>
                    <span style={{ font: body(14) }}>{ing.item}</span>
                  </div>
                ))
              }
            </div>
          ) : (
            <div style={{ marginTop: 14, display: 'flex', flexDirection: 'column', gap: 10 }}>
              {steps.length === 0
                ? <div style={{ font: body(14), opacity: 0.4, marginTop: 8 }}>no steps yet</div>
                : steps.map((step, i) => (
                  <div key={i} style={{ display: 'grid', gridTemplateColumns: '24px 1fr', gap: 10, alignItems: 'start', padding: '12px 14px', background: P.bg, border: `1.5px solid ${P.ink}22`, borderRadius: 12 }}>
                    <span style={{ font: `800 13px/1.5 'Bricolage Grotesque', sans-serif`, color: P.red }}>{i + 1}.</span>
                    <span style={{ font: body(14), lineHeight: 1.5 }}>{step.text}</span>
                  </div>
                ))
              }
            </div>
          )}

          {isOwner && (
            <div style={{ marginTop: 20, display: 'flex', justifyContent: 'flex-end' }}>
              <div onClick={!deleting ? handleDelete : undefined} style={{ font: mono(10), color: confirmDel ? P.bg : P.ink, opacity: confirmDel ? 1 : 0.4, cursor: 'pointer', letterSpacing: 0.5, padding: '6px 12px', borderRadius: 999, background: confirmDel ? P.red : 'transparent', border: `1.5px solid ${confirmDel ? P.red : 'transparent'}`, transition: 'all 0.15s' }}>
                {deleting ? 'deleting…' : confirmDel ? 'tap again to confirm' : 'delete recipe'}
              </div>
            </div>
          )}
        </div>
      </div>
    </>
  );
}

// ╭─────────────────────────────────────────────────────────────────────────╮
// │  Desktop layout                                                         │
// ╰─────────────────────────────────────────────────────────────────────────╯
function DesktopLayout({ user, recipes, loading, reload, saved, toggleSave }) {
  const [screen, setScreen]                 = useState('home');
  const [selectedRecipe, setSelectedRecipe] = useState(null);
  const [editRecipe, setEditRecipe]         = useState(null);
  const [query, setQuery]                   = useState('');
  const username = user?.user_metadata?.username || user?.email?.split('@')[0] || 'you';

  function navigate(s) {
    if (s === 'search') { setScreen('home'); return; }
    setScreen(s);
    if (s === 'home') setEditRecipe(null);
  }
  function openEdit(r)    { setEditRecipe(r); setScreen('manual'); }
  function afterSaved()   { reload(); setScreen('home'); setEditRecipe(null); }
  function afterDeleted() { setSelectedRecipe(null); reload(); }

  const q = query.trim().toLowerCase();
  const filteredRecipes = q
    ? recipes.filter(r =>
        r.title.toLowerCase().includes(q) ||
        r.author.toLowerCase().includes(q) ||
        (r.tags || []).some(t => t.includes(q))
      )
    : recipes;
  const savedRecipes = recipes.filter(r => saved?.has(r.id));
  const myRecipes    = recipes.filter(r => r.author_id === user?.id);

  const sideNav = [
    { key: 'home',    icon: 'home',     label: 'feed'    },
    { key: 'saved',   icon: 'bookmark', label: 'saved'   },
    { key: 'search',  icon: 'search',   label: 'search'  },
    { key: 'profile', icon: 'user',     label: 'profile' },
  ];

  const sheetOpts = [
    { icon: 'pen',    title: 'type it out',   sub: 'manual entry',                    bg: P.yellow, color: P.ink, to: 'manual' },
    { icon: 'link',   title: 'paste a link',  sub: 'we pull it from the web',         bg: P.bg,     color: P.ink, to: 'link'   },
    { icon: 'camera', title: 'snap a recipe', sub: 'cookbook page, card, screenshot', bg: P.red,    color: P.bg,  to: 'scan'   },
  ];

  const showDetail = !!selectedRecipe && !['sheet','manual','link','scan'].includes(screen);

  return (
    <div style={{ display: 'flex', width: '100vw', height: '100vh', background: '#1a1815', overflow: 'hidden' }}>

      {/* Sidebar */}
      <div style={{ width: 240, background: P.bg, borderRight: `2px solid ${P.ink}`, display: 'flex', flexDirection: 'column', padding: '32px 18px 28px', flexShrink: 0 }}>
        <Wordmark size={22} />
        <nav style={{ marginTop: 32, display: 'flex', flexDirection: 'column', gap: 2 }}>
          {sideNav.map(item => (
            <div key={item.key} onClick={() => navigate(item.key)} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 12px', borderRadius: 12, background: screen === item.key ? P.ink : 'transparent', color: screen === item.key ? P.bg : P.ink, cursor: 'pointer', userSelect: 'none', font: body(14, screen === item.key ? 700 : 500), transition: 'background 0.1s' }}>
              <Icon name={item.icon} size={18} stroke="currentColor" />
              {item.label}
            </div>
          ))}
        </nav>
        <div style={{ marginTop: 16 }}>
          <div onClick={() => navigate('sheet')} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '11px 14px', background: P.red, color: P.bg, borderRadius: 14, border: `2px solid ${P.ink}`, boxShadow: `3px 3px 0 ${P.ink}`, cursor: 'pointer', userSelect: 'none', font: disp(15) }}>
            <Icon name="plus" size={18} stroke={P.bg} width={2.5} />
            add a recipe
          </div>
        </div>
        <div style={{ marginTop: 'auto', display: 'flex', alignItems: 'center', gap: 10, paddingTop: 16, borderTop: `1.5px solid ${P.ink}22` }}>
          <Avatar name={username} size={34} />
          <div>
            <div style={{ font: body(13, 700), color: P.ink }}>{username}</div>
            {CONFIGURED && <div onClick={() => sb.auth.signOut()} style={{ font: mono(10), color: P.ink, opacity: 0.45, cursor: 'pointer', letterSpacing: 0.3, marginTop: 2 }}>sign out</div>}
          </div>
        </div>
      </div>

      {/* Main area */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', background: P.bg }}>

        {screen === 'home' && <>
          <div style={{ padding: '28px 32px 0', flexShrink: 0 }}>
            <div style={{ font: `800 40px/0.9 'Bricolage Grotesque', sans-serif`, letterSpacing: -1.6, color: P.ink }}>
              what's{' '}
              <span style={{ position: 'relative', display: 'inline-block' }}>
                cooking
                <span style={{ position: 'absolute', left: 0, right: 0, bottom: -4, height: 8, background: P.yellow, zIndex: -1, transform: 'rotate(-1deg)' }} />
              </span>?
            </div>
            <div style={{ marginTop: 14, display: 'flex', alignItems: 'center', gap: 8, padding: '11px 16px', border: `2px solid ${P.ink}`, borderRadius: 999, boxShadow: `3px 3px 0 ${P.ink}`, maxWidth: 460 }}>
              <Icon name="search" size={17} width={2.2} />
              <input
                value={query}
                onChange={e => setQuery(e.target.value)}
                placeholder="noodles, layla, under 30 min…"
                style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', font: body(14), color: P.ink }}
              />
              {query && <div onClick={() => setQuery('')} style={{ cursor: 'pointer', opacity: 0.45, lineHeight: 0 }}><Icon name="close" size={14} /></div>}
            </div>
          </div>
          <div style={{ flex: 1, padding: '18px 32px 32px', overflowY: 'auto', display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(260px, 1fr))', gap: 12, alignContent: 'start' }}>
            {loading
              ? <div style={{ gridColumn: '1/-1', paddingTop: 40, textAlign: 'center', font: mono(11), opacity: 0.5, letterSpacing: 1.5, textTransform: 'uppercase' }}>loading…</div>
              : filteredRecipes.length === 0
              ? <div style={{ gridColumn: '1/-1', paddingTop: 40, textAlign: 'center', font: mono(11), opacity: 0.5, letterSpacing: 1.5, textTransform: 'uppercase' }}>no results</div>
              : filteredRecipes.map(r => <RecipeCard key={r.id} r={r} onClick={() => setSelectedRecipe(r)} />)
            }
          </div>
        </>}

        {screen === 'saved' && <>
          <div style={{ padding: '28px 32px 0', flexShrink: 0 }}>
            <div style={{ font: `800 40px/0.9 'Bricolage Grotesque', sans-serif`, letterSpacing: -1.6, color: P.ink }}>
              your{' '}
              <span style={{ position: 'relative', display: 'inline-block' }}>
                saves
                <span style={{ position: 'absolute', left: 0, right: 0, bottom: -4, height: 8, background: P.yellow, zIndex: -1, transform: 'rotate(-1deg)' }} />
              </span>.
            </div>
          </div>
          <div style={{ flex: 1, padding: '18px 32px 32px', overflowY: 'auto', display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(260px, 1fr))', gap: 12, alignContent: 'start' }}>
            {savedRecipes.length === 0
              ? <div style={{ gridColumn: '1/-1', paddingTop: 40, textAlign: 'center' }}>
                  <div style={{ font: mono(11), opacity: 0.5, letterSpacing: 1.5, textTransform: 'uppercase' }}>nothing saved yet</div>
                  <div style={{ marginTop: 10, font: body(13), opacity: 0.4 }}>bookmark recipes from the feed</div>
                </div>
              : savedRecipes.map(r => <RecipeCard key={r.id} r={r} onClick={() => setSelectedRecipe(r)} />)
            }
          </div>
        </>}

        {screen === 'profile' && (
          <div style={{ flex: 1, overflowY: 'auto', padding: '32px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 20, paddingBottom: 24, borderBottom: `2px solid ${P.ink}`, marginBottom: 24 }}>
              <Avatar name={username} size={72} />
              <div>
                <div style={{ font: `800 28px/1 'Bricolage Grotesque', sans-serif`, letterSpacing: -0.8, color: P.ink }}>{username}</div>
                {user?.email && <div style={{ font: mono(11), opacity: 0.5, letterSpacing: 0.3, marginTop: 6 }}>{user.email}</div>}
                <div style={{ display: 'flex', gap: 20, marginTop: 12 }}>
                  <div>
                    <span style={{ font: `800 18px/1 'Bricolage Grotesque', sans-serif`, color: P.red }}>{myRecipes.length}</span>
                    <span style={{ font: mono(10), opacity: 0.55, textTransform: 'uppercase', letterSpacing: 1, marginLeft: 6 }}>recipes</span>
                  </div>
                  <div>
                    <span style={{ font: `800 18px/1 'Bricolage Grotesque', sans-serif`, color: P.red }}>{savedRecipes.length}</span>
                    <span style={{ font: mono(10), opacity: 0.55, textTransform: 'uppercase', letterSpacing: 1, marginLeft: 6 }}>saved</span>
                  </div>
                </div>
              </div>
              {CONFIGURED && user && (
                <div onClick={() => sb.auth.signOut()} style={{ marginLeft: 'auto', padding: '10px 18px', border: `2px solid ${P.ink}`, borderRadius: 12, font: body(13, 700), cursor: 'pointer', color: P.ink, opacity: 0.55 }}>
                  sign out
                </div>
              )}
            </div>
            <Eyebrow style={{ marginBottom: 14 }}>my recipes</Eyebrow>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(260px, 1fr))', gap: 12 }}>
              {myRecipes.length === 0
                ? <div style={{ font: mono(11), opacity: 0.5, letterSpacing: 1.5, textTransform: 'uppercase' }}>no recipes yet</div>
                : myRecipes.map(r => <RecipeCard key={r.id} r={r} onClick={() => setSelectedRecipe(r)} />)
              }
            </div>
          </div>
        )}

        {screen === 'sheet' && (
          <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <div style={{ width: 460, background: P.bg, border: `2px solid ${P.ink}`, borderRadius: 20, padding: '28px 24px', boxShadow: `6px 6px 0 ${P.ink}` }}>
              <div style={{ font: disp(26), letterSpacing: -0.6, marginBottom: 20 }}>
                <span style={{ position: 'relative', display: 'inline-block' }}>
                  add<span style={{ position: 'absolute', left: -2, right: -2, bottom: -3, height: 7, background: P.red, zIndex: -1, transform: 'rotate(-1deg)' }} />
                </span>{' '}a recipe
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                {sheetOpts.map(o => (
                  <div key={o.title} onClick={() => navigate(o.to)} style={{ display: 'grid', gridTemplateColumns: '52px 1fr 22px', alignItems: 'center', gap: 12, padding: '14px', background: o.bg, color: o.color, border: `2px solid ${P.ink}`, borderRadius: 14, boxShadow: `4px 4px 0 ${P.ink}`, cursor: 'pointer', userSelect: 'none' }}>
                    <div style={{ width: 46, height: 46, borderRadius: 10, background: P.ink, color: P.bg, display: 'grid', placeItems: 'center' }}>
                      <Icon name={o.icon} size={22} width={2.2} />
                    </div>
                    <div>
                      <div style={{ font: disp(19), letterSpacing: -0.4 }}>{o.title}</div>
                      <div style={{ font: mono(10), opacity: 0.7, marginTop: 3, letterSpacing: 0.4 }}>{o.sub}</div>
                    </div>
                    <Icon name="arrow" size={20} />
                  </div>
                ))}
              </div>
              <div onClick={() => navigate('home')} style={{ marginTop: 16, textAlign: 'center', font: mono(11), opacity: 0.5, cursor: 'pointer', letterSpacing: 0.5 }}>cancel</div>
            </div>
          </div>
        )}

        {screen === 'manual' && <ManualScreen onNavigate={navigate} user={user} editRecipe={editRecipe} onSaved={() => { setEditRecipe(null); afterSaved(); }} />}
        {screen === 'link'   && <LinkScreen   onNavigate={navigate} user={user} onSaved={reload} />}
        {screen === 'scan'   && <ScanScreen   onNavigate={navigate} />}
      </div>

      {/* Detail panel */}
      {showDetail && (
        <div style={{ width: 380, background: P.paper, borderLeft: `2px solid ${P.ink}`, display: 'flex', flexDirection: 'column', overflow: 'hidden', flexShrink: 0 }}>
          <DesktopRecipeDetail recipe={selectedRecipe} user={user} onClose={() => setSelectedRecipe(null)} onDeleted={afterDeleted} onEdit={openEdit} saved={saved} toggleSave={toggleSave} />
        </div>
      )}
    </div>
  );
}

// ╭─────────────────────────────────────────────────────────────────────────╮
// │  App root                                                               │
// ╰─────────────────────────────────────────────────────────────────────────╯
function App() {
  const user                                    = useAuth();
  const { recipes, loading, reload }            = useRecipes();
  const { saved, toggleSave }                   = useSaves(user);
  const [screen, setScreen]                     = useState('home');
  const [selectedRecipe, setSelectedRecipe]     = useState(null);
  const [editRecipe, setEditRecipe]             = useState(null);
  const isDesktop                               = useWindowWidth() >= 900;

  function navigate(s) {
    if (s === 'search') { setScreen('home'); return; }
    setScreen(s);
  }
  function openRecipe(r) { setSelectedRecipe(r); setScreen('cooking'); }
  function openEdit(r)   { setEditRecipe(r); setScreen('manual'); }
  function afterSaved()  { reload(); setScreen('home'); }
  function afterDeleted(){ setSelectedRecipe(null); reload(); setScreen('home'); }

  if (user === undefined) {
    return (
      <div style={{ width: '100vw', height: '100vh', background: '#1a1815', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <Phone>
          <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 16 }}>
            <Wordmark size={26} />
            <div style={{ font: mono(11), opacity: 0.45, letterSpacing: 2, textTransform: 'uppercase' }}>loading…</div>
          </div>
        </Phone>
      </div>
    );
  }

  if (CONFIGURED && !user) {
    if (isDesktop) {
      return (
        <div style={{ width: '100vw', height: '100vh', background: '#1a1815', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <div style={{ width: 420, background: P.bg, border: `2px solid ${P.ink}`, borderRadius: 24, boxShadow: `8px 8px 0 ${P.ink}`, overflow: 'hidden' }}>
            <div style={{ height: 520 }}><AuthScreen /></div>
          </div>
        </div>
      );
    }
    return (
      <div style={{ width: '100vw', height: '100vh', background: '#1a1815', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <Phone><AuthScreen /></Phone>
      </div>
    );
  }

  if (isDesktop) {
    return <DesktopLayout user={user} recipes={recipes} loading={loading} reload={reload} saved={saved} toggleSave={toggleSave} />;
  }

  return (
    <div style={{ width: '100vw', height: '100vh', background: '#1a1815', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <Phone>
        {(screen === 'home' || screen === 'sheet') && <HomeScreen recipes={recipes} loading={loading} onNavigate={navigate} onOpenRecipe={openRecipe} user={user} saved={saved} toggleSave={toggleSave} />}
        {screen === 'sheet'   && <SheetOverlay onNavigate={navigate} />}
        {screen === 'saved'   && <SavedScreen  onNavigate={navigate} onOpenRecipe={openRecipe} user={user} recipes={recipes} saved={saved} />}
        {screen === 'profile' && <ProfileScreen onNavigate={navigate} onOpenRecipe={openRecipe} user={user} recipes={recipes} />}
        {screen === 'manual'  && <ManualScreen onNavigate={navigate} user={user} editRecipe={editRecipe} onSaved={() => { setEditRecipe(null); afterSaved(); }} />}
        {screen === 'link'    && <LinkScreen   onNavigate={navigate} user={user} onSaved={reload} />}
        {screen === 'scan'    && <ScanScreen   onNavigate={navigate} />}
        {screen === 'cooking' && <CookingScreen recipe={selectedRecipe} user={user} onNavigate={navigate} onDeleted={afterDeleted} onEdit={openEdit} saved={saved} toggleSave={toggleSave} />}
      </Phone>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
