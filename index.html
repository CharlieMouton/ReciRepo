// ── Ingredient quantity scaling ────────────────────────────────────────────
const UNICODE_FRACS = { '¼':0.25,'½':0.5,'¾':0.75,'⅓':1/3,'⅔':2/3,'⅛':0.125,'⅜':0.375,'⅝':0.625,'⅞':0.875 };
const FRAC_SYMS = [[3/4,'¾'],[2/3,'⅔'],[1/2,'½'],[1/3,'⅓'],[1/4,'¼'],[3/8,'⅜'],[1/8,'⅛']];

function parseQtyNum(qty) {
  if (!qty) return { num: null, rest: '' };
  let s = qty.trim(); let num = 0; let matched = false;
  const intM = s.match(/^(\d+)\s*/);
  if (intM) { num = parseInt(intM[1]); s = s.slice(intM[0].length); matched = true; }
  if (UNICODE_FRACS[s[0]] !== undefined) {
    num += UNICODE_FRACS[s[0]]; s = s.slice(1).trimStart(); matched = true;
  } else {
    const fracM = s.match(/^(\d+)\s*\/\s*(\d+)\s*/);
    if (fracM) { num += parseInt(fracM[1]) / parseInt(fracM[2]); s = s.slice(fracM[0].length); matched = true; }
  }
  return { num: matched ? num : null, rest: s };
}

function formatNum(n) {
  if (n === 0) return '0';
  const whole = Math.floor(n); const frac = n - whole;
  for (const [val, sym] of FRAC_SYMS) {
    if (Math.abs(frac - val) < 0.04) return whole > 0 ? `${whole} ${sym}` : sym;
  }
  if (Math.abs(frac) < 0.04) return String(Math.round(n));
  return String(Math.round(n * 4) / 4).replace(/(\.\d*?)0+$/, '$1').replace(/\.$/, '');
}

function scaleQty(qty, factor) {
  if (!qty || !factor || factor === 1) return qty;
  const { num, rest } = parseQtyNum(qty);
  if (num === null) return qty; // "to taste", "a pinch" etc.
  return rest ? `${formatNum(num * factor)} ${rest}` : formatNum(num * factor);
}

// Normalise an ingredient to consistent lowercase + collapsed whitespace.
// Applied at parse-time (URL / OCR) and at save-time (manual entry) so
// the database always receives clean data.
function normalizeIngredient({ qty, item }) {
  const clean = s => (s || '').trim().replace(/\s+/g, ' ').toLowerCase();
  return { qty: clean(qty), item: clean(item) };
}

function getStaticSuggestions(q) {
  if (!q || q.length < 2) return [];
  const lower = q.toLowerCase();
  const prefix = COMMON_INGREDIENTS.filter(s => s.startsWith(lower));
  const substr = COMMON_INGREDIENTS.filter(s => !s.startsWith(lower) && s.includes(lower));
  return [...prefix, ...substr].slice(0, 6);
}

// ── URL recipe extraction ──────────────────────────────────────────────────
function parseDuration(iso) {
  if (!iso) return '';
  const h = (iso.match(/(\d+)H/) || [])[1];
  const m = (iso.match(/(\d+)M/) || [])[1];
  if (h && m) return `${h} h ${m} min`;
  if (h)      return `${h} h`;
  if (m)      return `${m} min`;
  return '';
}

function parseIngredient(str) {
  // Supports integers, decimals (2.5), unicode fractions, and slash fractions.
  // The optional (?:\s+\w+)? in group 1 captures a unit word like "cups".
  const m = str.match(/^([\d.\s¼-¾⅐-⅞\/]+(?:\s+\w+)?)\s+(.+)/);
  if (m) {
    const item = m[2].trim();
    // Guard: if the captured "item" is only a unit word (e.g. "2 cups" with
    // nothing after it), the line has no ingredient name yet — return it
    // unparsed so mergeIngredientLines can attach the following line.
    if (UNIT_WORDS.has(item.toLowerCase())) {
      return normalizeIngredient({ qty: '', item: str });
    }
    return normalizeIngredient({ qty: m[1].trim(), item });
  }
  return normalizeIngredient({ qty: '', item: str });
}

// Detects consecutive lines where line N is qty-only ("2 cups") and line N+1
// is the ingredient name ("flour"), then merges them before parsing.
function mergeIngredientLines(lines) {
  function isQtyOnly(line) {
    if (!/^[\d¼-¾⅐-⅞]/.test(line)) return false;
    const parts = line.split(/\s+/);
    if (parts.length > 2) return false; // has an ingredient word already
    if (parts.length === 2 && !UNIT_WORDS.has(parts[1].toLowerCase())) return false;
    return true;
  }
  const merged = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (isQtyOnly(line) && i + 1 < lines.length && !isQtyOnly(lines[i + 1])) {
      merged.push(`${line} ${lines[i + 1]}`);
      i += 2;
    } else {
      merged.push(line);
      i++;
    }
  }
  return merged;
}

async function extractRecipeFromUrl(url) {
  // Try allorigins first; fall back to corsproxy.io for Cloudflare-protected sites
  let contents = null;
  try {
    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
    if (res.ok) {
      const json = await res.json();
      if (json.contents) contents = json.contents;
    }
  } catch {}
  if (!contents) {
    try {
      const res = await fetch(`https://corsproxy.io/?url=${encodeURIComponent(url)}`);
      if (res.ok) contents = await res.text();
    } catch {}
  }
  if (!contents) throw new Error('couldn\'t reach that page — the site may block imports');

  // Find all JSON-LD blocks
  const scripts = [...contents.matchAll(/<script[^>]+type=["']application\/ld\+json["'][^>]*>([\s\S]*?)<\/script>/gi)];
  for (const [, raw] of scripts) {
    let data;
    try { data = JSON.parse(raw.trim()); } catch { continue; }

    // Unwrap @graph arrays
    const candidates = [data, ...(data['@graph'] || [])];
    const recipe = candidates.find(n =>
      [].concat(n['@type'] || []).some(t => t === 'Recipe')
    );
    if (!recipe) continue;

    // Time: prefer totalTime, else sum cook + prep
    const timeIso = recipe.totalTime ||
      (recipe.cookTime && recipe.prepTime ? undefined : recipe.cookTime || recipe.prepTime);
    let time = parseDuration(timeIso);
    if (!time && recipe.cookTime && recipe.prepTime) {
      const mins = s => {
        if (!s) return 0;
        const h = Number((s.match(/(\d+)H/) || [0,0])[1]);
        const m = Number((s.match(/(\d+)M/) || [0,0])[1]);
        return h * 60 + m;
      };
      const total = mins(recipe.cookTime) + mins(recipe.prepTime);
      time = total >= 60
        ? `${Math.floor(total/60)} h${total%60 ? ' '+total%60+' min' : ''}`.trim()
        : `${total} min`;
    }

    // Servings: may be "4 servings" or just "4"
    const yieldRaw = [].concat(recipe.recipeYield || [])[0] || '';
    const servings = parseInt(yieldRaw) || 2;

    // Ingredients
    const ingredients = (recipe.recipeIngredient || []).map(parseIngredient);

    // Steps: HowToStep array or string array
    const steps = (recipe.recipeInstructions || []).map(s =>
      typeof s === 'string' ? s : (s.text || '')
    ).filter(Boolean);

    return {
      title:       recipe.name || '',
      time,
      servings,
      ingredients: ingredients.length ? ingredients : [{ qty: '', item: '' }],
      steps:       steps.length ? steps : [''],
      tags:        [],
      source_url:  url,
    };
  }
  // No JSON-LD found — strip HTML and try the plaintext heuristic parser
  const text = contents
    .replace(/<script[\s\S]*?<\/script>/gi, ' ')
    .replace(/<style[\s\S]*?<\/style>/gi, ' ')
    .replace(/<[^>]+>/g, ' ')
    .replace(/&nbsp;/g, ' ').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"')
    .replace(/[ \t]{2,}/g, ' ')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
  return parseRecipeText(text);
}

function parseRecipeText(raw) {
  const lines = raw.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  if (!lines.length) return null;

  // ── Section header detectors ──────────────────────────────────────────────
  // Ingredients: "Ingredients", "What you need / what you'll need",
  //              "You will need", "For the sauce / filling" etc.
  const isIngHead = l =>
    /^ingred/i.test(l) ||
    /^what\s+you(?:'ll|will)?\s+need/i.test(l) ||
    /^you\s+will\s+need/i.test(l) ||
    /^for\s+the\s+\w/i.test(l);

  // Steps: original keywords + "how to", "to make"
  const isStepHead = l =>
    /^(instruct|direction|method|steps?|preparation)/i.test(l) ||
    /^how\s+to/i.test(l) ||
    /^to\s+make/i.test(l);

  const ingStart  = lines.findIndex(isIngHead);
  const stepStart = lines.findIndex(isStepHead);

  // Title: everything before the first section header (or just the first line)
  const firstSection = [ingStart, stepStart].filter(i => i > 0).sort((a, b) => a - b)[0];
  const title = (firstSection > 0 ? lines.slice(0, firstSection) : lines.slice(0, 1))
    .filter(l => !isIngHead(l) && !isStepHead(l))
    .join(' ')
    .replace(/^#+\s*/, '')
    .trim();

  // ── Heuristics for header-less text ──────────────────────────────────────
  // Step: numbered ("1. Boil…", "1) …", "Step 1…") OR reasonably long.
  const looksLikeStep = l =>
    /^\d+[\.\):]\s*\S/.test(l) ||
    /^step\s+\d/i.test(l) ||
    l.length >= 35;

  // Ingredient: starts with digit/fraction/bullet OR is short and not a step.
  // The short-line branch catches "Salt, to taste" and similar qty-less items.
  const looksLikeIngredient = l =>
    (/^[\d¼-¾⅐-⅞•\-–*]/.test(l) || l.length < 60) &&
    !looksLikeStep(l);

  let rawIngredients, rawSteps;
  if (ingStart >= 0 || stepStart >= 0) {
    const ingEnd = (stepStart > ingStart && stepStart >= 0) ? stepStart : lines.length;
    rawIngredients = ingStart  >= 0 ? lines.slice(ingStart  + 1, ingEnd      ).filter(l => !isIngHead(l) && !isStepHead(l)) : [];
    rawSteps       = stepStart >= 0 ? lines.slice(stepStart + 1, lines.length).filter(l => !isStepHead(l))                   : [];
  } else {
    rawIngredients = lines.slice(1).filter(looksLikeIngredient);
    rawSteps       = lines.slice(1).filter(looksLikeStep);
  }

  // Strip bullet markers first, then merge qty-only lines with the following
  // ingredient-name line (e.g. "2 cups" / "flour" → "2 cups flour").
  rawIngredients = rawIngredients.map(l => l.replace(/^[•\-–*]\s*/, ''));
  rawIngredients = mergeIngredientLines(rawIngredients);

  // Strip step numbering ("1.", "1)", "1:") and finalise.
  rawSteps = rawSteps.map(s => s.replace(/^\d+[\.\):]\s*/, '').trim()).filter(Boolean);
  const ingredients = rawIngredients.map(l => parseIngredient(l));

  return {
    title,
    time:        '',
    servings:    2,
    ingredients: ingredients.length ? ingredients : [{ qty: '', item: '' }],
    steps:       rawSteps.length    ? rawSteps    : [''],
    tags:        [],
    source_url:  '',
  };
}

async function extractRecipeFromImage(file) {
  const base64 = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
  const formData = new FormData();
  formData.append('apikey',              OCR_SPACE_KEY);
  formData.append('base64Image',         base64);
  formData.append('language',            'eng');
  formData.append('isOverlayRequired',   'false');
  formData.append('detectOrientation',   'true');
  formData.append('scale',               'true');
  formData.append('OCREngine',           '2');
  const res = await fetch('https://api.ocr.space/parse/image', { method: 'POST', body: formData });
  if (!res.ok) throw new Error('OCR service unavailable');
  const json = await res.json();
  if (json.IsErroredOnProcessing) throw new Error(json.ErrorMessage?.[0] || 'OCR failed');
  const text = (json.ParsedResults || []).map(r => r.ParsedText).join('\n').trim();
  if (!text) throw new Error('no text found in image');
  return parseRecipeText(text);
}

// ── Hooks ──────────────────────────────────────────────────────────────────
function useAuth() {
  const [user, setUser] = useState(undefined); // undefined = still loading

  useEffect(() => {
    if (!CONFIGURED) { setUser(null); return; }
    sb.auth.getSession().then(({ data: { session } }) => setUser(session?.user ?? null));
    const { data: { subscription } } = sb.auth.onAuthStateChange((_, session) => setUser(session?.user ?? null));
    return () => subscription.unsubscribe();
  }, []);

  return user;
}

function useRecipes() {
  const [recipes, setRecipes] = useState(CONFIGURED ? [] : SAMPLE_RECIPES);
  const [loading, setLoading] = useState(CONFIGURED);

  async function load() {
    if (!CONFIGURED) return;
    setLoading(true);
    try {
      const { data } = await sb.from('recipes_with_meta').select('*').order('created_at', { ascending: false });
      setRecipes(
        data && data.length
          ? data.map(r => {
              const isLink = !!r.source_url && !r.time_text;
              return { id: r.id, title: r.title, author: r.author_username, author_id: r.author_id, time: r.time_text || '?', servings: r.servings || 2, tags: r.tags || [], color: r.color, accent: r.accent, cooks: Number(r.cook_count) || 0, image_url: r.image_url || null, source_url: r.source_url || null, is_link: isLink };
            })
          : []
      );
    } catch { setRecipes([]); }
    finally { setLoading(false); }
  }

  useEffect(() => { load(); }, []);
  return { recipes, loading, reload: load };
}

function useSaves(user) {
  const [saved, setSaved] = useState(new Set());
  useEffect(() => {
    if (!CONFIGURED || !user) return;
    sb.from('saves').select('recipe_id').eq('user_id', user.id)
      .then(({ data }) => setSaved(new Set((data || []).map(s => s.recipe_id))));
  }, [user?.id]);
  async function toggleSave(recipeId) {
    if (!recipeId) return;
    if (!CONFIGURED || !user) return;
    const isSaved = saved.has(recipeId);
    setSaved(prev => { const n = new Set(prev); isSaved ? n.delete(recipeId) : n.add(recipeId); return n; });
    if (isSaved) {
      await sb.from('saves').delete().eq('user_id', user.id).eq('recipe_id', recipeId);
    } else {
      await sb.from('saves').insert({ user_id: user.id, recipe_id: recipeId });
    }
  }
  return { saved, toggleSave };
}

function Icon({ name, size = 20, stroke = 'currentColor', width = 2, style }) {
  const p = { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke, strokeWidth: width, strokeLinecap: 'round', strokeLinejoin: 'round', style };
  switch (name) {
    case 'search':   return <svg {...p}><circle cx="11" cy="11" r="6"/><path d="M16 16l4 4"/></svg>;
    case 'plus':     return <svg {...p}><path d="M12 5v14M5 12h14"/></svg>;
    case 'close':    return <svg {...p}><path d="M6 6l12 12M18 6l-12 12"/></svg>;
    case 'arrow':    return <svg {...p}><path d="M5 12h14M13 5l7 7-7 7"/></svg>;
    case 'back':     return <svg {...p}><path d="M19 12H5M11 5l-7 7 7 7"/></svg>;
    case 'user':     return <svg {...p}><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg>;
    case 'camera':   return <svg {...p}><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7l2-3h4l2 3"/><circle cx="12" cy="13" r="3.5"/></svg>;
    case 'link':     return <svg {...p}><path d="M10 14a4 4 0 005.7 0l3-3a4 4 0 10-5.7-5.7L11 7"/><path d="M14 10a4 4 0 00-5.7 0l-3 3a4 4 0 105.7 5.7L13 17"/></svg>;
    case 'pen':      return <svg {...p}><path d="M4 20l4-1 12-12-3-3L5 16l-1 4z"/></svg>;
    case 'check':    return <svg {...p}><path d="M5 13l4 4L19 7"/></svg>;
    case 'minus':    return <svg {...p}><path d="M5 12h14"/></svg>;
    case 'play':     return <svg {...p}><path d="M7 4l13 8-13 8V4z" fill="currentColor"/></svg>;
    case 'pause':    return <svg {...p}><rect x="6" y="5" width="4" height="14" fill="currentColor" stroke="none"/><rect x="14" y="5" width="4" height="14" fill="currentColor" stroke="none"/></svg>;
    case 'sparkle':  return <svg {...p}><path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3z"/></svg>;
    case 'home':     return <svg {...p}><path d="M4 10l8-6 8 6v10H4V10z"/><path d="M9 20v-6h6v6"/></svg>;
    case 'bookmark': return <svg {...p}><path d="M6 4h12v17l-6-4-6 4V4z"/></svg>;
    case 'flash':    return <svg {...p}><path d="M13 3L4 14h7l-1 7 9-11h-7l1-7z"/></svg>;
    case 'gallery':  return <svg {...p}><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="10" r="1.5"/><path d="M21 17l-5-6-5 5-3-3-5 5"/></svg>;
    case 'flip':     return <svg {...p}><path d="M21 4v6h-6"/><path d="M3 20v-6h6"/><path d="M21 10A9 9 0 005 7M3 14a9 9 0 0016 3"/></svg>;
    case 'external': return <svg {...p}><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><path d="M15 3h6v6"/><path d="M10 14L21 3"/></svg>;
    default: return null;
  }
}

function Avatar({ name = '?', size = 32, style }) {
  let h = 2166136261;
  for (let i = 0; i < name.length; i++) { h ^= name.charCodeAt(i); h = (h * 16777619) >>> 0; }
  const palettes = [
    ['#D94F4F','#FCEDE2'], ['#F6C26B','#2F2A2A'], ['#A8431A','#F0E3CC'], ['#C68A3E','#2F2A2A'],
    ['#6B7A3E','#F6C26B'], ['#2F2A2A','#F6C26B'], ['#8E3A52','#FCEDE2'], ['#E89B5A','#2F2A2A'],
  ];
  const [bg, fg] = palettes[h % palettes.length];
  const shapes = ['circle','square','diamond','bar','half','donut'];
  const shape = shapes[(h >> 4) % shapes.length];
  const rot = ((h >> 8) % 8) * 15, off = ((h >> 12) % 5) - 2;
  const C = 32, cx = 16 + off, cy = 16 + off;

  // Gradient: blend fg 55% toward bg for stop-2
  const mixHex = (a, b, t) => '#' + [1,3,5].map(i =>
    Math.round(parseInt(a.slice(i,i+2),16)*(1-t) + parseInt(b.slice(i,i+2),16)*t)
      .toString(16).padStart(2,'0')
  ).join('');
  const fg2 = mixHex(fg, bg, 0.5);
  // Second gradient: cross-fade bg at 30% for the background radial
  const bg2 = mixHex(bg, fg, 0.18);
  const gradId  = `avs${(h >>> 0).toString(16)}`;
  const bgGradId = `avb${(h >>> 0).toString(16)}`;
  const gf = `url(#${gradId})`;
  // Gradient direction varies by name hash
  const gx2 = ((h >> 20) % 2) ? '100%' : '0%';
  const gy2 = ((h >> 22) % 2) ? '100%' : '0%';

  let mark;
  switch (shape) {
    case 'circle':  mark = <circle cx={cx} cy={cy} r={9} fill={gf} />; break;
    case 'square':  mark = <rect x={cx-9} y={cy-9} width={18} height={18} fill={gf} />; break;
    case 'diamond': mark = <rect x={cx-8} y={cy-8} width={16} height={16} fill={gf} transform={`rotate(45 ${cx} ${cy})`} />; break;
    case 'bar':     mark = <rect x={0} y={cy-5} width={C} height={10} fill={gf} />; break;
    case 'half':    mark = <><circle cx={cx} cy={cy} r={10} fill={gf}/><rect x={cx-11} y={cy-11} width={22} height={11} fill={`url(#${bgGradId})`}/></>; break;
    default:        mark = <><circle cx={cx} cy={cy} r={10} fill={gf}/><circle cx={cx} cy={cy} r={4} fill={`url(#${bgGradId})`}/></>; break;
  }
  return (
    <div style={{ width: size, height: size, borderRadius: '50%', background: `linear-gradient(135deg, ${bg} 0%, ${bg2} 100%)`, overflow: 'hidden', display: 'inline-block', flexShrink: 0, border: `1.8px solid ${P.ink}`, ...style }}>
      <svg viewBox={`0 0 ${C} ${C}`} width="100%" height="100%" style={{ display: 'block', transform: `rotate(${rot}deg)` }}>
        <defs>
          <linearGradient id={gradId} x1="0%" y1="0%" x2={gx2} y2={gy2}>
            <stop offset="0%" stopColor={fg} />
            <stop offset="100%" stopColor={fg2} />
          </linearGradient>
          <linearGradient id={bgGradId} x1="0%" y1="0%" x2={gx2} y2={gy2}>
            <stop offset="0%" stopColor={bg} />
            <stop offset="100%" stopColor={bg2} />
          </linearGradient>
        </defs>
        {mark}
      </svg>
    </div>
  );
}

          <div>
            <Eyebrow>password</Eyebrow>
            <input type="password" value={password} onChange={e => setPass(e.target.value)} placeholder="••••••••" onKeyDown={e => e.key === 'Enter' && submit()} style={inputStyle()} />
          </div>
        </div>

        {error && <div style={{ marginTop: 8, font: mono(11), color: P.red, letterSpacing: 0.2 }}>{error}</div>}

        <div onClick={!loading ? submit : undefined} style={{ marginTop: 16, padding: '15px', background: loading ? `${P.ink}88` : P.ink, color: P.bg, borderRadius: 14, font: disp(18), letterSpacing: -0.3, textAlign: 'center', cursor: loading ? 'not-allowed' : 'pointer', boxShadow: loading ? 'none' : `4px 4px 0 ${P.red}`, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10 }}>
          {loading ? 'one moment…' : tab === 'signin' ? 'sign in' : 'create account'}
          {!loading && <Icon name="arrow" size={18} stroke={P.bg} />}
        </div>

        {tab === 'signup' && <div style={{ marginTop: 10, font: mono(10), opacity: 0.5, textAlign: 'center', letterSpacing: 0.3 }}>check your inbox to confirm your email</div>}
      </div>
    </div>
  );
}

// ╭─────────────────────────────────────────────────────────────────────────╮
// │  Home screen                                                            │
// ╰─────────────────────────────────────────────────────────────────────────╯
function HomeScreen({ recipes, loading, onNavigate, onOpenRecipe, user, saved, toggleSave, active = 'home', recentlyViewed = [] }) {
  const [query, setQuery]               = useState('');
  const [activeFilter, setActiveFilter] = useState(null);
  const [selectedTags, setSelectedTags] = useState(new Set());
  const [timeLimit, setTimeLimit]       = useState(null);
  const [selectedChef, setSelectedChef] = useState(null);
  const [pantryQuery, setPantryQuery]   = useState('');
  const [pantryIds, setPantryIds]       = useState(null); // Set<id> from Supabase query, null = no query yet
  const searchRef                       = useRef(null);
  const pantryRef                       = useRef(null);
  const username = user?.user_metadata?.username || user?.email?.split('@')[0] || 'you';

  // Auto-focus pantry input when that filter opens
  useEffect(() => {
    if (activeFilter === 'pantry') requestAnimationFrame(() => pantryRef.current?.focus());
  }, [activeFilter]);

  // Debounced Supabase ingredient search for pantry filter
  useEffect(() => {
    if (!CONFIGURED || activeFilter !== 'pantry' || !pantryQuery.trim()) { setPantryIds(null); return; }
    const timer = setTimeout(async () => {
      const { data } = await sb.from('ingredients').select('recipe_id').ilike('item', `%${pantryQuery.trim()}%`);
      setPantryIds(new Set((data || []).map(d => d.recipe_id)));
    }, 300);
    return () => clearTimeout(timer);
  }, [pantryQuery, activeFilter]);

  const q = query.trim().toLowerCase();

  function parseMinutes(t) {
    if (!t) return null;
    const h = Number((t.match(/(\d+)\s*h/) || [0,0])[1]);
    const m = Number((t.match(/(\d+)\s*min/) || [0,0])[1]);
    return (h * 60 + m) || null;
  }

  let filtered = q
    ? recipes.filter(r =>
        r.title.toLowerCase().includes(q) ||
        (r.author || '').toLowerCase().includes(q) ||
        (r.tags || []).some(t => t.includes(q))
      )
    : recipes;
  if (activeFilter === 'tags' && selectedTags.size > 0)
    filtered = filtered.filter(r => [...selectedTags].every(t => (r.tags || []).includes(t)));
  if (activeFilter === 'time' && timeLimit)
    filtered = filtered.filter(r => { const m = parseMinutes(r.time); return m && m <= timeLimit; });
  if (activeFilter === 'chef' && selectedChef)
    filtered = filtered.filter(r => r.author === selectedChef);
  if (activeFilter === 'pantry' && pantryQuery.trim()) {
    const pq = pantryQuery.trim().toLowerCase();
    if (CONFIGURED) { filtered = pantryIds !== null ? filtered.filter(r => pantryIds.has(r.id)) : []; }
    else { filtered = filtered.filter(r => (r.ingredients || []).some(ing => ing.item.toLowerCase().includes(pq))); }
  }

  const allTags = [...new Set(recipes.flatMap(r => r.tags || []))].sort();
  const chefs   = [...new Set(recipes.filter(r => !r.is_link && r.author).map(r => r.author))];
  const isFiltering = q || (activeFilter === 'tags' && selectedTags.size > 0) || (activeFilter === 'time' && timeLimit) || (activeFilter === 'chef' && selectedChef) || (activeFilter === 'pantry' && pantryQuery.trim());

  function resetFilters() { setSelectedTags(new Set()); setTimeLimit(null); setSelectedChef(null); setPantryQuery(''); setPantryIds(null); }
  function toggleFilter(key) { resetFilters(); setActiveFilter(prev => prev === key ? null : key); }

  const filterOpts = [
    { key: null,     label: 'all'    },
    { key: 'tags',   label: 'tags'   },
    { key: 'time',   label: 'time'   },
    { key: 'chef',   label: 'chef'   },
    { key: 'pantry', label: 'pantry' },
  ];

  return (
    <>
      <div style={{ padding: '8px 20px 0', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <Wordmark />
        <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
          <div onClick={() => onNavigate('saved')} style={{ width: 32, height: 32, borderRadius: '50%', border: `1.8px solid ${P.ink}`, display: 'grid', placeItems: 'center', cursor: 'pointer' }}>
            <Icon name="bookmark" size={16} />
          </div>
          <div onClick={() => onNavigate('profile')} style={{ cursor: 'pointer', lineHeight: 0 }}>
            <Avatar name={username} size={32} />
          </div>
        </div>
      </div>

      <div style={{ padding: '14px 20px 0' }}>
        <div style={{ font: `800 36px/0.88 'Bricolage Grotesque', sans-serif`, color: P.ink, letterSpacing: -1.4 }}>
          what's{' '}
          <span style={{ position: 'relative', display: 'inline-block' }}>
            cooking
            <span style={{ position: 'absolute', left: 0, right: 0, bottom: -4, height: 8, background: P.yellow, zIndex: -1, transform: 'rotate(-1deg)' }} />
          </span>?
        </div>
      </div>

      {/* Search bar */}
      <div style={{ padding: '14px 20px 0' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '11px 14px', background: P.bg, border: `2px solid ${P.ink}`, borderRadius: 999, boxShadow: `3px 3px 0 ${P.ink}` }}>
          <Icon name="search" size={17} width={2.2} />
          <input
            ref={searchRef}
            value={query}
            onChange={e => setQuery(e.target.value)}
            placeholder="noodles, layla, under 30 min…"
            style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', font: body(14), color: P.ink }}
          />
          {query && <div onClick={() => setQuery('')} style={{ cursor: 'pointer', opacity: 0.45, lineHeight: 0 }}><Icon name="close" size={14} /></div>}
        </div>
      </div>

      {/* Filter chips */}
      <div style={{ padding: '10px 20px 0', display: 'flex', gap: 7, overflowX: 'auto', scrollbarWidth: 'none' }}>
        {filterOpts.map(({ key, label }) => {
          const on = activeFilter === key || (key === null && activeFilter === null);
          return (
            <div key={label} onClick={() => key === null ? (setActiveFilter(null), resetFilters()) : toggleFilter(key)}
              style={{ padding: '5px 12px', borderRadius: 999, border: `1.6px solid ${on ? P.ink : P.ink + '55'}`, background: on ? P.ink : 'transparent', color: on ? P.bg : P.ink, font: body(12, on ? 700 : 500), cursor: 'pointer', userSelect: 'none', whiteSpace: 'nowrap', flexShrink: 0 }}>
              {label}
            </div>
          );
        })}
      </div>

      {/* Scrollable body */}
      <div style={{ padding: '0 20px 110px', overflowY: 'auto', height: 'calc(100% - 210px)' }}>

        {/* Tag filter picker */}
        {activeFilter === 'tags' && (
          <div style={{ paddingTop: 10, paddingBottom: 4 }}>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {allTags.map(tag => {
                const sel = selectedTags.has(tag);
                return (
                  <div key={tag} onClick={() => setSelectedTags(prev => { const n = new Set(prev); sel ? n.delete(tag) : n.add(tag); return n; })}
                    style={{ padding: '5px 10px', borderRadius: 999, border: `1.6px solid ${P.ink}`, background: sel ? P.red : 'transparent', color: sel ? P.bg : P.ink, font: body(12, sel ? 700 : 500), cursor: 'pointer', userSelect: 'none' }}>
                    {tag}
                  </div>
                );
              })}
              {allTags.length === 0 && <div style={{ font: mono(10), opacity: 0.4, paddingTop: 2 }}>no tags yet</div>}
            </div>
          </div>
        )}

        {/* Time filter picker */}
        {activeFilter === 'time' && (
          <div style={{ paddingTop: 10, paddingBottom: 4, display: 'flex', gap: 8 }}>
            {[[20,'≤ 20 min'],[30,'≤ 30 min'],[45,'≤ 45 min']].map(([mins, label]) => (
              <div key={mins} onClick={() => setTimeLimit(timeLimit === mins ? null : mins)}
                style={{ padding: '6px 12px', borderRadius: 999, border: `1.6px solid ${P.ink}`, background: timeLimit === mins ? P.ink : 'transparent', color: timeLimit === mins ? P.bg : P.ink, font: body(12, 600), cursor: 'pointer', userSelect: 'none' }}>
                {label}
              </div>
            ))}
          </div>
        )}

        {/* Chef filter picker */}
        {activeFilter === 'chef' && (
          <div style={{ paddingTop: 10, paddingBottom: 4 }}>
            {chefs.length === 0
              ? <div style={{ font: mono(10), opacity: 0.4, paddingTop: 2 }}>no chefs yet</div>
              : <div style={{ display: 'flex', gap: 16, overflowX: 'auto', scrollbarWidth: 'none', paddingBottom: 4 }}>
                  {chefs.map(chef => (
                    <div key={chef} onClick={() => setSelectedChef(prev => prev === chef ? null : chef)}
                      style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5, flexShrink: 0, cursor: 'pointer' }}>
                      <div style={{ padding: 3, borderRadius: '50%', border: `2.5px solid ${selectedChef === chef ? P.red : 'transparent'}`, transition: 'border-color 0.15s' }}>
                        <Avatar name={chef} size={46} />
                      </div>
                      <span style={{ font: mono(9, selectedChef === chef ? 700 : 500), letterSpacing: 0.5, color: selectedChef === chef ? P.red : P.ink }}>{chef}</span>
                    </div>
                  ))}
                </div>
            }
          </div>
        )}

        {/* Pantry filter — ingredient search */}
        {activeFilter === 'pantry' && (
          <div style={{ paddingTop: 10, paddingBottom: 4 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '9px 14px', background: P.bg, border: `2px solid ${P.ink}`, borderRadius: 12, boxShadow: `2px 2px 0 ${P.ink}` }}>
              <Icon name="search" size={16} width={2} />
              <input

                value={pantryQuery}
                onChange={e => setPantryQuery(e.target.value)}

                style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', font: body(14), color: P.ink }}

            </div>
            {CONFIGURED && pantryQuery.trim() && pantryIds === null && (
              <div style={{ marginTop: 6, font: mono(9), opacity: 0.45, letterSpacing: 0.5 }}>searching…</div>
            )}
          </div>
        )}

        {/* Recently viewed strip */}
        {!isFiltering && recentlyViewed.length > 0 && (
          <div style={{ paddingTop: 14, paddingBottom: 4 }}>
            <Eyebrow style={{ marginBottom: 10 }}>recently viewed</Eyebrow>
            <div style={{ display: 'flex', gap: 10, overflowX: 'auto', marginLeft: -20, marginRight: -20, paddingLeft: 20, paddingRight: 20, scrollbarWidth: 'none' }}>
              {recentlyViewed.map(r => <RecipeMini key={r.id} r={r} onClick={() => onOpenRecipe(r)} />)}
            </div>
          </div>
        )}

        {/* Feed */}
        <div style={{ paddingTop: 14, display: 'flex', flexDirection: 'column', gap: 11 }}>
          {!isFiltering && recentlyViewed.length > 0 && <Eyebrow>all recipes</Eyebrow>}
          {loading
            ? <div style={{ paddingTop: 40, textAlign: 'center', font: mono(11), opacity: 0.5, letterSpacing: 1.5, textTransform: 'uppercase' }}>loading…</div>
            : isFiltering && filtered.length === 0
            ? <div style={{ paddingTop: 40, textAlign: 'center', font: mono(11), opacity: 0.5, letterSpacing: 1.5, textTransform: 'uppercase' }}>no results</div>
            : !isFiltering && filtered.length === 0
            ? (
              <div style={{ paddingTop: 60, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14, opacity: 0.5 }}>
                <Icon name="sparkle" size={38} width={1.5} />
                <div style={{ font: mono(10), letterSpacing: 1.5, textTransform: 'uppercase', textAlign: 'center', lineHeight: 1.8 }}>
                  your cookbook is empty<br />
                  <span style={{ opacity: 0.75 }}>tap + to add your first recipe</span>
                </div>
              </div>
            )
            : filtered.map(r => <RecipeCard key={r.id} r={r} onClick={() => onOpenRecipe(r)} />)
          }
        </div>
      </div>

      <TabBar active={active === 'sheet' ? 'home' : active} onNavigate={onNavigate} />
    </>
  );
}

                style={{ padding: '6px 12px', borderRadius: 999, border: `1.6px solid ${P.ink}`, background: timeLimit === mins ? P.ink : 'transparent', color: timeLimit === mins ? P.bg : P.ink, font: body(12, 600), cursor: 'pointer', userSelect: 'none' }}>
                {label}
              </div>
            ))}
          </div>
        )}

        {activeFilter === 'chef' && (
          <div style={{ paddingTop: 10, paddingBottom: 4 }}>
            {chefs.length === 0
              ? <div style={{ font: mono(10), opacity: 0.4, paddingTop: 2 }}>no chefs yet</div>
              : <div style={{ display: 'flex', gap: 16, overflowX: 'auto', scrollbarWidth: 'none', paddingBottom: 4 }}>
                  {chefs.map(chef => (
                    <div key={chef} onClick={() => setSelectedChef(prev => prev === chef ? null : chef)}
                      style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5, flexShrink: 0, cursor: 'pointer' }}>
                      <div style={{ padding: 3, borderRadius: '50%', border: `2.5px solid ${selectedChef === chef ? P.red : 'transparent'}`, transition: 'border-color 0.15s' }}>
                        <Avatar name={chef} size={46} />
                      </div>
                      <span style={{ font: mono(9, selectedChef === chef ? 700 : 500), letterSpacing: 0.5, color: selectedChef === chef ? P.red : P.ink }}>{chef}</span>
                    </div>
                  ))}
                </div>
            }
          </div>
        )}

        {activeFilter === 'pantry' && (
          <div style={{ paddingTop: 10, paddingBottom: 4 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '9px 14px', background: P.bg, border: `2px solid ${P.ink}`, borderRadius: 12, boxShadow: `2px 2px 0 ${P.ink}` }}>
              <Icon name="search" size={16} width={2} />
              <input
                ref={pantryRef}
                value={pantryQuery}
                onChange={e => setPantryQuery(e.target.value)}
                placeholder="butter, eggs, garlic…"
                style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', font: body(14), color: P.ink }}
              />
              {pantryQuery && <div onClick={() => { setPantryQuery(''); setPantryIds(null); }} style={{ cursor: 'pointer', opacity: 0.45, lineHeight: 0 }}><Icon name="close" size={13} /></div>}
            </div>
            {CONFIGURED && pantryQuery.trim() && pantryIds === null && (
              <div style={{ marginTop: 6, font: mono(9), opacity: 0.45, letterSpacing: 0.5 }}>searching…</div>
            )}
          </div>
        )}

        {/* Results or empty state */}
        <div style={{ paddingTop: 16 }}>
          {!isActive ? (
            <div style={{ paddingTop: 48, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10, opacity: 0.35 }}>
              <Icon name="search" size={40} width={1.5} />
              <div style={{ font: mono(10), letterSpacing: 1.5, textTransform: 'uppercase', textAlign: 'center', lineHeight: 1.7 }}>
                type to search<br />or pick a filter above
              </div>
            </div>
          ) : loading ? (
            <div style={{ textAlign: 'center', font: mono(11), opacity: 0.5, letterSpacing: 1.5, textTransform: 'uppercase' }}>loading…</div>
          ) : filtered.length === 0 ? (
            <div style={{ textAlign: 'center', font: mono(11), opacity: 0.5, letterSpacing: 1.5, textTransform: 'uppercase' }}>no results</div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 11 }}>
              {filtered.map(r => <RecipeCard key={r.id} r={r} onClick={() => onOpenRecipe(r)} />)}
            </div>
          )}
        </div>
      </div>

      <TabBar active="search" onNavigate={onNavigate} />
    </>
  );
}

// │  Add via link                                                           │
// ╰─────────────────────────────────────────────────────────────────────────╯
function LinkScreen({ onNavigate, user, onSaved, onExtracted }) {
  const [url, setUrl]               = useState('');
  const [loading, setLoading]       = useState(false);
  const [done, setDone]             = useState(false);
  const [error, setError]           = useState('');
  const [fallback, setFallback]     = useState(null); // { hostname, url } when extraction fails
  const [fallbackName, setFallbackName] = useState('');
  const [saving, setSaving]         = useState(false);
  const inputRef    = useRef(null);
  const nameRef     = useRef(null);

  useEffect(() => { setTimeout(() => inputRef.current?.focus(), 120); }, []);

  // Focus the name field whenever the fallback form appears
  useEffect(() => { if (fallback) setTimeout(() => nameRef.current?.focus(), 80); }, [fallback]);

  async function handleFetch() {
    if (!url.trim()) return;
    let parsed;
    try { parsed = new URL(url.trim()); } catch { setError("that doesn't look like a valid URL"); return; }
    setLoading(true); setError(''); setFallback(null);
    try {
      const data = await extractRecipeFromUrl(url.trim());
      if (data && onExtracted) {
        onExtracted(data);
        return;
      }
      // No structured recipe data found — ask user to name it instead of auto-saving
      const hostname = parsed.hostname.replace(/^www\./, '');
      setFallback({ hostname, url: url.trim() });
      setFallbackName('');
    } catch (e) { setError(e.message || 'something went wrong'); }
    finally { setLoading(false); }
  }

  async function handleSaveBookmark() {
    if (!fallbackName.trim() || saving) return;
    setSaving(true); setError('');
    try {
      if (CONFIGURED && user) {
        const { error: e } = await sb.from('recipes').insert({
          title: fallbackName.trim(), author_id: user.id, source_url: fallback.url, color: '#C2562E', accent: '#FCEDE2',
        });
        if (e) throw e;
        onSaved?.();
      }
      setDone(true); setFallback(null);
    } catch (e) { setError(e.message || 'something went wrong'); }
    finally { setSaving(false); }
  }

  return (
    <>
      <div style={{ padding: '4px 18px 0', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div onClick={() => onNavigate('sheet')} style={{ width: 32, height: 32, borderRadius: '50%', border: `1.8px solid ${P.ink}`, display: 'grid', placeItems: 'center', cursor: 'pointer' }}>
          <Icon name="back" size={16} />
        </div>
        <Eyebrow>add · from a link</Eyebrow>
        <div style={{ width: 32 }} />
      </div>

      <div style={{ padding: '24px 20px 32px', overflowY: 'auto', height: 'calc(100% - 52px)', display: 'flex', flexDirection: 'column', gap: 0 }}>
        <div style={{ font: `800 32px/0.9 'Bricolage Grotesque', sans-serif`, letterSpacing: -1.2, color: P.ink }}>
          paste a{' '}
          <span style={{ position: 'relative', display: 'inline-block' }}>
            link
            <span style={{ position: 'absolute', left: -2, right: -2, bottom: -3, height: 7, background: P.yellow, zIndex: -1, transform: 'rotate(-1deg)' }} />
          </span>.
        </div>
        <div style={{ marginTop: 8, font: mono(11), opacity: 0.55, letterSpacing: 0.3 }}>
          Smitten Kitchen, AllRecipes, BBC Good Food — we'll grab it.
        </div>

        {/* URL input */}
        <div style={{ marginTop: 24 }}>
          <Eyebrow>recipe URL</Eyebrow>
          <div style={{ marginTop: 8, display: 'flex', gap: 8, alignItems: 'stretch' }}>
            <input
              ref={inputRef}
              value={url}
              onChange={e => { setUrl(e.target.value); setError(''); setDone(false); setFallback(null); }}
              onKeyDown={e => e.key === 'Enter' && handleFetch()}
              placeholder="https://…"
              style={{ flex: 1, padding: '13px 14px', font: mono(13), color: P.ink, background: P.bg, border: `2px solid ${P.ink}`, borderRadius: 12, outline: 'none', boxShadow: `2px 2px 0 ${P.ink}` }}
            />
          </div>
        </div>

        {error && <div style={{ marginTop: 10, font: mono(11), color: P.red, letterSpacing: 0.2 }}>{error}</div>}

        {/* ── Success state ── */}
        {done && (
          <div style={{ marginTop: 20, padding: '18px', background: P.paper, border: `2px solid ${P.ink}`, borderRadius: 14, boxShadow: `4px 4px 0 ${P.ink}` }}>
            <div style={{ font: disp(18), letterSpacing: -0.3 }}>
              <span style={{ color: P.red }}>✓</span> link saved
            </div>
            <div style={{ font: mono(11), opacity: 0.6, marginTop: 6, letterSpacing: 0.3 }}>
              {CONFIGURED ? 'bookmark added to your feed.' : 'link captured · connect Supabase to persist it.'}
            </div>
            <div onClick={() => onNavigate('home')} style={{ marginTop: 14, display: 'inline-flex', alignItems: 'center', gap: 8, padding: '9px 14px', background: P.ink, color: P.bg, borderRadius: 999, cursor: 'pointer', font: body(13, 700) }}>
              back to feed <Icon name="arrow" size={16} stroke={P.bg} />
            </div>
          </div>
        )}

        {/* ── Fallback: couldn't extract — ask for name ── */}
        {fallback && !done && (
          <div style={{ marginTop: 20, display: 'flex', flexDirection: 'column', gap: 0 }}>
            {/* Notice */}
            <div style={{ padding: '12px 14px', background: `${P.yellow}55`, border: `1.5px solid ${P.ink}33`, borderRadius: 10, display: 'flex', alignItems: 'flex-start', gap: 10 }}>
              <Icon name="link" size={15} style={{ flexShrink: 0, marginTop: 1 }} />
              <div>
                <div style={{ font: body(13, 700), color: P.ink }}>couldn't read the recipe structure</div>
                <div style={{ font: mono(10), opacity: 0.6, marginTop: 2, letterSpacing: 0.2 }}>from {fallback.hostname} · save it as a link bookmark instead</div>
              </div>
            </div>

            {/* Name input */}
            <div style={{ marginTop: 16 }}>
              <Eyebrow>what's the recipe called?</Eyebrow>
              <input
                ref={nameRef}
                value={fallbackName}
                onChange={e => setFallbackName(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && handleSaveBookmark()}
                placeholder="recipe name"
                style={{ width: '100%', marginTop: 8, padding: '13px 14px', font: body(16, 600), color: P.ink, background: P.bg, border: `2px solid ${P.ink}`, borderRadius: 12, outline: 'none', boxShadow: `2px 2px 0 ${P.ink}` }}
              />
            </div>

            {/* Live card preview */}
            {fallbackName.trim() && (
              <div style={{ marginTop: 16 }}>
                <Eyebrow style={{ marginBottom: 10 }}>how it'll look in the feed</Eyebrow>
                <LinkOnlyCard r={{ title: fallbackName.trim(), source_url: fallback.url, tags: [], cooks: 0 }} onClick={null} />
              </div>
            )}

            {/* Save button */}
            <div
              onClick={handleSaveBookmark}
              style={{ marginTop: 14, padding: '15px', background: fallbackName.trim() && !saving ? P.ink : `${P.ink}44`, color: P.bg, borderRadius: 14, font: disp(18), letterSpacing: -0.3, textAlign: 'center', cursor: fallbackName.trim() && !saving ? 'pointer' : 'not-allowed', boxShadow: fallbackName.trim() && !saving ? `4px 4px 0 ${P.red}` : 'none', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10 }}
            >
              {saving ? 'saving…' : 'save link'}
              {!saving && <Icon name="external" size={18} stroke={P.bg} />}
            </div>

            {/* Escape hatch: enter full recipe manually */}
            <div
              onClick={() => onExtracted?.({ title: fallbackName.trim() || '', source_url: fallback.url, ingredients: [{ qty: '', item: '' }], steps: [''], tags: [], time: '', servings: 2 })}
              style={{ marginTop: 10, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, padding: '10px', font: body(13, 600), color: P.ink, opacity: 0.65, cursor: 'pointer', letterSpacing: -0.2 }}
            >
              or enter the full recipe manually
              <Icon name="arrow" size={14} />
            </div>
          </div>
        )}

        {/* ── Fetch button (only when no fallback and not done) ── */}
        {!fallback && !done && (
          <div onClick={!loading ? handleFetch : undefined} style={{ marginTop: 20, padding: '16px', background: !url.trim() || loading ? `${P.ink}55` : P.ink, color: P.bg, borderRadius: 14, font: disp(18), letterSpacing: -0.3, textAlign: 'center', cursor: !url.trim() || loading ? 'not-allowed' : 'pointer', boxShadow: !url.trim() || loading ? 'none' : `4px 4px 0 ${P.red}`, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10 }}>
            {loading ? 'reading recipe…' : 'fetch recipe'}
            {!loading && <Icon name="arrow" size={18} stroke={P.bg} />}
          </div>
        )}

        {/* ── Supported sites note (only when idle) ── */}
        {!fallback && !done && (
          <div style={{ marginTop: 28, padding: '12px 14px', background: P.paper, border: `1.5px solid ${P.ink}22`, borderRadius: 12 }}>
            <Eyebrow style={{ marginBottom: 6 }}>what works</Eyebrow>
            <div style={{ font: mono(10), opacity: 0.55, letterSpacing: 0.3, lineHeight: 1.75 }}>
              Any site that publishes standard recipe markup — smittenkitchen.com, allrecipes.com, bbcgoodfood.com, bonappetit.com, and thousands more. If extraction fails, you can save it as a link bookmark or enter the recipe manually.
            </div>
          </div>
        )}
      </div>
    </>
  );
}

// ╭─────────────────────────────────────────────────────────────────────────╮
// │  Add manual                                                             │
// ╰─────────────────────────────────────────────────────────────────────────╯
function ManualScreen({ onNavigate, user, onSaved, editRecipe, initialData }) {
  const isEdit = !!editRecipe;
  const [title, setTitle]           = useState('');
  const [timeText, setTimeText]     = useState('');
  const [servings, setServings]     = useState('2');
  const [tags, setTags]             = useState([]);
  const [tagDraft, setTagDraft]     = useState('');
  const [ingredients, setIngred]    = useState([{ qty: '', item: '' }]);
  const [steps, setSteps]           = useState(['']);
  const [saving, setSaving]         = useState(false);
  const [error, setError]           = useState('');
  const [sourceUrl, setSourceUrl]   = useState('');
  const [activeIngIdx, setActiveIngIdx] = useState(null);
  const [suggestions, setSuggestions]   = useState([]);
  const [showPaste, setShowPaste]       = useState(false);
  const [pasteText, setPasteText]       = useState('');
  const [coverFile, setCoverFile]       = useState(null);
  const [coverPreview, setCoverPreview] = useState('');
  const [coverUrl, setCoverUrl]         = useState('');
  const coverInputRef                   = useRef(null);

  function handleCoverFile(e) {
    const f = e.target.files?.[0];
    if (!f) return;
    setCoverFile(f);
    setCoverPreview(URL.createObjectURL(f));
  }

  useEffect(() => {
    if (!isEdit || !CONFIGURED) return;
    (async () => {
      const [{ data: ings }, { data: stps }] = await Promise.all([
        sb.from('ingredients').select('*').eq('recipe_id', editRecipe.id).order('sort_order'),
        sb.from('steps').select('*').eq('recipe_id', editRecipe.id).order('sort_order'),
      ]);
      setTitle(editRecipe.title || '');
      setTimeText(editRecipe.time || '');
      setServings(String(editRecipe.servings || 2));
      setTags(editRecipe.tags || []);
      setIngred(ings?.length ? ings.map(i => ({ qty: i.qty || '', item: i.item || '' })) : [{ qty: '', item: '' }]);
      setSteps(stps?.length ? stps.map(s => s.text) : ['']);
      setCoverUrl(editRecipe.image_url || '');
      setCoverPreview(editRecipe.image_url || '');
    })();
  }, [editRecipe?.id]);

  useEffect(() => {
    if (!initialData) return;
    setTitle(initialData.title || '');
    setTimeText(initialData.time || '');
    setServings(String(initialData.servings || 2));
    setTags(initialData.tags || []);
    setIngred(initialData.ingredients?.length ? initialData.ingredients : [{ qty: '', item: '' }]);
    setSteps(initialData.steps?.length ? initialData.steps : ['']);
    setSourceUrl(initialData.source_url || '');
  }, [initialData]);

  // Debounced ingredient autocomplete
  useEffect(() => {
    const q = (activeIngIdx !== null ? ingredients[activeIngIdx]?.item : '') || '';
    const staticHits = getStaticSuggestions(q);
    setSuggestions(staticHits);
    if (!CONFIGURED || q.length < 2) return;
    const timer = setTimeout(async () => {
      const { data } = await sb.from('ingredients').select('item')
        .ilike('item', `%${q.toLowerCase()}%`).limit(20);
      const dbItems = [...new Set((data || []).map(d => d.item))]
        .filter(s => s !== q.toLowerCase() && s.split(/\s+/).length <= 4 && s.length <= 35);
      setSuggestions([...new Set([...staticHits, ...dbItems])].slice(0, 6));
    }, 250);
    return () => clearTimeout(timer);
  }, [activeIngIdx, ingredients]);

  function addTag(raw) {
    const t = raw.trim().toLowerCase().replace(/[^a-z0-9-]/g, '');
    if (t && !tags.includes(t)) setTags(prev => [...prev, t]);
    setTagDraft('');
  }

  function updateIngred(i, key, val) { setIngred(prev => prev.map((r, idx) => idx === i ? { ...r, [key]: val } : r)); }
  function removeIngred(i) { setIngred(prev => prev.filter((_, idx) => idx !== i)); }
  function updateStep(i, val) { setSteps(prev => prev.map((s, idx) => idx === i ? val : s)); }
  function removeStep(i) { setSteps(prev => prev.filter((_, idx) => idx !== i)); }

  function handleSmartPaste() {
    const data = parseRecipeText(pasteText);
    if (!data) return;
    if (data.title)                                 setTitle(data.title);
    if (data.time)                                  setTimeText(data.time);
    if (data.ingredients.some(i => i.item))         setIngred(data.ingredients);
    if (data.steps.some(s => s))                    setSteps(data.steps);
    setShowPaste(false);
    setPasteText('');
  }

  async function handleSave() {
    if (!title.trim()) { setError('add a title first'); return; }
    setSaving(true); setError('');
    try {
      if (CONFIGURED && user) {
        let imageUrl = coverUrl;
        if (coverFile) {
          const ext = coverFile.name.split('.').pop().toLowerCase();
          const path = `${user.id}/${Date.now()}.${ext}`;
          const { error: upErr } = await sb.storage.from('recipe-images').upload(path, coverFile, { upsert: true });
          if (upErr) throw upErr;
          const { data: { publicUrl } } = sb.storage.from('recipe-images').getPublicUrl(path);
          imageUrl = publicUrl;
        }
        let recipeId;
        if (isEdit) {
          const { error: e1 } = await sb.from('recipes').update({ title: title.trim(), time_text: timeText, servings: parseInt(servings) || 2, ...(imageUrl !== undefined ? { image_url: imageUrl || null } : {}) }).eq('id', editRecipe.id);
          if (e1) throw e1;
          recipeId = editRecipe.id;
          await Promise.all([
            sb.from('recipe_tags').delete().eq('recipe_id', recipeId),
            sb.from('ingredients').delete().eq('recipe_id', recipeId),
            sb.from('steps').delete().eq('recipe_id', recipeId),
          ]);
        } else {
          const { data: recipe, error: e1 } = await sb.from('recipes').insert({ title: title.trim(), author_id: user.id, time_text: timeText, servings: parseInt(servings) || 2, color: '#E8C36E', accent: '#2F2A2A', ...(sourceUrl ? { source_url: sourceUrl } : {}), ...(imageUrl ? { image_url: imageUrl } : {}) }).select().single();
          if (e1) throw e1;
          recipeId = recipe.id;
        }
        if (tags.length)
          await sb.from('recipe_tags').insert(tags.map(t => ({ recipe_id: recipeId, tag: t })));
        const validI = ingredients.filter(r => r.item.trim()).map(normalizeIngredient);
        if (validI.length)
          await sb.from('ingredients').insert(validI.map((r, idx) => ({ recipe_id: recipeId, qty: r.qty, item: r.item, sort_order: idx })));
        const validS = steps.filter(s => s.trim());
        if (validS.length)
          await sb.from('steps').insert(validS.map((s, idx) => ({ recipe_id: recipeId, text: s, sort_order: idx })));
        onSaved?.();
      }
      onNavigate('home');
    } catch (e) { setError(e.message); }
    finally { setSaving(false); }
  }

  const fieldBase = { width: '100%', background: 'transparent', border: 'none', outline: 'none', color: P.ink, fontFamily: "'Hanken Grotesk', sans-serif" };

  return (
    <>
      <div style={{ padding: '4px 18px 0', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div onClick={() => onNavigate('home')} style={{ width: 32, height: 32, borderRadius: '50%', border: `1.8px solid ${P.ink}`, display: 'grid', placeItems: 'center', cursor: 'pointer' }}>
          <Icon name="close" size={16} />
        </div>
        <Eyebrow>{isEdit ? 'edit · recipe' : 'new · manual'}</Eyebrow>
        <div onClick={!saving ? handleSave : undefined} style={{ padding: '6px 14px', background: saving ? `${P.ink}66` : P.ink, color: P.bg, borderRadius: 999, font: body(12, 700), cursor: saving ? 'not-allowed' : 'pointer' }}>
          {saving ? '…' : 'save'}
        </div>
      </div>

      {error && <div style={{ margin: '6px 18px 0', font: mono(11), color: P.red }}>{error}</div>}

      <div style={{ padding: '12px 18px 100px', overflowY: 'auto', height: 'calc(100% - 56px)' }}>
        {/* Smart paste helper */}
        <div style={{ marginBottom: 14, border: `1.5px solid ${P.ink}22`, borderRadius: 12, overflow: 'hidden' }}>
          <div onClick={() => setShowPaste(v => !v)} style={{ padding: '9px 14px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer', font: mono(11), opacity: 0.55, letterSpacing: 0.3, userSelect: 'none' }}>
            <span>paste recipe text</span>
            <span style={{ fontSize: 9 }}>{showPaste ? '▲' : '▼'}</span>
          </div>
          {showPaste && (
            <div style={{ padding: '0 12px 12px', display: 'flex', flexDirection: 'column', gap: 10 }}>
              <textarea
                value={pasteText}
                onChange={e => setPasteText(e.target.value)}
                placeholder="Paste recipe text here — title, ingredients, steps, anything…"
                rows={6}
                style={{ width: '100%', padding: '10px 12px', font: mono(12), color: P.ink, background: P.bg, border: `1.8px solid ${P.ink}`, borderRadius: 10, outline: 'none', resize: 'vertical', lineHeight: 1.5, fontFamily: "'IBM Plex Mono', monospace" }}
              />
              <div onClick={pasteText.trim() ? handleSmartPaste : undefined}
                   style={{ padding: '10px 16px', background: pasteText.trim() ? P.ink : `${P.ink}55`, color: P.bg, borderRadius: 10, font: body(13, 700), cursor: pasteText.trim() ? 'pointer' : 'not-allowed', textAlign: 'center' }}>
                extract fields
              </div>
            </div>
          )}
        </div>

        {/* Cover slot */}
        <input ref={coverInputRef} type="file" accept="image/*" style={{ display: 'none' }} onChange={handleCoverFile} />
        <div onClick={() => coverInputRef.current?.click()} style={{ height: 120, borderRadius: 14, border: `2px dashed ${P.ink}`, overflow: 'hidden', cursor: 'pointer', position: 'relative' }}>
          {coverPreview
            ? <img src={coverPreview} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
            : <div style={{ height: '100%', background: P.paper, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 6 }}>
                <div style={{ width: 40, height: 40, background: P.yellow, borderRadius: '50%', border: `1.8px solid ${P.ink}`, display: 'grid', placeItems: 'center', transform: 'rotate(-2deg)' }}>
                  <Icon name="camera" size={20} />
                </div>
                <div style={{ font: mono(10), letterSpacing: 0.8, textTransform: 'uppercase', opacity: 0.6 }}>tap for cover photo</div>
              </div>
          }
          {coverPreview && (

            {tags.map((t, i) => (
              <span key={t} onClick={() => setTags(prev => prev.filter(x => x !== t))} style={{ display: 'inline-flex', alignItems: 'center', gap: 4, padding: '5px 9px 4px', background: i % 2 ? P.yellow : P.red, color: P.ink, font: `700 9px/1 'Bricolage Grotesque', sans-serif`, borderRadius: 999, cursor: 'pointer', transform: `rotate(${(i % 2 ? 2 : -3) * 0.4}deg)` }}>

            <input value={tagDraft} onChange={e => setTagDraft(e.target.value)} onKeyDown={e => { if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); addTag(tagDraft); } }} onBlur={() => tagDraft && addTag(tagDraft)} placeholder="add tag…" style={{ border: 'none', outline: 'none', background: 'transparent', font: body(12, 600), color: P.ink, borderBottom: `1.5px solid ${P.ink}44`, paddingBottom: 2, width: 72 }} />

        </div>

          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
            <div style={{ font: disp(17), letterSpacing: -0.3 }}>ingredients</div>
            <Eyebrow>{ingredients.filter(r => r.item).length || 0} items</Eyebrow>
          </div>
          <div style={{ marginTop: 8, display: 'flex', flexDirection: 'column' }}>
            {ingredients.map((ing, idx) => (
              <div key={idx} style={{ display: 'grid', gridTemplateColumns: '80px 1fr 22px', gap: 8, padding: '7px 0', borderBottom: `1px solid ${P.ink}22`, alignItems: 'center' }}>
                <input value={ing.qty} onChange={e => updateIngred(idx, 'qty', e.target.value)} placeholder="1 cup" style={{ ...fieldBase, font: `700 15px/1 'Bricolage Grotesque', sans-serif`, color: P.red, letterSpacing: -0.3 }} />
                <input
                  value={ing.item}
                  onChange={e => updateIngred(idx, 'item', e.target.value)}
                  onFocus={() => setActiveIngIdx(idx)}
                  onBlur={() => setTimeout(() => { setActiveIngIdx(null); setSuggestions([]); }, 160)}
                  placeholder="ingredient"
                  style={{ ...fieldBase, font: body(14), lineHeight: 1 }}
                />
                <div onClick={() => removeIngred(idx)} style={{ cursor: 'pointer', opacity: 0.35, display: 'grid', placeItems: 'center' }}><Icon name="close" size={13} /></div>
              </div>
            ))}
            {/* Ingredient autocomplete chip strip */}
            {suggestions.length > 0 && activeIngIdx !== null && (
              <div style={{ display: 'flex', gap: 6, overflowX: 'auto', scrollbarWidth: 'none', paddingBottom: 4, marginTop: 6 }}>
                {suggestions.map(s => (
                  <div key={s}
                    onMouseDown={e => {
                      e.preventDefault();
                      updateIngred(activeIngIdx, 'item', s);
                      setSuggestions([]);
                      setActiveIngIdx(null);
                    }}
                    style={{ padding: '5px 11px 4px', borderRadius: 999, border: `1.5px solid ${P.ink}55`, background: P.paper, font: mono(10), color: P.ink, cursor: 'pointer', whiteSpace: 'nowrap', flexShrink: 0 }}>
                    {s}

            <div onClick={() => setIngred(prev => [...prev, { qty: '', item: '' }])} style={{ marginTop: 7, font: mono(10), color: P.ink, opacity: 0.55, cursor: 'pointer' }}>+ add ingredient</div>
          </div>
        </div>

        {/* Steps */}
        <div style={{ marginTop: 20 }}>
          <div style={{ font: disp(17), letterSpacing: -0.3 }}>steps</div>
          <div style={{ marginTop: 8, display: 'flex', flexDirection: 'column' }}>
            {steps.map((step, idx) => (
              <div key={idx} style={{ display: 'grid', gridTemplateColumns: '20px 1fr 22px', gap: 8, padding: '7px 0', borderBottom: `1px solid ${P.ink}22`, alignItems: 'start' }}>
                <span style={{ font: `800 12px/2 'Bricolage Grotesque', sans-serif`, color: P.red }}>{idx + 1}.</span>
                <textarea value={step} onChange={e => updateStep(idx, e.target.value)} placeholder="describe this step…" rows={2} style={{ ...fieldBase, font: body(14), resize: 'none', lineHeight: 1.4 }} />
                <div onClick={() => removeStep(idx)} style={{ cursor: 'pointer', opacity: 0.35, display: 'grid', placeItems: 'center', paddingTop: 4 }}><Icon name="close" size={13} /></div>
              </div>
            ))}
            <div onClick={() => setSteps(prev => [...prev, ''])} style={{ marginTop: 7, font: mono(10), color: P.ink, opacity: 0.55, cursor: 'pointer' }}>+ add step</div>
          </div>
        </div>
      </div>
    </>
  );
}
