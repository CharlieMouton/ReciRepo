// ╭─────────────────────────────────────────────────────────────────────────╮
// │  Scan screen                                                            │
// ╰─────────────────────────────────────────────────────────────────────────╯
function ScanScreen({ onNavigate, onExtracted }) {
  const [phase, setPhase]     = useState('idle');   // 'idle' | 'preview' | 'loading'
  const [file, setFile]       = useState(null);
  const [preview, setPreview] = useState('');
  const [error, setError]     = useState('');
  const cameraRef             = useRef(null);
  const galleryRef            = useRef(null);

  function handleFile(e) {
    const f = e.target.files?.[0];
    if (!f) return;
    setFile(f);
    setPreview(URL.createObjectURL(f));
    setPhase('preview');
    setError('');
    // Reset input so same file can be re-selected
    e.target.value = '';
  }

  async function handleRead() {
    if (!file) return;
    setPhase('loading'); setError('');
    try {
      const data = await extractRecipeFromImage(file);
      if (!data || (!data.title && !data.ingredients?.some(i => i.item))) {
        throw new Error("couldn't find a recipe in that image — try a clearer shot");
      }
      onExtracted?.(data);
    } catch (e) {
      setError(e.message || 'something went wrong');
      setPhase('preview');
    }
  }

  return (
    <>
      {/* Hidden file inputs */}
      <input ref={cameraRef}  type="file" accept="image/*" capture="environment" style={{ display: 'none' }} onChange={handleFile} />
      <input ref={galleryRef} type="file" accept="image/*"                       style={{ display: 'none' }} onChange={handleFile} />

      <div style={{ padding: '4px 18px 0', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div onClick={() => onNavigate('sheet')} style={{ width: 32, height: 32, borderRadius: '50%', border: `1.8px solid ${P.ink}`, display: 'grid', placeItems: 'center', cursor: 'pointer' }}>
          <Icon name="back" size={16} />
        </div>
        <Eyebrow>add · from a photo</Eyebrow>
        <div style={{ width: 32 }} />
      </div>

      <div style={{ padding: '24px 20px 0', display: 'flex', flexDirection: 'column', gap: 0 }}>
        <div style={{ font: `800 32px/0.9 'Bricolage Grotesque', sans-serif`, letterSpacing: -1.2, color: P.ink }}>
          snap a{' '}
          <span style={{ position: 'relative', display: 'inline-block' }}>
            recipe
            <span style={{ position: 'absolute', left: -2, right: -2, bottom: -3, height: 7, background: P.red, zIndex: -1, transform: 'rotate(-1deg)' }} />
          </span>.
        </div>
        <div style={{ marginTop: 8, font: mono(11), opacity: 0.55, letterSpacing: 0.3 }}>
          cookbook page, recipe card, screenshot — we'll read it.
        </div>

        {error && <div style={{ marginTop: 12, font: mono(11), color: P.red, letterSpacing: 0.2 }}>{error}</div>}

        {phase === 'idle' && (
          <>
            {/* Dashed drop zone */}
            <div style={{ marginTop: 24, height: 180, borderRadius: 18, border: `2px dashed ${P.ink}`, background: P.paper, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 10 }}>
              <div style={{ width: 52, height: 52, background: P.yellow, borderRadius: '50%', border: `1.8px solid ${P.ink}`, display: 'grid', placeItems: 'center', transform: 'rotate(-3deg)' }}>
                <Icon name="camera" size={24} />
              </div>
              <div style={{ font: mono(11), letterSpacing: 0.8, textTransform: 'uppercase', opacity: 0.55 }}>choose or snap a photo</div>
            </div>

            {/* Buttons */}
            <div style={{ marginTop: 16, display: 'flex', flexDirection: 'column', gap: 10 }}>
              <div onClick={() => cameraRef.current?.click()} style={{ padding: '15px', background: P.ink, color: P.bg, borderRadius: 14, font: disp(18), letterSpacing: -0.3, textAlign: 'center', cursor: 'pointer', boxShadow: `4px 4px 0 ${P.red}`, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10 }}>
                <Icon name="camera" size={18} stroke={P.bg} /> take a photo
              </div>
              <div onClick={() => galleryRef.current?.click()} style={{ padding: '13px', background: 'transparent', color: P.ink, border: `2px solid ${P.ink}`, borderRadius: 14, font: body(15, 700), textAlign: 'center', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10 }}>
                <Icon name="gallery" size={18} /> choose from library
              </div>
            </div>
          </>
        )}

        {(phase === 'preview' || phase === 'loading') && (
          <>
            {/* Image preview */}
            <div style={{ marginTop: 20, borderRadius: 14, overflow: 'hidden', border: `2px solid ${P.ink}`, height: 200 }}>
              <img src={preview} alt="recipe" style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
            </div>
            <div style={{ marginTop: 8, font: mono(11), opacity: 0.5, letterSpacing: 0.3 }}>
              {file?.name || 'selected image'}
            </div>

            {/* Actions */}
            <div style={{ marginTop: 14, display: 'flex', flexDirection: 'column', gap: 10 }}>
              <div onClick={phase === 'loading' ? undefined : handleRead}
                   style={{ padding: '15px', background: phase === 'loading' ? `${P.ink}55` : P.ink, color: P.bg, borderRadius: 14, font: disp(18), letterSpacing: -0.3, textAlign: 'center', cursor: phase === 'loading' ? 'not-allowed' : 'pointer', boxShadow: phase === 'loading' ? 'none' : `4px 4px 0 ${P.red}`, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10 }}>
                {phase === 'loading' ? 'reading image…' : <>read recipe <Icon name="arrow" size={18} stroke={P.bg} /></>}
              </div>
              {phase !== 'loading' && (
                <div onClick={() => galleryRef.current?.click()} style={{ padding: '12px', background: 'transparent', color: P.ink, border: `2px solid ${P.ink}33`, borderRadius: 14, font: body(14, 600), textAlign: 'center', cursor: 'pointer' }}>
                  choose another
                </div>
              )}
            </div>
          </>
        )}
      </div>
    </>
  );
}

// ╭─────────────────────────────────────────────────────────────────────────╮
// │  Cooking screen                                                         │
// ╰─────────────────────────────────────────────────────────────────────────╯
function CookingScreen({ recipe, user, onNavigate, onDeleted, onEdit, saved, toggleSave, onComplete }) {
  const [detail, setDetail]             = useState(null);
  const [stepIdx, setStepIdx]           = useState(0);
  const [serves, setServes]             = useState(2);
  const [confirmDel, setConfirmDel]     = useState(false);
  const [deleting, setDeleting]         = useState(false);
  const [activeTab, setActiveTab]       = useState('steps');
  const [timerRunning, setTimerRunning] = useState(false);
  const [timerLeft, setTimerLeft]       = useState(0);
  const [cookingMode, setCookingMode]   = useState(false);
  const [wakeActive, setWakeActive]     = useState(false);
  const wakelockRef                     = useRef(null);

  const r = recipe || {};
  const isOwner = CONFIGURED && user?.id && r.author_id && user.id === r.author_id;
  const isSaved = saved?.has(r.id);

  // Release wake lock on unmount
  useEffect(() => () => { wakelockRef.current?.release().catch(() => {}); }, []);

  // Load recipe detail
  useEffect(() => {
    setStepIdx(0); setActiveTab('steps'); setConfirmDel(false); setCookingMode(false);
    if (!CONFIGURED || !recipe) {
      setDetail({ ...SAMPLE_DETAIL, title: r.title || SAMPLE_DETAIL.title, author: r.author || SAMPLE_DETAIL.author, time: r.time || SAMPLE_DETAIL.time, cooks: r.cooks ?? SAMPLE_DETAIL.cooks });
      setServes(r.servings || SAMPLE_DETAIL.servings);
      return;
    }
    setDetail(null);
    (async () => {
      const [{ data: ings }, { data: stps }] = await Promise.all([
        sb.from('ingredients').select('*').eq('recipe_id', recipe.id).order('sort_order'),
        sb.from('steps').select('*').eq('recipe_id', recipe.id).order('sort_order'),
      ]);
      setDetail({
        title: recipe.title, author: recipe.author, time: recipe.time, cooks: recipe.cooks,
        servings: recipe.servings || 2,
        ingredients: ings || [],
        steps: (stps || []).map(s => ({ text: s.text, timer: s.timer_seconds || 0 })),
      });
      setServes(recipe.servings || 2);
    })();
  }, [recipe?.id]);

  const steps       = detail?.steps || [];
  const total       = steps.length || 1;
  const step        = steps[stepIdx] || { text: '', timer: 0 };
  const origServings = detail?.servings || 2;
  const ingredients = detail?.ingredients || [];

  // Reset timer when step changes
  useEffect(() => { setTimerRunning(false); setTimerLeft(step.timer); }, [stepIdx, step.timer]);

  // Countdown tick
  useEffect(() => {
    if (!timerRunning) return;
    const id = setInterval(() => setTimerLeft(t => { if (t <= 1) { clearInterval(id); setTimerRunning(false); return 0; } return t - 1; }), 1000);
    return () => clearInterval(id);
  }, [timerRunning]);

  async function toggleWake() {
    if (wakeActive && wakelockRef.current) {
      try { await wakelockRef.current.release(); } catch {}
      wakelockRef.current = null; setWakeActive(false);
    } else {
      try {
        const lock = await navigator.wakeLock?.request('screen');
        if (lock) {
          wakelockRef.current = lock; setWakeActive(true);
          lock.addEventListener('release', () => { setWakeActive(false); wakelockRef.current = null; });
        }
      } catch {}
    }
  }

  async function handleDelete() {
    if (!confirmDel) { setConfirmDel(true); return; }
    setDeleting(true);
    try { await sb.from('recipes').delete().eq('id', recipe.id); onDeleted?.(); }
    catch { setDeleting(false); setConfirmDel(false); }
  }

  async function handleComplete() {
    if (CONFIGURED && user && recipe) {
      try { await sb.from('cook_logs').insert({ recipe_id: recipe.id, user_id: user.id }); } catch {}
      onComplete?.(); // refresh cook count in feed
    }
    onNavigate('home');
  }

  function handleTimer() {
    if (timerRunning) { setTimerRunning(false); }
    else { if (timerLeft <= 0) setTimerLeft(step.timer); setTimerRunning(true); }
  }

  const displayTime = timerLeft > 0 ? timerLeft : step.timer;
  const isLastStep  = stepIdx === total - 1;

  // ── Shared top chrome ────────────────────────────────────────────────────
  const topChrome = (
    <>
      {/* Header */}
      <div style={{ padding: '4px 18px 0', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div onClick={() => onNavigate('home')} style={{ width: 32, height: 32, borderRadius: '50%', border: `1.8px solid ${P.ink}`, display: 'grid', placeItems: 'center', cursor: 'pointer' }}>
          <Icon name="back" size={16} />
        </div>
        {/* Screen-awake toggle */}
        <div onClick={toggleWake} style={{ display: 'flex', alignItems: 'center', gap: 5, padding: '4px 10px', borderRadius: 999, border: `1.5px solid ${wakeActive ? P.red : P.ink + '44'}`, cursor: 'pointer', userSelect: 'none', transition: 'all 0.15s' }}>
          <div style={{ width: 7, height: 7, borderRadius: '50%', background: wakeActive ? P.red : `${P.ink}44`, transition: 'background 0.15s' }} />
          <span style={{ font: mono(9), color: wakeActive ? P.red : P.ink, opacity: wakeActive ? 1 : 0.5, letterSpacing: 0.6 }}>screen awake · {wakeActive ? 'on' : 'off'}</span>
        </div>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          {isOwner && <div onClick={() => onEdit(recipe)} style={{ width: 32, height: 32, borderRadius: '50%', background: P.yellow, border: `1.8px solid ${P.ink}`, display: 'grid', placeItems: 'center', cursor: 'pointer' }}><Icon name="pen" size={14} /></div>}
          <div onClick={() => toggleSave?.(r.id)} style={{ width: 32, height: 32, borderRadius: '50%', background: isSaved ? P.yellow : 'transparent', border: `1.8px solid ${P.ink}`, display: 'grid', placeItems: 'center', cursor: 'pointer', transition: 'background 0.15s' }}><Icon name="bookmark" size={15} /></div>
        </div>
      </div>

      {/* Hero */}
      <div style={{ margin: '10px 18px 0', height: 100, borderRadius: 14, overflow: 'hidden', border: `2px solid ${P.ink}`, position: 'relative' }}>
        <RecipeCover url={r.image_url} color={r.color || '#E8C36E'} accent={r.accent || P.ink} />
        <div style={{ position: 'absolute', top: 8, left: 10, display: 'flex', alignItems: 'center', gap: 6 }}>
          <Avatar name={r.author || 'chef'} size={24} />
          <Sticker bg={P.red} color={P.bg} rotate={-3} size={9}>by {r.author || 'chef'}</Sticker>
        </div>
        <div style={{ position: 'absolute', bottom: 8, right: 10, display: 'flex', gap: 5 }}>
          <Sticker bg={P.ink} color={P.bg} rotate={2} size={9}>{r.time || '?'}</Sticker>
          <Sticker bg={P.yellow} color={P.ink} rotate={-1} size={9}>{r.cooks || 0} cooks</Sticker>
        </div>
      </div>

      {/* Title + serves */}
      <div style={{ padding: '8px 18px 0', display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', gap: 8 }}>
        <div style={{ font: `800 22px/0.95 'Bricolage Grotesque', sans-serif`, letterSpacing: -0.8, color: P.ink, flex: 1, minWidth: 0, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{(r.title || '').toLowerCase()}</div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, border: `1.5px solid ${P.ink}`, borderRadius: 999, padding: '3px 3px 3px 9px', flexShrink: 0 }}>
          <Eyebrow style={{ opacity: 0.8, fontSize: 9 }}>serves</Eyebrow>
          <div onClick={() => setServes(s => Math.max(1, s - 1))} style={{ width: 22, height: 22, borderRadius: '50%', border: `1.5px solid ${P.ink}`, display: 'grid', placeItems: 'center', cursor: 'pointer' }}><Icon name="minus" size={10} width={2.5} /></div>
          <span style={{ font: disp(14), minWidth: 12, textAlign: 'center' }}>{serves}</span>
          <div onClick={() => setServes(s => s + 1)} style={{ width: 22, height: 22, borderRadius: '50%', background: P.red, color: P.bg, display: 'grid', placeItems: 'center', cursor: 'pointer' }}><Icon name="plus" size={10} width={2.5} /></div>
        </div>
      </div>
    </>
  );

  // ── OVERVIEW MODE ─────────────────────────────────────────────────────────
  if (!cookingMode) {
    return (
      <>
        {topChrome}

        {/* Tab row */}
        <div style={{ padding: '10px 18px 0', display: 'flex', gap: 18, borderBottom: `1.5px solid ${P.ink}22` }}>
          {['ingredients','steps'].map(tab => (
            <div key={tab} onClick={() => setActiveTab(tab)} style={{ paddingBottom: 8, font: body(14, activeTab === tab ? 800 : 700), color: P.ink, opacity: activeTab === tab ? 1 : 0.45, borderBottom: activeTab === tab ? `3px solid ${P.red}` : '3px solid transparent', marginBottom: -1.5, cursor: 'pointer' }}>{tab}</div>
          ))}
        </div>

        {/* Content */}
        {!detail ? (
          <div style={{ padding: '24px 18px', textAlign: 'center', font: mono(11), opacity: 0.45, letterSpacing: 1.5, textTransform: 'uppercase' }}>loading…</div>
        ) : activeTab === 'ingredients' ? (
          <div style={{ padding: '12px 18px 110px', overflowY: 'auto', height: 'calc(100% - 320px)' }}>
            {ingredients.length === 0
              ? <div style={{ font: body(14), opacity: 0.4 }}>no ingredients listed</div>
              : ingredients.map((ing, i) => (
                <div key={i} style={{ display: 'grid', gridTemplateColumns: '80px 1fr', gap: 8, padding: '8px 0', borderBottom: `1px solid ${P.ink}22` }}>
                  <span style={{ font: `700 15px/1.2 'Bricolage Grotesque', sans-serif`, color: P.red }}>
                    {scaleQty(ing.qty, serves / origServings)}
                  </span>
                  <span style={{ font: body(14) }}>{ing.item}</span>
                </div>
              ))
            }
          </div>
        ) : (
          <div style={{ padding: '12px 18px 110px', overflowY: 'auto', height: 'calc(100% - 320px)', display: 'flex', flexDirection: 'column', gap: 8 }}>
            {steps.length === 0
              ? <div style={{ font: body(14), opacity: 0.4 }}>no steps yet</div>
              : steps.map((s, i) => (
                <div key={i} style={{ display: 'grid', gridTemplateColumns: '24px 1fr', gap: 10, alignItems: 'start', padding: '12px 14px', background: P.paper, border: `1.5px solid ${P.ink}22`, borderRadius: 12 }}>
                  <span style={{ font: `800 13px/1.5 'Bricolage Grotesque', sans-serif`, color: P.red }}>{i + 1}.</span>
                  <span style={{ font: body(14), lineHeight: 1.5 }}>{s.text}</span>
                </div>
              ))
            }
            {isOwner && detail && (
              <div style={{ marginTop: 4, display: 'flex', justifyContent: 'flex-end' }}>
                <div onClick={!deleting ? handleDelete : undefined} style={{ font: mono(10), color: confirmDel ? P.bg : P.ink, opacity: confirmDel ? 1 : 0.4, cursor: 'pointer', letterSpacing: 0.5, padding: '6px 12px', borderRadius: 999, background: confirmDel ? P.red : 'transparent', border: `1.5px solid ${confirmDel ? P.red : 'transparent'}`, transition: 'all 0.15s' }}>
                  {deleting ? 'deleting…' : confirmDel ? 'tap again to confirm' : 'delete recipe'}
                </div>
              </div>
            )}
          </div>
        )}

        {/* Begin cooking CTA */}
        <div style={{ position: 'absolute', left: 0, right: 0, bottom: 0, padding: '12px 18px 28px', background: P.bg, borderTop: `2px solid ${P.ink}` }}>
          <div onClick={() => { setCookingMode(true); setStepIdx(0); }} style={{ padding: '15px', background: P.red, color: P.bg, borderRadius: 14, font: disp(20), letterSpacing: -0.4, textAlign: 'center', cursor: 'pointer', boxShadow: `4px 4px 0 ${P.ink}`, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 12 }}>
            begin cooking <Icon name="arrow" size={20} stroke={P.bg} />
          </div>
        </div>
      </>
    );
  }

  // ── COOKING MODE ──────────────────────────────────────────────────────────
  return (
    <>
      {topChrome}

      {/* Step card */}
      <div style={{ padding: '10px 18px 110px', overflowY: 'auto', height: 'calc(100% - 280px)' }}>
        <div style={{ background: P.paper, border: `2px solid ${P.ink}`, borderRadius: 16, padding: '16px 16px 18px', boxShadow: `4px 4px 0 ${P.ink}` }}>
          {/* Step counter + back-to-overview link */}
          <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 8 }}>
            <div style={{ font: disp(13), color: P.red, letterSpacing: 0.4, textTransform: 'uppercase' }}>
              step {String(stepIdx + 1).padStart(2, '0')} / {String(total).padStart(2, '0')}
            </div>
            <div onClick={() => setCookingMode(false)} style={{ font: mono(9), opacity: 0.5, cursor: 'pointer', letterSpacing: 0.5, textDecoration: 'underline', userSelect: 'none' }}>view recipe</div>
          </div>

          {step.text
            ? <div style={{ font: body(19, 700), lineHeight: 1.25, color: P.ink }}>{step.text}</div>
            : <div style={{ font: body(15, 500), lineHeight: 1.4, color: P.ink, opacity: 0.5 }}>no steps added yet</div>
          }

          {/* Timer */}
          {step.timer > 0 && (
            <div onClick={handleTimer} style={{ marginTop: 14, display: 'inline-flex', alignItems: 'center', gap: 8, padding: '7px 14px', background: timerRunning ? P.red : P.ink, color: P.bg, borderRadius: 999, cursor: 'pointer', transition: 'background 0.15s' }}>
              <Icon name={timerRunning ? 'pause' : 'play'} size={12} />
              <span style={{ font: disp(14), fontVariantNumeric: 'tabular-nums' }}>
                {String(Math.floor(displayTime / 60)).padStart(2, '0')}:{String(displayTime % 60).padStart(2, '0')}
              </span>
              <span style={{ font: mono(9), opacity: 0.7, letterSpacing: 0.5, textTransform: 'uppercase' }}>
                {timerRunning ? 'pause' : timerLeft > 0 && timerLeft < step.timer ? 'resume' : 'start'}
              </span>
            </div>
          )}

          {/* "I've cooked this!" — shown on last step */}
          {isLastStep && (
            <div onClick={handleComplete} style={{ marginTop: 18, padding: '14px 18px', background: P.red, color: P.bg, borderRadius: 14, font: disp(20), letterSpacing: -0.4, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10, cursor: 'pointer', boxShadow: `4px 4px 0 ${P.ink}`, userSelect: 'none' }}>
              <Icon name="check" size={20} stroke={P.bg} width={3} />
              i've cooked this!
            </div>
          )}
        </div>
      </div>

      {/* Step navigation */}
      <div style={{ position: 'absolute', left: 0, right: 0, bottom: 0, padding: '12px 18px 28px', background: P.bg, borderTop: `2px solid ${P.ink}`, display: 'grid', gridTemplateColumns: '52px 1fr 52px', gap: 10, alignItems: 'center' }}>
        <div onClick={() => setStepIdx(i => Math.max(0, i - 1))} style={{ height: 52, borderRadius: 14, border: `2px solid ${P.ink}`, display: 'grid', placeItems: 'center', cursor: 'pointer', opacity: stepIdx === 0 ? 0.25 : 1 }}>
          <Icon name="back" size={20} />
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5 }}>
          <div style={{ display: 'flex', gap: 5 }}>
            {steps.map((_, i) => <span key={i} onClick={() => setStepIdx(i)} style={{ width: i === stepIdx ? 22 : 8, height: 8, borderRadius: 4, cursor: 'pointer', background: i <= stepIdx ? P.red : `${P.ink}33`, transition: 'width 0.2s ease' }} />)}
          </div>
          <div style={{ font: mono(9), opacity: 0.55, letterSpacing: 0.8 }}>{stepIdx + 1} of {total}</div>
        </div>
        <div onClick={() => !isLastStep && setStepIdx(i => i + 1)} style={{ height: 52, borderRadius: 14, background: isLastStep ? `${P.ink}33` : P.ink, color: P.bg, display: 'grid', placeItems: 'center', cursor: isLastStep ? 'default' : 'pointer' }}>
          <Icon name="arrow" size={20} stroke={isLastStep ? P.ink : P.bg} />
        </div>
      </div>
    </>
  );
}

// ── Window width ───────────────────────────────────────────────────────────
function useWindowWidth() {
  const [w, setW] = useState(window.innerWidth);
  useEffect(() => {
    const h = () => setW(window.innerWidth);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return w;
}

// ╭─────────────────────────────────────────────────────────────────────────╮
// │  Desktop recipe detail panel                                            │
// ╰─────────────────────────────────────────────────────────────────────────╯
function DesktopRecipeDetail({ recipe, user, onClose, onDeleted, onEdit, saved, toggleSave }) {
  const [detail, setDetail]         = useState(null);
  const [serves, setServes]         = useState(2);
  const [activeTab, setActiveTab]   = useState('steps');
  const [confirmDel, setConfirmDel] = useState(false);
  const [deleting, setDeleting]     = useState(false);

  const isOwner = CONFIGURED && user?.id && recipe?.author_id && user.id === recipe.author_id;
  const isSaved = saved?.has(recipe?.id);

  useEffect(() => {
    setConfirmDel(false); setActiveTab('steps');
    if (!CONFIGURED || !recipe) {
      setDetail({ ...SAMPLE_DETAIL, title: recipe?.title || SAMPLE_DETAIL.title, author: recipe?.author || SAMPLE_DETAIL.author });
      setServes(recipe?.servings || SAMPLE_DETAIL.servings);
      return;
    }
    setDetail(null);
    (async () => {
      const [{ data: ings }, { data: stps }] = await Promise.all([
        sb.from('ingredients').select('*').eq('recipe_id', recipe.id).order('sort_order'),
        sb.from('steps').select('*').eq('recipe_id', recipe.id).order('sort_order'),
      ]);
      setDetail({ title: recipe.title, author: recipe.author, time: recipe.time, cooks: recipe.cooks, servings: recipe.servings || 2, ingredients: ings || [], steps: (stps || []).map(s => ({ text: s.text, timer: s.timer_seconds || 0 })) });
      setServes(recipe.servings || 2);
    })();
  }, [recipe?.id]);

  async function handleDelete() {
    if (!confirmDel) { setConfirmDel(true); return; }
    setDeleting(true);
    try { await sb.from('recipes').delete().eq('id', recipe.id); onDeleted?.(); }
    catch { setDeleting(false); setConfirmDel(false); }
  }

  const origServings = detail?.servings || 2;
  const steps        = detail?.steps || [];
  const ingredients  = detail?.ingredients || [];

  return (
    <>
      <div style={{ padding: '16px 18px', borderBottom: `2px solid ${P.ink}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
        <div style={{ display: 'flex', gap: 8 }}>
          {isOwner && (
            <div onClick={() => onEdit(recipe)} style={{ width: 32, height: 32, borderRadius: '50%', background: P.yellow, border: `1.8px solid ${P.ink}`, display: 'grid', placeItems: 'center', cursor: 'pointer' }}>
              <Icon name="pen" size={14} />
            </div>
          )}
          <div onClick={() => toggleSave?.(recipe?.id)} style={{ width: 32, height: 32, borderRadius: '50%', background: isSaved ? P.yellow : 'transparent', border: `1.8px solid ${P.ink}`, display: 'grid', placeItems: 'center', cursor: 'pointer', transition: 'background 0.15s' }}>
            <Icon name="bookmark" size={15} />
          </div>
        </div>
        <div onClick={onClose} style={{ width: 32, height: 32, borderRadius: '50%', border: `1.8px solid ${P.ink}`, display: 'grid', placeItems: 'center', cursor: 'pointer' }}>
          <Icon name="close" size={16} />
        </div>
      </div>

      <div style={{ flex: 1, overflowY: 'auto' }}>
        <div style={{ height: 160, position: 'relative' }}>
          <RecipeCover url={recipe.image_url} color={recipe.color || '#E8C36E'} accent={recipe.accent || P.ink} />
          <div style={{ position: 'absolute', top: 10, left: 14, display: 'flex', alignItems: 'center', gap: 6 }}>
            <Avatar name={recipe.author || 'chef'} size={26} />
            <Sticker bg={P.red} color={P.bg} rotate={-2} size={10}>by {recipe.author}</Sticker>
          </div>
          <div style={{ position: 'absolute', bottom: 10, right: 12, display: 'flex', gap: 5 }}>
            <Sticker bg={P.ink} color={P.bg} rotate={1} size={9}>{recipe.time}</Sticker>
            <Sticker bg={P.yellow} color={P.ink} rotate={-2} size={9}>{recipe.cooks} cooks</Sticker>
          </div>
        </div>

        <div style={{ padding: '14px 18px 24px' }}>
          <div style={{ font: `800 26px/0.92 'Bricolage Grotesque', sans-serif`, letterSpacing: -0.8, color: P.ink }}>{recipe.title?.toLowerCase()}</div>

          {recipe.tags?.length > 0 && (
            <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap', marginTop: 10 }}>
              {recipe.tags.map((t, i) => <Sticker key={t} bg={i % 2 ? P.yellow : P.red} color={P.ink} rotate={i % 2 ? 2 : -3} size={9}>{t}</Sticker>)}
            </div>
          )}

          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: 14 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, border: `1.8px solid ${P.ink}`, borderRadius: 999, padding: '4px 4px 4px 12px' }}>
              <Eyebrow style={{ opacity: 0.9 }}>serves</Eyebrow>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <div onClick={() => setServes(s => Math.max(1, s - 1))} style={{ width: 26, height: 26, borderRadius: '50%', border: `1.5px solid ${P.ink}`, display: 'grid', placeItems: 'center', cursor: 'pointer' }}><Icon name="minus" size={12} width={2.5} /></div>
                <span style={{ font: disp(16), minWidth: 14, textAlign: 'center' }}>{serves}</span>
                <div onClick={() => setServes(s => s + 1)} style={{ width: 26, height: 26, borderRadius: '50%', background: P.red, color: P.bg, display: 'grid', placeItems: 'center', cursor: 'pointer' }}><Icon name="plus" size={12} width={2.5} /></div>
              </div>
            </div>
            <div style={{ font: mono(10), opacity: 0.6 }}>{serves === origServings ? 'as written' : `×${(serves / origServings).toFixed(1)}`}</div>
          </div>

          <div style={{ display: 'flex', gap: 18, marginTop: 16, borderBottom: `1.5px solid ${P.ink}22` }}>
            {['ingredients','steps'].map(tab => (
              <div key={tab} onClick={() => setActiveTab(tab)} style={{ paddingBottom: 8, font: body(14, activeTab === tab ? 800 : 600), color: P.ink, opacity: activeTab === tab ? 1 : 0.45, borderBottom: activeTab === tab ? `3px solid ${P.red}` : '3px solid transparent', marginBottom: -1.5, cursor: 'pointer' }}>{tab}</div>
            ))}
          </div>

          {!detail ? (
            <div style={{ paddingTop: 20, textAlign: 'center', font: mono(11), opacity: 0.45, letterSpacing: 1.5, textTransform: 'uppercase' }}>loading…</div>
          ) : activeTab === 'ingredients' ? (
            <div style={{ marginTop: 14, display: 'flex', flexDirection: 'column' }}>
              {ingredients.length === 0
                ? <div style={{ font: body(14), opacity: 0.4, marginTop: 8 }}>no ingredients listed</div>
                : ingredients.map((ing, i) => (
                  <div key={i} style={{ display: 'grid', gridTemplateColumns: '80px 1fr', gap: 8, padding: '8px 0', borderBottom: `1px solid ${P.ink}22` }}>
                    <span style={{ font: `700 15px/1.2 'Bricolage Grotesque', sans-serif`, color: P.red }}>{scaleQty(ing.qty, serves / origServings)}</span>
                    <span style={{ font: body(14) }}>{ing.item}</span>
                  </div>
                ))
              }
            </div>
          ) : (
            <div style={{ marginTop: 14, display: 'flex', flexDirection: 'column', gap: 10 }}>
              {steps.length === 0
                ? <div style={{ font: body(14), opacity: 0.4, marginTop: 8 }}>no steps yet</div>
                : steps.map((step, i) => (
                  <div key={i} style={{ display: 'grid', gridTemplateColumns: '24px 1fr', gap: 10, alignItems: 'start', padding: '12px 14px', background: P.bg, border: `1.5px solid ${P.ink}22`, borderRadius: 12 }}>
                    <span style={{ font: `800 13px/1.5 'Bricolage Grotesque', sans-serif`, color: P.red }}>{i + 1}.</span>
                    <span style={{ font: body(14), lineHeight: 1.5 }}>{step.text}</span>
                  </div>
                ))
              }
            </div>
          )}

          {isOwner && (
            <div style={{ marginTop: 20, display: 'flex', justifyContent: 'flex-end' }}>
              <div onClick={!deleting ? handleDelete : undefined} style={{ font: mono(10), color: confirmDel ? P.bg : P.ink, opacity: confirmDel ? 1 : 0.4, cursor: 'pointer', letterSpacing: 0.5, padding: '6px 12px', borderRadius: 999, background: confirmDel ? P.red : 'transparent', border: `1.5px solid ${confirmDel ? P.red : 'transparent'}`, transition: 'all 0.15s' }}>
                {deleting ? 'deleting…' : confirmDel ? 'tap again to confirm' : 'delete recipe'}
              </div>
            </div>
          )}
        </div>
      </div>
    </>
  );
}

// ╭─────────────────────────────────────────────────────────────────────────╮
// │  Desktop layout                                                         │
// ╰─────────────────────────────────────────────────────────────────────────╯
function DesktopLayout({ user, recipes, loading, reload, saved, toggleSave, initialScreen = 'home' }) {
  const [screen, setScreen]                 = useState(initialScreen);
  const [selectedRecipe, setSelectedRecipe] = useState(null);
  const [editRecipe, setEditRecipe]         = useState(null);
  const [draftRecipe, setDraftRecipe]       = useState(null);
  const [query, setQuery]                   = useState('');
  const desktopSearchRef                    = useRef(null);
  const username = user?.user_metadata?.username || user?.email?.split('@')[0] || 'you';

  function navigate(s) {
    if (s === 'search') { setScreen('home'); requestAnimationFrame(() => desktopSearchRef.current?.focus()); return; }
    if (s !== 'manual') setDraftRecipe(null);
    setScreen(s);
    if (s === 'home') setEditRecipe(null);
  }
  function openEdit(r)    { setEditRecipe(r); setScreen('manual'); }
  function afterSaved()   { reload(); setScreen('home'); setEditRecipe(null); setDraftRecipe(null); }
  function afterDeleted() { setSelectedRecipe(null); reload(); }

  const q = query.trim().toLowerCase();
  const filteredRecipes = q
    ? recipes.filter(r =>
        r.title.toLowerCase().includes(q) ||
        (r.author || '').toLowerCase().includes(q) ||
        (r.tags || []).some(t => t.includes(q))
      )
    : recipes;
  const savedRecipes = recipes.filter(r => saved?.has(r.id));
  const myRecipes    = recipes.filter(r => r.author_id === user?.id);

  const sideNav = [
    { key: 'home',    icon: 'home',     label: 'feed'    },
    { key: 'saved',   icon: 'bookmark', label: 'saved'   },
    { key: 'search',  icon: 'search',   label: 'search'  },
    { key: 'profile', icon: 'user',     label: 'profile' },
  ];

  const sheetOpts = [
    { icon: 'pen',    title: 'type it out',   sub: 'manual entry',                    bg: P.yellow, color: P.ink, to: 'manual' },
    { icon: 'link',   title: 'paste a link',  sub: 'we pull it from the web',         bg: P.bg,     color: P.ink, to: 'link'   },
    { icon: 'camera', title: 'snap a recipe', sub: 'cookbook page, card, screenshot', bg: P.red,    color: P.bg,  to: 'scan'   },
  ];

  const showDetail = !!selectedRecipe && !['sheet','manual','link','scan'].includes(screen);

  return (
    <div style={{ display: 'flex', width: '100vw', height: '100dvh', background: '#1a1815', overflow: 'hidden' }}>

      {/* Sidebar */}
      <div style={{ width: 240, background: P.bg, borderRight: `2px solid ${P.ink}`, display: 'flex', flexDirection: 'column', padding: '32px 18px 28px', flexShrink: 0 }}>
        <Wordmark size={22} />
        <nav style={{ marginTop: 32, display: 'flex', flexDirection: 'column', gap: 2 }}>
          {sideNav.map(item => (
            <div key={item.key} onClick={() => navigate(item.key)} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 12px', borderRadius: 12, background: screen === item.key ? P.ink : 'transparent', color: screen === item.key ? P.bg : P.ink, cursor: 'pointer', userSelect: 'none', font: body(14, screen === item.key ? 700 : 500), transition: 'background 0.1s' }}>
              <Icon name={item.icon} size={18} stroke="currentColor" />
              {item.label}
            </div>
          ))}
        </nav>
        <div style={{ marginTop: 16 }}>
          <div onClick={() => navigate('sheet')} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '11px 14px', background: P.red, color: P.bg, borderRadius: 14, border: `2px solid ${P.ink}`, boxShadow: `3px 3px 0 ${P.ink}`, cursor: 'pointer', userSelect: 'none', font: disp(15) }}>
            <Icon name="plus" size={18} stroke={P.bg} width={2.5} />
            add a recipe
          </div>
        </div>
        <div style={{ marginTop: 'auto', display: 'flex', alignItems: 'center', gap: 10, paddingTop: 16, borderTop: `1.5px solid ${P.ink}22` }}>
          <Avatar name={username} size={34} />
          <div>
            <div style={{ font: body(13, 700), color: P.ink }}>{username}</div>
            {CONFIGURED && <div onClick={() => sb.auth.signOut()} style={{ font: mono(10), color: P.ink, opacity: 0.45, cursor: 'pointer', letterSpacing: 0.3, marginTop: 2 }}>sign out</div>}
          </div>
        </div>
      </div>

      {/* Main area */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', background: P.bg }}>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', maxWidth: 720, width: '100%', margin: '0 auto' }}>

        {screen === 'home' && <>
          <div style={{ padding: '28px 32px 0', flexShrink: 0 }}>
            <div style={{ font: `800 40px/0.9 'Bricolage Grotesque', sans-serif`, letterSpacing: -1.6, color: P.ink }}>
              what's{' '}
              <span style={{ position: 'relative', display: 'inline-block' }}>
                cooking
                <span style={{ position: 'absolute', left: 0, right: 0, bottom: -4, height: 8, background: P.yellow, zIndex: -1, transform: 'rotate(-1deg)' }} />
              </span>?
            </div>
            <div style={{ marginTop: 14, display: 'flex', alignItems: 'center', gap: 8, padding: '11px 16px', border: `2px solid ${P.ink}`, borderRadius: 999, boxShadow: `3px 3px 0 ${P.ink}`, maxWidth: 460 }}>
              <Icon name="search" size={17} width={2.2} />
              <input
                ref={desktopSearchRef}
                value={query}
                onChange={e => setQuery(e.target.value)}
                placeholder="noodles, layla, under 30 min…"
                style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', font: body(14), color: P.ink }}
              />
              {query && <div onClick={() => setQuery('')} style={{ cursor: 'pointer', opacity: 0.45, lineHeight: 0 }}><Icon name="close" size={14} /></div>}
            </div>
          </div>
          <div style={{ flex: 1, padding: '18px 32px 32px', overflowY: 'auto', display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(260px, 1fr))', gap: 12, alignContent: 'start' }}>
            {loading
              ? <div style={{ gridColumn: '1/-1', paddingTop: 40, textAlign: 'center', font: mono(11), opacity: 0.5, letterSpacing: 1.5, textTransform: 'uppercase' }}>loading…</div>
              : filteredRecipes.length === 0
              ? <div style={{ gridColumn: '1/-1', paddingTop: 40, textAlign: 'center', font: mono(11), opacity: 0.5, letterSpacing: 1.5, textTransform: 'uppercase' }}>no results</div>
              : filteredRecipes.map(r => <RecipeCard key={r.id} r={r} onClick={() => setSelectedRecipe(r)} />)
            }
          </div>
        </>}

        {screen === 'saved' && <>
          <div style={{ padding: '28px 32px 0', flexShrink: 0 }}>
            <div style={{ font: `800 40px/0.9 'Bricolage Grotesque', sans-serif`, letterSpacing: -1.6, color: P.ink }}>
              your{' '}
              <span style={{ position: 'relative', display: 'inline-block' }}>
                saves
                <span style={{ position: 'absolute', left: 0, right: 0, bottom: -4, height: 8, background: P.yellow, zIndex: -1, transform: 'rotate(-1deg)' }} />
              </span>.
            </div>
          </div>
          <div style={{ flex: 1, padding: '18px 32px 32px', overflowY: 'auto', display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(260px, 1fr))', gap: 12, alignContent: 'start' }}>
            {savedRecipes.length === 0
              ? <div style={{ gridColumn: '1/-1', paddingTop: 40, textAlign: 'center' }}>
                  <div style={{ font: mono(11), opacity: 0.5, letterSpacing: 1.5, textTransform: 'uppercase' }}>nothing saved yet</div>
                  <div style={{ marginTop: 10, font: body(13), opacity: 0.4 }}>bookmark recipes from the feed</div>
                </div>
              : savedRecipes.map(r => <RecipeCard key={r.id} r={r} onClick={() => setSelectedRecipe(r)} />)
            }
          </div>
        </>}

        {screen === 'profile' && (
          <div style={{ flex: 1, overflowY: 'auto', padding: '32px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 20, paddingBottom: 24, borderBottom: `2px solid ${P.ink}`, marginBottom: 24 }}>
              <Avatar name={username} size={72} />
              <div>
                <div style={{ font: `800 28px/1 'Bricolage Grotesque', sans-serif`, letterSpacing: -0.8, color: P.ink }}>{username}</div>
                {user?.email && <div style={{ font: mono(11), opacity: 0.5, letterSpacing: 0.3, marginTop: 6 }}>{user.email}</div>}
                <div style={{ display: 'flex', gap: 20, marginTop: 12 }}>
                  <div>
                    <span style={{ font: `800 18px/1 'Bricolage Grotesque', sans-serif`, color: P.red }}>{myRecipes.length}</span>
                    <span style={{ font: mono(10), opacity: 0.55, textTransform: 'uppercase', letterSpacing: 1, marginLeft: 6 }}>recipes</span>
                  </div>
                  <div>
                    <span style={{ font: `800 18px/1 'Bricolage Grotesque', sans-serif`, color: P.red }}>{savedRecipes.length}</span>
                    <span style={{ font: mono(10), opacity: 0.55, textTransform: 'uppercase', letterSpacing: 1, marginLeft: 6 }}>saved</span>
                  </div>
                </div>
              </div>
              {CONFIGURED && user && (
                <div onClick={() => sb.auth.signOut()} style={{ marginLeft: 'auto', padding: '10px 18px', border: `2px solid ${P.ink}`, borderRadius: 12, font: body(13, 700), cursor: 'pointer', color: P.ink, opacity: 0.55 }}>
                  sign out
                </div>
              )}
            </div>
            <Eyebrow style={{ marginBottom: 14 }}>my recipes</Eyebrow>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(260px, 1fr))', gap: 12 }}>
              {myRecipes.length === 0
                ? <div style={{ font: mono(11), opacity: 0.5, letterSpacing: 1.5, textTransform: 'uppercase' }}>no recipes yet</div>
                : myRecipes.map(r => <RecipeCard key={r.id} r={r} onClick={() => setSelectedRecipe(r)} />)
              }
            </div>
          </div>
        )}

        {screen === 'sheet' && (
          <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <div style={{ width: 460, background: P.bg, border: `2px solid ${P.ink}`, borderRadius: 20, padding: '28px 24px', boxShadow: `6px 6px 0 ${P.ink}` }}>
              <div style={{ font: disp(26), letterSpacing: -0.6, marginBottom: 20 }}>
                <span style={{ position: 'relative', display: 'inline-block' }}>
                  add<span style={{ position: 'absolute', left: -2, right: -2, bottom: -3, height: 7, background: P.red, zIndex: -1, transform: 'rotate(-1deg)' }} />
                </span>{' '}a recipe
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                {sheetOpts.map(o => (
                  <div key={o.title} onClick={() => navigate(o.to)} style={{ display: 'grid', gridTemplateColumns: '52px 1fr 22px', alignItems: 'center', gap: 12, padding: '14px', background: o.bg, color: o.color, border: `2px solid ${P.ink}`, borderRadius: 14, boxShadow: `4px 4px 0 ${P.ink}`, cursor: 'pointer', userSelect: 'none' }}>
                    <div style={{ width: 46, height: 46, borderRadius: 10, background: P.ink, color: P.bg, display: 'grid', placeItems: 'center' }}>
                      <Icon name={o.icon} size={22} width={2.2} />
                    </div>
                    <div>
                      <div style={{ font: disp(19), letterSpacing: -0.4 }}>{o.title}</div>
                      <div style={{ font: mono(10), opacity: 0.7, marginTop: 3, letterSpacing: 0.4 }}>{o.sub}</div>
                    </div>
                    <Icon name="arrow" size={20} />
                  </div>
                ))}
              </div>
              <div onClick={() => navigate('home')} style={{ marginTop: 16, textAlign: 'center', font: mono(11), opacity: 0.5, cursor: 'pointer', letterSpacing: 0.5 }}>cancel</div>
            </div>
          </div>
        )}

        {screen === 'manual' && <ManualScreen onNavigate={navigate} user={user} editRecipe={editRecipe} initialData={draftRecipe} onSaved={() => { setDraftRecipe(null); setEditRecipe(null); afterSaved(); }} />}
        {screen === 'link'   && <LinkScreen   onNavigate={navigate} user={user} onSaved={reload} onExtracted={data => { setDraftRecipe(data); setScreen('manual'); }} />}
        {screen === 'scan'   && <ScanScreen   onNavigate={navigate} onExtracted={data => { setDraftRecipe(data); setScreen('manual'); }} />}
      </div>
      </div>

      {/* Detail panel */}
      {showDetail && (
        <div style={{ width: 380, background: P.paper, borderLeft: `2px solid ${P.ink}`, display: 'flex', flexDirection: 'column', overflow: 'hidden', flexShrink: 0 }}>
          <DesktopRecipeDetail recipe={selectedRecipe} user={user} onClose={() => setSelectedRecipe(null)} onDeleted={afterDeleted} onEdit={openEdit} saved={saved} toggleSave={toggleSave} />
        </div>
      )}
    </div>
  );
}

// ╭─────────────────────────────────────────────────────────────────────────╮
// │  App root                                                               │
// ╰─────────────────────────────────────────────────────────────────────────╯
// ╭─────────────────────────────────────────────────────────────────────────╮
// │  Onboarding screen (shown once per browser to new authenticated users)  │
// ╰─────────────────────────────────────────────────────────────────────────╯
function OnboardingScreen({ user, onDone, desktop = false }) {
  const [step, setStep] = useState(0);

  const progressDots = (
    <div style={{ display: 'flex', justifyContent: 'center', gap: 8, marginTop: 40, marginBottom: 16 }}>
      {[0, 1].map(i => (
        <div key={i} style={{ width: 8, height: 8, borderRadius: '50%', background: i <= step ? P.ink : `${P.ink}30`, transition: 'background 0.2s' }} />
      ))}
    </div>
  );

  const cards = [
    { icon: 'home', title: 'browse recipes', sub: 'explore the feed',    bg: P.bg,  color: P.ink, to: null    },
    { icon: 'plus', title: 'add a recipe',   sub: 'type, scan or paste',  bg: P.red, color: P.bg,  to: 'sheet' },
  ];

  // Mobile: subtract phone's 44px top spacer so content never clips at bottom.
  // Desktop: no phone shell, height is auto inside a fixed-size modal.
  const outerStyle = desktop
    ? { height: '100%', display: 'flex', flexDirection: 'column', background: P.bg, padding: '36px 36px 28px' }
    : { height: 'calc(100% - 44px)', display: 'flex', flexDirection: 'column', background: P.bg, padding: '28px 26px 20px' };

  return (
    <div style={outerStyle}>

      {/* ── Wordmark — large, centred ── */}
      <div style={{ display: 'flex', justifyContent: 'center', marginBottom: desktop ? 32 : 24 }}>
        <Wordmark size={desktop ? 30 : 28} />
      </div>

      {step === 0 ? (
        <>
          {/* Headline */}
          <div style={{ font: disp(desktop ? 46 : 38, 800), letterSpacing: -1.4, color: P.ink, lineHeight: 0.9 }}>
            our recipes,<br />to share.
          </div>

          {/* Body — each sentence on its own, visually prominent */}
          <div style={{ marginTop: 22, display: 'flex', flexDirection: 'column', gap: 14 }}>
            <div style={{ font: body(desktop ? 17 : 16, 700), color: P.ink, lineHeight: 1.45 }}>
              save recipes from anywhere by{' '}
              <span style={{ color: P.red }}>pasting a link</span>,{' '}
              <span style={{ color: P.red }}>scanning a page</span>, or{' '}
              <span style={{ color: P.red }}>writing up</span>{' '}
              the recipe yourself.
            </div>
            <div style={{ font: body(desktop ? 17 : 16, 700), color: P.ink, lineHeight: 1.45 }}>
              browse other recipes and cook step-by-step.
            </div>
          </div>

          {/* Push dots + button to bottom */}
          <div style={{ flex: 1}} />

          {progressDots}
          <div onClick={() => setStep(1)}
            style={{ padding: '16px', background: P.ink, color: P.bg, borderRadius: 16, font: disp(20), letterSpacing: -0.3, textAlign: 'center', cursor: 'pointer', boxShadow: `4px 4px 0 ${P.red}` }}>
            next →
          </div>
        </>
      ) : (
        <>
          {/* Step 2 headline */}
          <div style={{ font: disp(desktop ? 40 : 34, 800), letterSpacing: -1.2, color: P.ink, lineHeight: 0.92 }}>
            where do you<br />want to start?
          </div>

          {/* Method cards */}
          <div style={{ marginTop: 28, display: 'flex', flexDirection: 'column', gap: 10 }}>
            {cards.map(c => (
              <div key={c.title} onClick={() => onDone(c.to)}
                style={{ display: 'grid', gridTemplateColumns: '52px 1fr 22px', alignItems: 'center', gap: 12, padding: '16px 14px', background: c.bg, color: c.color, border: `2px solid ${P.ink}`, borderRadius: 14, boxShadow: `4px 4px 0 ${P.ink}`, cursor: 'pointer', userSelect: 'none' }}>
                <div style={{ width: 46, height: 46, borderRadius: 10, background: P.ink, color: P.bg, display: 'grid', placeItems: 'center' }}>
                  <Icon name={c.icon} size={22} width={2.2} />
                </div>
                <div>
                  <div style={{ font: disp(19), letterSpacing: -0.4 }}>{c.title}</div>
                  <div style={{ font: mono(10), opacity: 0.7, marginTop: 3, letterSpacing: 0.4 }}>{c.sub}</div>
                </div>
                <Icon name="arrow" size={20} />
              </div>
            ))}
          </div>

          {/* Dots below cards on step 2 */}
          <div style={{ marginTop: 24 }}>
            {progressDots}
          </div>
        </>
      )}
    </div>
  );
}

function App() {
  const user                                    = useAuth();
  const { recipes, loading, reload }            = useRecipes();
  const { saved, toggleSave }                   = useSaves(user);
  const [screen, setScreen]                     = useState('home');
  const [selectedRecipe, setSelectedRecipe]     = useState(null);
  const [editRecipe, setEditRecipe]             = useState(null);
  const [draftRecipe, setDraftRecipe]           = useState(null);
  const [recentlyViewed, setRecentlyViewed]     = useState([]);
  const [showOnboarding, setShowOnboarding]     = useState(() => CONFIGURED && !localStorage.getItem('rr_onboarded'));
  const isDesktop                               = useWindowWidth() >= 900;

  function navigate(s) {
    if (s !== 'manual') setDraftRecipe(null);
    setScreen(s);
  }
  function finishOnboarding(goTo) {
    localStorage.setItem('rr_onboarded', '1');
    setShowOnboarding(false);
    if (goTo) navigate(goTo);
  }
  function openRecipe(r) {
    setRecentlyViewed(prev => [r, ...prev.filter(x => x.id !== r.id)].slice(0, 8));
    setSelectedRecipe(r); setScreen('cooking');
  }
  function openEdit(r)   { setEditRecipe(r); setScreen('manual'); }
  function afterSaved()  { reload(); setScreen('home'); }
  function afterDeleted(){ setSelectedRecipe(null); reload(); setScreen('home'); }

  if (user === undefined) {
    return (
      <div style={{ width: '100vw', height: '100dvh', background: '#1a1815', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <Phone>
          <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 16 }}>
            <Wordmark size={26} />
            <div style={{ font: mono(11), opacity: 0.45, letterSpacing: 2, textTransform: 'uppercase' }}>loading…</div>
          </div>
        </Phone>
      </div>
    );
  }

  if (CONFIGURED && !user) {
    if (isDesktop) {
      const rots = [-1.2, 0.9, 0.7, -0.9];
      return (
        <div style={{ width: '100vw', height: '100dvh', background: '#1a1815', display: 'flex', overflow: 'hidden' }}>
          {/* ── Left: branding + recipe grid ── */}
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: '48px 52px', minWidth: 0 }}>
            {/* Wordmark in light colour */}
            <div style={{ font: disp(28), letterSpacing: -1, color: P.bg, display: 'flex', alignItems: 'center', gap: 6, flexShrink: 0 }}>
              <span>reci</span>
              <span style={{ background: P.red, color: P.bg, padding: '3px 9px 4px', borderRadius: 6, transform: 'rotate(-1.5deg)', display: 'inline-block' }}>repo</span>
            </div>
            <div style={{ marginTop: 28, font: disp(42, 800), letterSpacing: -1.5, color: P.bg, lineHeight: 0.93, flexShrink: 0 }}>
              our recipes,<br />to share.
            </div>
            {/* Recipe grid fills remaining height */}
            <div style={{ flex: 1, marginTop: 36, display: 'grid', gridTemplateColumns: '1fr 1fr', gridTemplateRows: '1fr 1fr', gap: 14, minHeight: 0, pointerEvents: 'none', userSelect: 'none' }}>
              {SAMPLE_RECIPES.slice(0, 4).map((r, i) => (
                <div key={r.id} style={{ borderRadius: 16, overflow: 'hidden', border: `2px solid ${P.ink}`, boxShadow: `3px 3px 0 ${P.ink}`, transform: `rotate(${rots[i]}deg)`, position: 'relative' }}>
                  <RecipeCover url={r.image_url} color={r.color} accent={r.accent}>
                    <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, padding: '32px 12px 10px', background: 'linear-gradient(transparent, rgba(0,0,0,0.65))' }}>
                      <div style={{ font: `700 14px/1.2 'Bricolage Grotesque', sans-serif`, color: '#fff', letterSpacing: -0.3, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{r.title}</div>
                      <div style={{ font: `500 10px/1 'IBM Plex Mono', monospace`, color: 'rgba(255,255,255,0.7)', marginTop: 3 }}>by {r.author} · {r.time}</div>
                    </div>
                  </RecipeCover>
                </div>
              ))}
            </div>
          </div>
          {/* ── Right: auth form ── */}
          <div style={{ width: 420, flexShrink: 0, background: P.bg, borderLeft: `2px solid ${P.ink}22`, overflow: 'hidden' }}>
            <AuthScreen compact />
          </div>
        </div>
      );
    }
    return (
      <div style={{ width: '100vw', height: '100dvh', background: '#1a1815', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <Phone><AuthScreen /></Phone>
      </div>
    );
  }

  if (showOnboarding && user) {
    if (isDesktop) {
      return (
        <div style={{ width: '100vw', height: '100dvh', background: P.paper, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          {/* Subtle grid pattern on the backdrop */}
          <div style={{ position: 'absolute', inset: 0, backgroundImage: `repeating-linear-gradient(0deg, ${P.ink}09 0 1px, transparent 1px 48px), repeating-linear-gradient(90deg, ${P.ink}09 0 1px, transparent 1px 48px)`, pointerEvents: 'none' }} />
          <div style={{ position: 'relative', width: 480, height: 480, background: P.bg, border: `2.5px solid ${P.ink}`, borderRadius: 24, boxShadow: `8px 8px 0 ${P.ink}`, overflow: 'hidden' }}>
            <OnboardingScreen user={user} onDone={finishOnboarding} desktop />
          </div>
        </div>
      );
    }
    return (
      <div style={{ width: '100vw', height: '100dvh', background: '#1a1815', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <Phone>
          <OnboardingScreen user={user} onDone={finishOnboarding} />
        </Phone>
      </div>
    );
  }

  if (isDesktop) {
    return <DesktopLayout user={user} recipes={recipes} loading={loading} reload={reload} saved={saved} toggleSave={toggleSave} initialScreen={screen} />;
  }

  return (
    <div style={{ width: '100vw', height: '100dvh', background: '#1a1815', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <Phone>
        {(screen === 'home' || screen === 'sheet') && <HomeScreen recipes={recipes} loading={loading} onNavigate={navigate} onOpenRecipe={openRecipe} user={user} saved={saved} toggleSave={toggleSave} active={screen} recentlyViewed={recentlyViewed} />}
        {screen === 'sheet'   && <SheetOverlay onNavigate={navigate} />}
        {screen === 'search'  && <SearchScreen recipes={recipes} loading={loading} onNavigate={navigate} onOpenRecipe={openRecipe} user={user} />}
        {screen === 'saved'   && <SavedScreen  onNavigate={navigate} onOpenRecipe={openRecipe} user={user} recipes={recipes} saved={saved} />}
        {screen === 'profile' && <ProfileScreen onNavigate={navigate} onOpenRecipe={openRecipe} user={user} recipes={recipes} />}
        {screen === 'manual'  && <ManualScreen onNavigate={navigate} user={user} editRecipe={editRecipe} initialData={draftRecipe} onSaved={() => { setDraftRecipe(null); setEditRecipe(null); afterSaved(); }} />}
        {screen === 'link'    && <LinkScreen   onNavigate={navigate} user={user} onSaved={reload} onExtracted={data => { setDraftRecipe(data); setScreen('manual'); }} />}
        {screen === 'scan'    && <ScanScreen   onNavigate={navigate} onExtracted={data => { setDraftRecipe(data); setScreen('manual'); }} />}
        {screen === 'cooking' && <CookingScreen recipe={selectedRecipe} user={user} onNavigate={navigate} onDeleted={afterDeleted} onEdit={openEdit} saved={saved} toggleSave={toggleSave} onComplete={reload} />}
      </Phone>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
