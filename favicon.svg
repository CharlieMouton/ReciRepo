<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&amp;display=swap');
    </style>
  </defs>
  <!-- Red rotated rounded rect — mirrors the wordmark's "repo" box -->
  <rect x="2" y="2" width="28" height="28" rx="5" fill="#D94F4F"
